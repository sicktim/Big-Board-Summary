  // ------------------------------------------------------------
  // Per-node student status (student view) — opted/complete/blocked.
  // ------------------------------------------------------------
  function computeNodeForStudent(code, payload, student) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    if (!boardEvent) return { applicable: false };

    // v0.5.1: MCG is authority on applicability; dark-grey cell still
    // overrides as "not required" for this specific student.
    if (!statusModule.isStudentApplicablePerMcg(mcgEvent, student)) {
      return { applicable: false };
    }
    const cell = boardEvent.cells.find(c => c.col === student.col);
    const classified = statusModule.classifyCell(cell, payload.classMeta, new Date());
    if (classified.completion === 'notreq') return { applicable: false };
    const isComplete = classified.completion === 'complete';
    const opted = chain.isOpted(code, payload, student, mcgEvent);
    return {
      applicable: true,
      completion: classified.completion,
      isComplete,
      opted,
      dateText: classified.dateText,
      flag: classified.flag,  // v0.5.2e: 'past-date-unchecked' triggers VERIFY label
    };
  }

  // ------------------------------------------------------------
  // Node renderer: oneOf virtual group node ("pick one of")
  // Shown as a dashed-border compact card listing the alternatives.
  // Member on-board events are rendered separately (as their own
  // prereq nodes); the group just signals "one of these satisfies
  // the downstream event."
  // ------------------------------------------------------------
  function renderNodeGroup(code, meta, payload, student, mode) {
    const node = el('div', {
      class: 'node group-node',
      'data-code': code,
      title: meta.groupDesc || 'Pick one of the alternatives',
    });
    node.appendChild(el('div', { class: 'node-head' }, [
      el('div', { class: 'node-head-code' }, 'Any 1 of'),
      el('div', { class: 'node-head-title' }, (meta.members || []).join(' / ')),
    ]));
    if (meta.groupDesc) {
      node.appendChild(el('div', {
        style: 'padding:4px 10px 8px;font-size:10px;color:var(--ink-soft);line-height:1.3',
      }, meta.groupDesc));
    }
    return node;
  }

  // ------------------------------------------------------------
  // v0.5.2a: Node renderer: MCG-required-but-missing-from-BB.
  // Dashed orange border + ⚠ badge. No cells / no roster — there's no
  // BB row to aggregate. Clicking opens Settings.
  // ------------------------------------------------------------
  function renderNodeMissing(code, meta, payload) {
    const mcg = MCG_GRAPH.events[code] || {};
    const ttype = mcg.eventType || '?';
    const tname = mcg.eventTypeName || 'event';
    const node = el('div', {
      class: 'node missing-node',
      'data-code': code,
      title: `MCG requires this ${tname} but no Big Board row exists for "${code}". Add it to the board or drop it from the MCG chain.`,
    });
    node.appendChild(el('div', { class: 'node-head' }, [
      el('div', { class: 'node-head-code' }, '⚠ ' + code),
      el('div', { class: 'node-head-title' }, mcg.eventName || '(no MCG name)'),
    ]));
    node.appendChild(el('div', { class: 'node-missing-banner' },
      `Missing from Big Board · type ${ttype}`));
    const apps = (mcg.applicabilityDetail && mcg.applicabilityDetail.standardMapping) || mcg.applicability || [];
    if (apps.length) {
      node.appendChild(el('div', {
        style: 'padding:4px 10px 8px;font-size:10px;color:var(--ink-soft)',
      }, 'Applies to: ' + apps.join(', ')));
    }
    return node;
  }

  // ------------------------------------------------------------
  // Node renderer: class view
  // ------------------------------------------------------------
  // scopeStudents = goal-applicability-filtered student list. Aggregation
  // and roster display are restricted to this set, so PF 8332F (ABM/FTE/P)
  // view never mentions CSO/RPA even on shared prereq nodes.
  function renderNodeClass(code, payload, isGoal, scopeStudents, mcgGoal) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    // aggregateEvent uses the (students) argument to decide applicable set
    const perStudent = statusModule.computeEventStatus(boardEvent, scopeStudents, payload.classMeta);
    const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scopeStudents);

    const band = isGoal ? 'goal' : bandForPct(agg.pctComplete, agg.applicable);
    // v0.5.2: render every MCG-applicable student. Students whose board cell
    // is dark-grey ("excused") are shown but flagged as a mismatch — see
    // KB §0 for source-of-truth ordering.
    const rosterStudents = scopeStudents.filter(s => perStudent[s.col].mcgApplicable);
    const applicableStudents = scopeStudents.filter(s => perStudent[s.col].applicable);

    const crew = rosterStudents.filter(s => roleBucket(s.type) === 'crew');
    const pilots = rosterStudents.filter(s => roleBucket(s.type) === 'pilot');
    const crewLabel = crewColumnLabel(crew.map(s => s.type));

    const isExpanded = expanded.has(code);
    const node = el('div', {
      class: 'node' + (isGoal ? ' goal' : ' ' + band) + (isExpanded ? '' : ' collapsed'),
      'data-code': code,
    });

    // Header with toggle
    const head = el('div', { class: 'node-head' }, [
      el('div', { class: 'node-head-code' }, code),
      el('div', { class: 'node-head-title' }, (mcgEvent && mcgEvent.eventName) || boardEvent.title),
    ]);
    if (!isGoal) {
      const toggle = el('button', {
        class: 'node-toggle',
        title: isExpanded ? 'Collapse' : 'Expand',
        onClick: (e) => {
          e.stopPropagation();
          if (expanded.has(code)) expanded.delete(code);
          else expanded.add(code);
          node.classList.toggle('collapsed');
          toggle.textContent = expanded.has(code) ? '−' : '+';
          toggle.title = expanded.has(code) ? 'Collapse' : 'Expand';
          redrawArrowsSoon();
        },
      }, isExpanded ? '−' : '+');
      head.appendChild(toggle);
    }
    node.appendChild(head);

    if (isGoal) {
      node.appendChild(el('div', { class: 'node-progress' }, [
        el('div', { class: 'node-pct', style: 'font-size:12px;font-weight:600;color:#777' },
          `TARGET · ${applicableStudents.length} applicable`),
      ]));
      return node;
    }

    // Progress bar
    node.appendChild(el('div', { class: 'node-progress' }, [
      el('div', { class: 'node-bar-bg' }, [
        el('div', { class: 'node-bar-fill', style: `width:${agg.pctComplete}%` }),
      ]),
      el('div', { class: 'node-pct' },
        agg.applicable ? `${agg.pctComplete}%` : '—'),
    ]));

    // v0.5.2: applicability-mismatch banner. Fires when MCG says a student
    // must do the event but the board cell is dark-grey. Per KB §0, MCG is
    // authoritative — so this is a Big Board data error to flag, not silently
    // honor.
    if (agg.mismatch) {
      const excusedNames = scopeStudents
        .filter(s => perStudent[s.col].excused)
        .map(s => s.name)
        .join(', ');
      node.appendChild(el('div', {
        class: 'node-mismatch-banner',
        title: 'MCG says these students must do this event, but the Big Board cell is dark-grey (excused). Verify the Big Board.',
      }, `⚠ MCG/DBB mismatch: ${agg.excused} excused on board (${excusedNames})`));
    }

    // Role columns — also need to know who's opted for dimming.
    // v0.5.2: pass perStudent so excused students (rendered but not required)
    // skip the chain check.
    const optedByCol = computeOptedMap(code, payload, rosterStudents, mcgEvent, perStudent);
    const rolesWrap = el('div', { class: 'node-roles' });
    const bothPresent = crew.length && pilots.length;

    if (crew.length) {
      rolesWrap.appendChild(renderRoleCol(crewLabel, crew, perStudent, !bothPresent, optedByCol, code, payload));
    }
    if (pilots.length) {
      rolesWrap.appendChild(renderRoleCol('Pilots', pilots, perStudent, !bothPresent, optedByCol, code, payload));
    }
    if (!crew.length && !pilots.length) {
      rolesWrap.appendChild(el('div', { class: 'role-col single', style: 'color:var(--ink-faint);font-size:10px' },
        '(no applicable students)'));
    }
    node.appendChild(rolesWrap);
    return node;
  }

  // Per-node opt map: which of the applicable students has all board-visible
  // prereqs satisfied? Students who aren't opted get dimmed in the roster.
  // v0.5.2: skip the chain check for excused students — they aren't required
  // to do the event, so prereq satisfaction is irrelevant.
  function computeOptedMap(code, payload, students, mcgEvent, perStudent) {
    const map = {};
    for (const s of students) {
      const ps = perStudent && perStudent[s.col];
      if (ps && ps.excused) { map[s.col] = true; continue; }
      map[s.col] = chain.isOpted(code, payload, s, mcgEvent);
    }
    return map;
  }

  // v0.5.2d: categorize a missing-prereqs list into soft vs hard. The
  // earlier blanket "⚠ SCHEDULED · NOT OPTED" warning was over-aggressive:
  // a student scheduled today (5/4) for an event whose only missing prereq
  // was scheduled on 5/1 is almost certainly fine — the IP just hasn't
  // marked the earlier flight complete yet. That's a soft monitor (verify
  // the past flight got marked) not a hard red warning.
  //
  // Categories:
  //   'hard'        — at least one missing prereq has no plan at all
  //                   (white blank cell, no date). Genuine planning hole.
  //   'soft-past'   — all missing prereqs were scheduled, at least one
  //                   in the past with a still-pending status (flag =
  //                   past-date-unchecked). Probably-done, verify board.
  //   'soft-future' — all missing prereqs are scheduled in the future
  //                   (status = 'scheduled'). Plan is complete; no concern.
  //   null          — nothing missing.
  // Off-board prereqs are ignored (D10: assumed met).
  function categorizeMissing(missing) {
    if (!missing || !missing.length) return null;
    let anyHardHole = false;
    let anyPastDated = false;
    let anyFutureScheduled = false;
    for (const m of missing) {
      if (!m.onBoard) continue;
      // v0.5.2e: past-dated white cells are now classifyCell'd as
      // 'scheduled' with flag='past-date-unchecked'. Categorize off the
      // flag, not the status.
      if (m.status === 'scheduled') {
        if (m.flag === 'past-date-unchecked') anyPastDated = true;
        else anyFutureScheduled = true;
        continue;
      }
      if (m.status === 'paired-opted') {
        // partner not yet through; treat like soft-past for now
        anyPastDated = true;
        continue;
      }
      if (m.status === 'pending') {
        // No date at all → genuine planning hole
        anyHardHole = true;
        continue;
      }
      // unknown / offboard slipped through — treat as hard to be safe
      anyHardHole = true;
    }
    if (anyHardHole) return 'hard';
    if (anyPastDated) return 'soft-past';
    if (anyFutureScheduled) return 'soft-future';
    return null;
  }

  // v0.5.2 (paired events): two students paired on the same event share a
  // bgHex on the board. Look up the partner so the roster can show "& <name>"
  // instead of the unhelpful "paired (partner incomplete)" tooltip.
  function findPairedPartner(ps, perStudent) {
    if (!ps || !ps.cell || ps.cell.rgbFamily !== 'paired' || !ps.cell.bgHex) return null;
    const myHex = ps.cell.bgHex.toUpperCase();
    for (const other of Object.values(perStudent)) {
      if (!other || other === ps || !other.cell) continue;
      if (other.cell.rgbFamily !== 'paired') continue;
      if ((other.cell.bgHex || '').toUpperCase() === myHex) return other;
    }
    return null;
  }

  function renderRoleCol(label, students, perStudent, isSingle, optedByCol, code, payload) {
    const useSingleColumn = students.length <= 5;
    const col = el('div', { class: 'role-col' + (isSingle ? ' single' : '') + (useSingleColumn ? ' one-col' : '') });
    col.appendChild(el('h5', null, label));
    const ul = el('ul');
    for (const s of students) {
      const ps = perStudent[s.col];
      const opted = optedByCol ? optedByCol[s.col] : true;
      const isComplete = ps.completion === 'complete';
      const isScheduled = ps.completion === 'scheduled';
      const isPaired = ps.completion === 'paired-opted';
      const isExcused = !!ps.excused;
      const partner = isPaired ? findPairedPartner(ps, perStudent) : null;

      // v0.5.2 (paired events): paired-opted is a real status — the student
      // has been scheduled with a partner. Show it like SCHEDULED if there's
      // a date, otherwise like OPTED, with a partner suffix appended to the
      // name. Replaces the misleading "paired (partner incomplete)" copy.
      const pairedSuffix = isPaired
        ? (partner ? ` (paired w/ ${partner.name})` : ' (paired)')
        : '';

      // v0.5.2d: categorize the prereq situation (hard hole vs soft-past
      // awaiting-update vs soft-future already-planned). Used both for
      // visual class and tooltip wording.
      const isPrereqWarn = !isComplete && !isExcused && !opted &&
        (isScheduled || isPaired || ps.completion === 'pending');
      let warnCategory = null;  // 'hard' | 'soft-past' | 'soft-future' | null
      let missing = null;
      if (isPrereqWarn && code && payload) {
        missing = chain.missingPrereqs(code, payload, s);
        warnCategory = categorizeMissing(missing);
      }
      const isHardWarn = warnCategory === 'hard';
      const isSoftWarn = warnCategory === 'soft-past' || warnCategory === 'soft-future';

      // v0.5.2: dim excused students (board says not required, MCG says
      // required → flagged via node-level mismatch banner).
      // v0.5.2d: don't dim soft-warn students — their plan is in place.
      const dim = isExcused || (!opted && !isComplete && !isScheduled && !isPaired && !isSoftWarn);

      // v0.5.2e: own cell past-dated → mention "verify" so the user knows
      // the dot is yellow because of date-already-passed, not future-plan.
      const ownPastSched = ps.flag === 'past-date-unchecked';
      const ownSchedSuffix = ownPastSched ? ' — verify' : '';
      const stateText = (
        isExcused ? 'excused on Big Board (MCG says required) ⚠' :
        ps.completion === 'complete' ? 'complete' :
        ps.completion === 'scheduled' && opted ? `scheduled${ownSchedSuffix}` :
        ps.completion === 'scheduled' && isHardWarn ? `scheduled${ownSchedSuffix} (WARN: prereqs not met)` :
        ps.completion === 'scheduled' && warnCategory === 'soft-past' ? `scheduled${ownSchedSuffix} (verify earlier flights)` :
        ps.completion === 'scheduled' && warnCategory === 'soft-future' ? `scheduled${ownSchedSuffix} (earlier prereqs scheduled)` :
        isPaired ? (
          ps.dateText
            ? (opted ? `paired-scheduled${pairedSuffix}`
                     : isHardWarn ? `paired-scheduled (WARN: prereqs not met)${pairedSuffix}`
                                  : `paired-scheduled (verify earlier flights)${pairedSuffix}`)
            : (opted ? `paired-opted (prereqs met)${pairedSuffix}`
                     : isHardWarn ? `paired (WARN: prereqs not met)${pairedSuffix}`
                                  : `paired (earlier prereqs scheduled)${pairedSuffix}`)
        ) :
        ps.completion === 'notreq' ? 'not required' :
        opted ? 'opted (prereqs met, not started)' :
        isHardWarn ? 'pending (prereqs not met)' :
        warnCategory === 'soft-past' ? 'pending (verify earlier flights)' :
        warnCategory === 'soft-future' ? 'pending (earlier prereqs scheduled)' :
        'pending'
      );
      const dateSuffix = ps.dateText ? ` · ${ps.dateText}` : '';

      // v0.5.2c (issues.md v0.5.1 carry-over) — refined in v0.5.2d:
      // hover tooltip lists missing prereqs plus the scheduled date.
      // Header changes by category:
      //   hard       → "WARN: PreReqs Not Met"            (no plan)
      //   soft-past  → "Pending — verify earlier flights" (probably done)
      //   soft-future→ "Earlier prereqs scheduled"        (covered)
      let tooltip;
      if (warnCategory && missing) {
        const header =
          warnCategory === 'hard' ? 'WARN: PreReqs Not Met' :
          warnCategory === 'soft-past' ? 'Pending — verify earlier flights' :
          'Earlier prereqs scheduled';
        const lines = [header];
        if (ps.dateText) lines.push(`Sched - ${ps.dateText}`);
        else if (isPaired && partner) lines.push(`Paired w/ ${partner.name}`);
        if (missing.length) {
          lines.push(warnCategory === 'hard' ? 'Missing:' : 'Awaiting:');
          for (const m of missing.slice(0, 12)) {
            // v0.5.2e: past-dated cells now classify as 'scheduled' with
            // flag='past-date-unchecked'. Distinguish purely off the flag.
            let detail = '';
            if (m.status === 'scheduled' && m.flag === 'past-date-unchecked' && m.dateText) detail = ` (sched ${m.dateText} — verify)`;
            else if (m.status === 'scheduled' && m.dateText) detail = ` (sched ${m.dateText})`;
            else if (m.status === 'paired-opted') detail = ' (paired, partner pending)';
            lines.push(`* ${m.code} - ${m.title || ''}${detail}`);
          }
          if (missing.length > 12) lines.push(`+ ${missing.length - 12} more`);
        }
        tooltip = lines.join('\n');
      } else {
        tooltip = `${s.name} — ${stateText}${dateSuffix}`;
      }

      // v0.5.2d: dot class picks hard vs soft warn variants.
      //   hard warn  → 'warn'      (red pulse — genuine planning hole)
      //   soft warn  → 'warn-soft' (amber, no pulse — verify or covered)
      //   excused    → 'excused'   (hatched grey — board says not required)
      let dotClass = 'dot ' + (isPaired ? 'paired' : ps.completion);
      if (isHardWarn) dotClass += ' warn';
      else if (isSoftWarn) dotClass += ' warn-soft';
      if (isExcused) dotClass = 'dot excused';

      // v0.5.2: name = base name + ⚠ prefix if hard-warn (or excused
      // mismatch) + paired-with-partner suffix when paired-opted.
      // Soft-warn cases skip the ⚠ to avoid signaling alarm — the tooltip
      // still explains the situation.
      const namePieces = [];
      if (isHardWarn || isExcused) namePieces.push(el('span', null, '⚠ '));
      namePieces.push(el('span', null, s.name));
      if (isPaired && pairedSuffix) {
        namePieces.push(el('span', { class: 'paired-suffix' }, pairedSuffix));
      }
      const li = el('li', {
        class: (dim ? 'dim-name ' : '') +
               (isHardWarn ? 'warn-row' : '') +
               (isSoftWarn ? ' warn-row-soft' : '') +
               (isExcused ? ' excused-row' : ''),
        title: tooltip,
      }, [
        el('span', { class: dotClass }),
        el('span', null, namePieces),
      ]);
      ul.appendChild(li);
    }
    col.appendChild(ul);
    return col;
  }

  // ------------------------------------------------------------
  // Node renderer: student view — 4 states per v0.3.2 feedback
  //   DONE      (dark green)  — student has completed the event
  //   OPTED     (light green) — prereqs met but not yet done
  //   SCHEDULED (yellow)      — student has a future date on the sheet
  //   NOT OPTED (red)         — at least one board-visible prereq pending
  // Renamed from v0.3.1 "BLOCKED" per user feedback.
  // ------------------------------------------------------------
  function renderNodeStudent(code, payload, student, isGoal) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    const info = computeNodeForStudent(code, payload, student);
    const isPaired = info.completion === 'paired-opted';
    // v0.5.2d: categorize the prereq-not-met situation so we can pick a
    // soft chip when the missing prereqs are scheduled (vs hard red when
    // there's an actual gap). Avoids the over-aggressive WARN that fired
    // on, e.g., Morrison sched 5/4 when his 5/1 prereq just hadn't been
    // marked complete yet.
    let warnCategory = null;
    if (!isGoal && info.applicable && !info.isComplete && !info.opted) {
      warnCategory = categorizeMissing(chain.missingPrereqs(code, payload, student));
    }
    const isHardWarn = warnCategory === 'hard';
    // v0.5.2e: a past-dated white cell now classifies as 'scheduled' with
    // flag='past-date-unchecked'. Visual stays SCHEDULED yellow; label
    // gains "· VERIFY" so the user knows to check completion.
    const isPastSched = info.flag === 'past-date-unchecked';
    let band = 'goal', label = 'TARGET';
    if (!isGoal) {
      if (info.isComplete) { band = 's-done'; label = 'DONE'; }
      else if (info.completion === 'scheduled' && info.opted) { band = 's-scheduled'; label = isPastSched ? 'SCHEDULED · VERIFY' : 'SCHEDULED'; }
      else if (info.completion === 'scheduled' && isHardWarn) { band = 's-warn'; label = '⚠ SCHEDULED · NOT OPTED'; }
      else if (info.completion === 'scheduled' && warnCategory === 'soft-past') { band = 's-soft'; label = isPastSched ? 'SCHEDULED · VERIFY · & EARLIER' : 'SCHEDULED · VERIFY EARLIER'; }
      else if (info.completion === 'scheduled' && warnCategory === 'soft-future') { band = 's-soft'; label = isPastSched ? 'SCHEDULED · VERIFY · PREREQS PLANNED' : 'SCHEDULED · PREREQS PLANNED'; }
      else if (info.completion === 'scheduled') { band = 's-scheduled'; label = isPastSched ? 'SCHEDULED · VERIFY' : 'SCHEDULED'; }
      // v0.5.2: paired-opted is a real status. With a date → treat like
      // scheduled (paired); without → like opted-but-paired.
      else if (isPaired && info.opted && info.dateText) { band = 's-scheduled'; label = 'PAIRED · SCHEDULED'; }
      else if (isPaired && info.opted) { band = 's-opted'; label = 'PAIRED · OPTED'; }
      else if (isPaired && isHardWarn) { band = 's-warn'; label = '⚠ PAIRED · NOT OPTED'; }
      else if (isPaired) { band = 's-soft'; label = 'PAIRED · VERIFY EARLIER'; }
      else if (info.opted) { band = 's-opted'; label = 'OPTED'; }
      else if (isHardWarn) { band = 's-notopted'; label = 'NOT OPTED'; }
      else if (warnCategory === 'soft-past') { band = 's-soft'; label = 'PENDING · VERIFY EARLIER'; }
      else if (warnCategory === 'soft-future') { band = 's-soft'; label = 'PENDING · PREREQS PLANNED'; }
      else { band = 's-notopted'; label = 'NOT OPTED'; }
    }
    const node = el('div', {
      class: 'node' + (isGoal ? ' goal' : ' ' + band),
      'data-code': code,
    });
    node.appendChild(el('div', { class: 'node-head' }, [
      el('div', { class: 'node-head-code' }, code),
      el('div', { class: 'node-head-title' }, (mcgEvent && mcgEvent.eventName) || boardEvent.title),
    ]));
    if (isGoal) {
      node.appendChild(el('div', { class: 'node-student-chip' },
        el('span', { class: 'chip-pill' }, `TARGET · ${student.name}`)));
    } else {
      // Chip + optional date sub-line. If there's a date on the cell, show it
      // even when the primary state is OPTED or NOT OPTED — per user feedback
      // "should also show 'Scheduled 4/14' in addition to Opted".
      const chipWrap = el('div', { class: 'node-student-chip' });
      chipWrap.appendChild(el('span', { class: 'chip-pill' }, label));
      if (info.dateText && !info.isComplete) {
        chipWrap.appendChild(el('div', {
          class: 'node-date',
          title: 'Date recorded on the big board for this student',
        }, info.dateText));
      }
      node.appendChild(chipWrap);

      // v0.5.1: when prereqs aren't satisfied, surface which ones — helps
      // the user understand why the chip says what it says.
      // v0.5.2d: now also fires for the soft bands (s-soft) and labels
      // each missing prereq with its sched date when present so the user
      // can see "scheduled 5/1, just check the board" at a glance.
      if ((band === 's-notopted' || band === 's-warn' || band === 's-soft') && !info.isComplete) {
        const missing = chain.missingPrereqs(code, payload, student);
        if (missing.length) {
          const list = el('div', { class: 'node-missing' });
          const labelText =
            band === 's-warn' ? `Missing prereq${missing.length > 1 ? 's' : ''} (${missing.length}):` :
            band === 's-soft' ? (warnCategory === 'soft-past' ? 'Awaiting board update on:' : 'Earlier scheduled:') :
            `Missing prereq${missing.length > 1 ? 's' : ''} (${missing.length}):`;
          list.appendChild(el('div', { class: 'node-missing-label' }, labelText));
          const ul = el('ul');
          for (const m of missing.slice(0, 8)) {
            // v0.5.2e: past-dated → 'scheduled' + flag='past-date-unchecked'.
            let detail = '';
            if (m.status === 'scheduled' && m.flag === 'past-date-unchecked' && m.dateText) detail = ` (sched ${m.dateText} — verify)`;
            else if (m.status === 'scheduled' && m.dateText) detail = ` (sched ${m.dateText})`;
            else if (m.status === 'scheduled') detail = ' (scheduled)';
            ul.appendChild(el('li', { title: m.title || m.code }, m.code + detail));
          }
          if (missing.length > 8) ul.appendChild(el('li', { class: 'more' }, '+ ' + (missing.length - 8) + ' more'));
          list.appendChild(ul);
          node.appendChild(list);
        }
      }
    }
    return node;
  }

  // ------------------------------------------------------------
  // Layout: put nodes into tiers (columns) by depth.
  // Filters:
  //   class view  — drop nodes where every goal-scoped student has a
  //                 dark-grey cell (board says "not required"). This uses
  //                 board data as the sole source of truth, not MCG
  //                 applicability codes.
  //   student view — drop nodes where the student's cell is dark-grey
  //                  or the student isn't applicable.
  // Returns { tiers: [[code, ...], ...] } where tier[0] = goal.
  // ------------------------------------------------------------
  function layoutDag(dag, payload, { mode, student, scopeStudents }) {
    // v0.5: applicability pruning now happens inside buildDag (per-viewer
    // walks are already filtered). layoutDag only handles:
    //   (a) orphan filter — drop isolated nodes (except the goal),
    //   (b) tier distribution for fallback layout,
    //   (c) pass-through for group-virtual nodes.
    const tiers = [];
    for (let d = 0; d <= Math.ceil(dag.maxDepth); d++) tiers.push([]);

    const allCodes = new Set(Object.keys(dag.nodesByCode));
    let edges = dag.edges.filter(e => allCodes.has(e.from) && allCodes.has(e.to));

    const goalCode = Object.keys(dag.nodesByCode).find(c => (dag.nodesByCode[c].depth || 0) === 0);
    const connected = new Set(goalCode ? [goalCode] : []);
    for (const e of edges) { connected.add(e.from); connected.add(e.to); }
    const visible = new Set([...allCodes].filter(c => connected.has(c)));
    edges = edges.filter(e => visible.has(e.from) && visible.has(e.to));

    for (const code of visible) {
      const d = Math.max(0, Math.floor(dag.nodesByCode[code].depth || 0));
      if (!tiers[d]) tiers[d] = [];
      tiers[d].push(code);
    }
    for (const t of tiers) t.sort();
    return { tiers, edges };
  }

  // ------------------------------------------------------------
  // Arrow renderer: single SVG overlaying the canvas, drawing a
  // cubic bezier from right-edge of source to left-edge of target.
  // Called after nodes are attached so getBoundingClientRect works.
  // Source-node status determines arrow color.
  // ------------------------------------------------------------
  function drawArrows(canvas, edges, payload, { mode, student }) {
    // Remove old SVG if present
    const existing = canvas.querySelector('svg.dag-arrows');
    if (existing) existing.remove();
    if (!edges.length) return;

    const canvasRect = canvas.getBoundingClientRect();
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'dag-arrows');
    svg.setAttribute('width', canvas.scrollWidth);
    svg.setAttribute('height', canvas.scrollHeight);

    // Arrowhead markers (one per color)
    const defs = document.createElementNS(svgNS, 'defs');
    for (const cls of ['a-green', 'a-yellow', 'a-none', 'a-goal']) {
      const m = document.createElementNS(svgNS, 'marker');
      m.setAttribute('id', 'mk-' + cls);
      m.setAttribute('viewBox', '0 0 10 10');
      m.setAttribute('refX', '8'); m.setAttribute('refY', '5');
      m.setAttribute('markerWidth', '7'); m.setAttribute('markerHeight', '7');
      m.setAttribute('orient', 'auto-start-reverse');
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', 'M0,0 L10,5 L0,10 z');
      p.setAttribute('fill',
        cls === 'a-green' ? '#2e7d32' :
        cls === 'a-yellow' ? '#b88600' :
        cls === 'a-none' ? '#c62828' : '#999');
      m.appendChild(p); defs.appendChild(m);
    }
    svg.appendChild(defs);

    for (const e of edges) {
      const fromNode = canvas.querySelector(`.node[data-code="${cssEsc(e.from)}"]`);
      const toNode = canvas.querySelector(`.node[data-code="${cssEsc(e.to)}"]`);
      if (!fromNode || !toNode) continue;
      const fr = fromNode.getBoundingClientRect();
      const tr = toNode.getBoundingClientRect();
      // Source right edge → target left edge (canvas-relative)
      const x1 = fr.right - canvasRect.left;
      const y1 = fr.top - canvasRect.top + fr.height / 2;
      const x2 = tr.left - canvasRect.left;
      const y2 = tr.top - canvasRect.top + tr.height / 2;
      const dx = Math.max(30, (x2 - x1) * 0.4);
      const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;

      // Arrow color = source node status. Virtual group source → neutral.
      let cls = 'a-none';
      const srcIsGroup = typeof e.from === 'string' && e.from.startsWith('GROUP:');
      if (srcIsGroup) {
        cls = 'a-goal';
      } else if (mode === 'student' && student) {
        const info = computeNodeForStudent(e.from, payload, student);
        if (!info.applicable) cls = 'a-goal';
        else if (info.isComplete) cls = 'a-green';
        else if (info.completion === 'scheduled') cls = 'a-yellow';
        else if (info.opted) cls = 'a-green';
        else cls = 'a-none';
      } else if (payload.byCode[e.from]) {
        const scope = goalScopeStudents(payload, _lastGoalCode || e.to);
        const boardEvent = payload.byCode[e.from];
        const mcgEvent = MCG_GRAPH.events[e.from];
        const perStudent = statusModule.computeEventStatus(boardEvent, scope, payload.classMeta);
        const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scope);
        cls = arrowClassForBand(bandForPct(agg.pctComplete, agg.applicable));
      } else {
        cls = 'a-goal';
      }
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', cls);
      path.setAttribute('marker-end', `url(#mk-${cls})`);
      path.setAttribute('data-edge-key', e.from + '→' + e.to);  // v0.5.1: focus targeting
      svg.appendChild(path);
    }
    canvas.insertBefore(svg, canvas.firstChild);
  }

  function cssEsc(s) { return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/([^\w-])/g, '\\$1'); }

  // ------------------------------------------------------------
  // Main render entry — called by boot() on Load and on any
  // state change (view / goal / student).
  // ------------------------------------------------------------
  function renderAll(payload, opts) {
    opts = opts || {};
    const mode = opts.mode || 'class';
    const goalCode = opts.goalCode;
    const student = opts.studentCol
      ? payload.students.find(s => s.col === opts.studentCol)
      : null;

    _focusedCode = null;  // v0.5.1: fresh render = fresh focus state
    const main = $('#main');
    main.innerHTML = '';

    if (!goalCode) {
      main.appendChild(el('div', { class: 'dag-empty' }, [
        el('h2', null, 'Pick a target event above.'),
        el('p', null, 'The canvas will draw the board-visible prereq chain leading to that goal.'),
      ]));
      $('#goal-summary').style.display = 'none';
      return;
    }
    if (mode === 'student' && !student) {
      main.appendChild(el('div', { class: 'dag-empty' }, [
        el('h2', null, 'Pick a student.'),
        el('p', null, 'Student view needs a student selected.'),
      ]));
      $('#goal-summary').style.display = 'none';
      return;
    }
    if (!payload.byCode[goalCode]) {
      main.appendChild(el('div', { class: 'dag-empty' }, [
        el('h2', null, `${goalCode} is not on this board.`),
        el('p', null, goalCode === 'SY 7521O'
          ? 'Try a STC tab in the Board picker above — SY 7521O lives on the STC board.'
          : 'This goal event exists in the MCG but isn\'t on the currently loaded tab.'),
      ]));
      $('#goal-summary').style.display = 'none';
      return;
    }

    // v0.3.2: Student view — if the selected student isn't applicable to
    // the chosen goal, don't render a DAG at all. Show an explicit Not
    // Applicable screen per issue feedback.
    if (mode === 'student' && student) {
      const goalEvt = payload.byCode[goalCode];
      const goalCell = goalEvt && goalEvt.cells.find(c => c.col === student.col);
      const notRequired = goalCell && goalCell.rgbFamily === 'darkGrey';
      if (notRequired) {
        const mcg = MCG_GRAPH.events[goalCode] || {};
        main.appendChild(el('div', { class: 'dag-empty' }, [
          el('h2', null, 'Not Applicable'),
          el('p', null, `${goalCode} (${mcg.eventName || ''}) is not required for ${student.name}.`),
          el('p', null, `${student.name} (${student.type}) has a dark-grey cell — the scheduler does not require this event.`),
          el('p', { style: 'margin-top:10px;font-size:12px;color:var(--ink-faint)' },
            'Pick a different goal or switch to Class view.'),
        ]));
        $('#goal-summary').style.display = 'none';
        return;
      }
    }

    _lastGoalCode = goalCode;
    const scopeStudents = goalScopeStudents(payload, goalCode);

    // Build DAG + filtered layout. v0.5: buildDag is viewer-aware and
    // applies Rule A / DG / condition / oneOf / series-collapse per
    // student (class mode = union).
    const dag = buildDag(goalCode, payload, { mode, student });
    const layout = layoutDag(dag, payload, { mode, student, scopeStudents });

    const mcgGoal = MCG_GRAPH.events[goalCode];
    const dagreAvailable = typeof dagre !== 'undefined';
    const canvas = el('div', {
      class: 'dag-canvas' + (dagreAvailable ? '' : ' fallback'),
      id: 'dag-canvas',
    });

    // Collect visible node codes in a flat list (dagre doesn't care about tiers)
    const visibleCodes = [];
    for (const codes of layout.tiers) for (const c of codes) visibleCodes.push(c);

    // Build all node DOM elements first — we need them in the DOM to measure
    // their size before running dagre. Nodes are rendered invisible until
    // layout completes so we don't flash the pre-layout positions.
    const nodeByCode = {};
    for (const code of visibleCodes) {
      const isGoal = code === goalCode;
      const meta = dag.nodesByCode[code];
      let node;
      if (meta && meta.isGroup) {
        node = renderNodeGroup(code, meta, payload, student, mode);
      } else if (meta && meta.isMissing) {
        node = renderNodeMissing(code, meta, payload);
      } else {
        node = mode === 'student'
          ? renderNodeStudent(code, payload, student, isGoal)
          : renderNodeClass(code, payload, isGoal, scopeStudents, mcgGoal);
      }
      if (dagreAvailable) {
        node.style.visibility = 'hidden';
        node.style.left = '0px';
        node.style.top = '0px';
      }
      // v0.5.1: click-to-focus. Clicking the node body (anywhere except the
      // +/- toggle, which already calls e.stopPropagation) sets focus on this
      // event. Click the canvas background to clear focus.
      node.addEventListener('click', (e) => {
        e.stopPropagation();
        if (_focusedCode === code) clearFocus();
        else setFocus(code);
      });
      nodeByCode[code] = node;
      canvas.appendChild(node);
    }
    canvas.addEventListener('click', () => clearFocus());
    main.appendChild(canvas);

    _lastCanvas = canvas;
    _lastPayload = payload;
    _lastEdges = layout.edges;
    _lastMode = mode;
    _lastStudent = student;
    _lastVisibleCodes = visibleCodes;
    _lastNodeByCode = nodeByCode;

    if (dagreAvailable) {
      // Wait for DOM to compute sizes, then layout.
      requestAnimationFrame(() => requestAnimationFrame(() => applyDagreLayout()));
    } else {
      // Fallback path — needs the tiered column structure the pre-v0.4
      // code generated. Re-render with columns.
      main.innerHTML = '';
      const canvasFb = el('div', { class: 'dag-canvas fallback', id: 'dag-canvas' });
      for (let d = 0; d < layout.tiers.length; d++) {
        const codes = layout.tiers[d];
        if (!codes.length) continue;
        const col = el('div', { class: 'dag-col' });
        col.appendChild(el('div', { class: 'dag-col-label' }, d === 0 ? 'GOAL' : `TIER −${d}`));
        for (const code of codes) {
          const isGoal = d === 0;
          const n = mode === 'student'
            ? renderNodeStudent(code, payload, student, isGoal)
            : renderNodeClass(code, payload, isGoal, scopeStudents, mcgGoal);
          col.appendChild(n);
        }
        canvasFb.appendChild(col);
      }
      main.appendChild(canvasFb);
      _lastCanvas = canvasFb;
      redrawArrowsSoon();
      banner('Dagre not loaded — using fallback column layout. Check that dagre.min.js sits next to index.html.', true);
    }

    if (_resizeObserver) _resizeObserver.disconnect();
    if (typeof ResizeObserver !== 'undefined' && dagreAvailable) {
      _resizeObserver = new ResizeObserver(() => redrawArrowsSoon());
      _resizeObserver.observe(_lastCanvas);
    }

    // Summary strip
    renderGoalSummary(payload, goalCode, dag, layout, mode, student, scopeStudents);
  }

  // Measure all rendered nodes, feed sizes+edges to dagre, then position
  // nodes using dagre's coords and draw arrows through its waypoints.
  function applyDagreLayout() {
    if (!_lastCanvas || !_lastVisibleCodes) return;
    const canvas = _lastCanvas;
    const nodeByCode = _lastNodeByCode;
    const edges = _lastEdges;
    const settings = getLayoutSettings();

    const g = new dagre.graphlib.Graph({ compound: false });
    const graphOpts = {
      rankdir: settings.rankdir,
      ranksep: settings.ranksep,
      nodesep: settings.nodesep,
      edgesep: settings.edgesep,
      marginx: settings.marginx,
      marginy: settings.marginy,
      ranker: settings.ranker,
    };
    if (settings.align) graphOpts.align = settings.align;
    g.setGraph(graphOpts);
    g.setDefaultEdgeLabel(() => ({}));

    // Measure each node (its CSS class already reflects collapsed/expanded state)
    for (const code of _lastVisibleCodes) {
      const el = nodeByCode[code];
      const rect = el.getBoundingClientRect();
      g.setNode(code, { width: rect.width, height: rect.height });
    }

    // Optional: boost weight on edges that point directly into the goal so
    // dagre prefers to keep that final chain straight.
    const goalCode = _lastGoalCode;
    for (const e of edges) {
      if (g.hasNode(e.from) && g.hasNode(e.to)) {
        const attrs = { code_from: e.from, code_to: e.to, bridge: e.bridge || [] };
        if (settings.goalEdgeWeight > 1 && e.to === goalCode) {
          attrs.weight = settings.goalEdgeWeight;
        }
        if (settings.minlen > 1) attrs.minlen = settings.minlen;
        g.setEdge(e.from, e.to, attrs);
      }
    }

    try {
      dagre.layout(g);
    } catch (err) {
      console.error('[bbcs] dagre.layout threw:', err);
      banner('Layout error: ' + (err.message || err), true);
      return;
    }

    // Apply positions
    g.nodes().forEach(code => {
      const n = g.node(code);
      const el = nodeByCode[code];
      if (!el || !n) return;
      const left = n.x - n.width / 2;
      const top = n.y - n.height / 2;
      el.style.left = left + 'px';
      el.style.top = top + 'px';
      el.style.visibility = '';
    });

    // Size canvas to graph bounding box
    const gi = g.graph();
    canvas.style.width = (gi.width + 20) + 'px';
    canvas.style.height = (gi.height + 20) + 'px';

    drawArrowsDagre(canvas, g, _lastPayload, { mode: _lastMode, student: _lastStudent });
    // v0.5.1: re-apply click-to-focus state if any (re-layout wipes the SVG)
    if (_focusedCode) setFocus(_focusedCode);
  }

  // Expand/collapse all nodes in the current canvas.
  function setAllExpanded(shouldExpand) {
    if (!_lastCanvas) return;
    const nodes = _lastCanvas.querySelectorAll('.node:not(.goal)');
    nodes.forEach(n => {
      const code = n.getAttribute('data-code');
      if (!code) return;
      if (shouldExpand) {
        expanded.add(code);
        n.classList.remove('collapsed');
      } else {
        expanded.delete(code);
        n.classList.add('collapsed');
      }
      const toggle = n.querySelector('.node-toggle');
      if (toggle) {
        toggle.textContent = shouldExpand ? '−' : '+';
        toggle.title = shouldExpand ? 'Collapse' : 'Expand';
      }
    });
    redrawArrowsSoon();
  }

  // v0.4: toggles and resizes trigger a full dagre re-layout (nodes change
  // size, so the whole rank layout may shift). Fallback path just redraws
  // arrows since there's no dagre output to reapply.
  function redrawArrowsSoon() {
    if (!_lastCanvas || !_lastEdges) return;
    if (typeof dagre !== 'undefined' && _lastVisibleCodes) {
      requestAnimationFrame(() => requestAnimationFrame(() => applyDagreLayout()));
    } else {
      requestAnimationFrame(() => requestAnimationFrame(() =>
        drawArrows(_lastCanvas, _lastEdges, _lastPayload, { mode: _lastMode, student: _lastStudent })));
    }
  }

  // SVG arrow renderer using dagre edge waypoints. Waypoints are computed
  // to avoid passing through nodes. Draw a smoothed path through them.
  function drawArrowsDagre(canvas, dagreGraph, payload, { mode, student }) {
    const existing = canvas.querySelector('svg.dag-arrows');
    if (existing) existing.remove();

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'dag-arrows');
    const gi = dagreGraph.graph();
    svg.setAttribute('width', gi.width + 20);
    svg.setAttribute('height', gi.height + 20);
    svg.style.pointerEvents = 'none';

    const defs = document.createElementNS(svgNS, 'defs');
    for (const cls of ['a-green', 'a-yellow', 'a-none', 'a-goal']) {
      const m = document.createElementNS(svgNS, 'marker');
      m.setAttribute('id', 'mk-' + cls);
      m.setAttribute('viewBox', '0 0 10 10');
      m.setAttribute('refX', '8'); m.setAttribute('refY', '5');
      m.setAttribute('markerWidth', '7'); m.setAttribute('markerHeight', '7');
      m.setAttribute('orient', 'auto-start-reverse');
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', 'M0,0 L10,5 L0,10 z');
      p.setAttribute('fill',
        cls === 'a-green' ? '#2e7d32' :
        cls === 'a-yellow' ? '#b88600' :
        cls === 'a-none' ? '#c62828' : '#999');
      m.appendChild(p); defs.appendChild(m);
    }
    svg.appendChild(defs);

    const lineStyle = window.bbcsLineStyle || 'polyline';

    dagreGraph.edges().forEach(e => {
      const edge = dagreGraph.edge(e);
      if (!edge.points || edge.points.length < 2) return;
      const pts = edge.points;

      // Clamp first and last points to the actual node edges so arrows
      // visibly start/end at the container border instead of looking like
      // they emerge from the centroid. Dagre places endpoints near the
      // border but the exact point depends on internal rank offsets; for
      // visual consistency we push them to the mid-height of the facing
      // edge (right-center of source, left-center of target).
      const srcNode = dagreGraph.node(e.v);
      const tgtNode = dagreGraph.node(e.w);
      if (srcNode) { pts[0] = { x: srcNode.x + srcNode.width / 2, y: srcNode.y }; }
      if (tgtNode) { pts[pts.length - 1] = { x: tgtNode.x - tgtNode.width / 2, y: tgtNode.y }; }

      let d;
      if (lineStyle === 'straight') {
        // Ignore waypoints entirely — direct line from source to target.
        d = `M ${pts[0].x} ${pts[0].y} L ${pts[pts.length - 1].x} ${pts[pts.length - 1].y}`;
      } else if (lineStyle === 'smooth') {
        // Cubic bezier per segment with horizontal tangent control points.
        d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const dx = b.x - a.x;
          const c1x = a.x + dx * 0.5, c1y = a.y;
          const c2x = a.x + dx * 0.5, c2y = b.y;
          d += ` C ${c1x} ${c1y} ${c2x} ${c2y} ${b.x} ${b.y}`;
        }
      } else if (lineStyle === 'orthogonal') {
        // Right-angle routing: for each segment, go horizontally half-way,
        // then vertically to the target y, then horizontally the rest.
        d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const midX = (a.x + b.x) / 2;
          d += ` L ${midX} ${a.y} L ${midX} ${b.y} L ${b.x} ${b.y}`;
        }
      } else {
        // Polyline — straight segments between dagre waypoints. Default.
        d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
      }

      // Arrow color = source node status. Group (virtual) source → neutral.
      let cls = 'a-none';
      const srcIsGroup = typeof e.v === 'string' && e.v.startsWith('GROUP:');
      if (srcIsGroup) {
        cls = 'a-goal';
      } else if (mode === 'student' && student) {
        const info = computeNodeForStudent(e.v, payload, student);
        if (!info.applicable) cls = 'a-goal';
        else if (info.isComplete) cls = 'a-green';
        else if (info.completion === 'scheduled' && !info.opted) cls = 'a-none';
        else if (info.completion === 'scheduled') cls = 'a-yellow';
        else if (info.opted) cls = 'a-green';
        else cls = 'a-none';
      } else if (payload.byCode[e.v]) {
        const scope = goalScopeStudents(payload, _lastGoalCode || e.w);
        const boardEvent = payload.byCode[e.v];
        const mcgEvent = MCG_GRAPH.events[e.v];
        const perStudent = statusModule.computeEventStatus(boardEvent, scope, payload.classMeta);
        const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scope);
        cls = arrowClassForBand(bandForPct(agg.pctComplete, agg.applicable));
      } else {
        cls = 'a-goal';
      }
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', cls);
      path.setAttribute('marker-end', `url(#mk-${cls})`);
      path.setAttribute('data-edge-key', e.v + '→' + e.w);  // v0.5.1: focus targeting
      // Bridge tooltip — surfaces off-board prereqs traversed on this edge
      if (edge.bridge && edge.bridge.length) {
        const titleEl = document.createElementNS(svgNS, 'title');
        titleEl.textContent = 'via off-board: ' + edge.bridge.join(' → ');
        path.appendChild(titleEl);
        path.style.pointerEvents = 'stroke';  // so hover works on the line
      }
      svg.appendChild(path);
    });

    canvas.insertBefore(svg, canvas.firstChild);
  }

  // ------------------------------------------------------------
  // v0.5.1: Click-to-focus highlighting.
  // setFocus(code): dim everything except `code`, its direct upstream
  //   prereqs (events that are listed as `from` on edges where to=code),
  //   and the connecting edges. Click again or click empty canvas clears.
  // ------------------------------------------------------------
  function setFocus(code) {
    if (!_lastCanvas || !_lastEdges) return;
    _focusedCode = code;
    const directPrereqs = new Set();
    for (const e of _lastEdges) if (e.to === code) directPrereqs.add(e.from);
    // Highlight set = clicked + direct upstream
    const highlight = new Set([code, ...directPrereqs]);
    // Apply CSS classes
    _lastCanvas.classList.add('has-focus');
    const allNodes = _lastCanvas.querySelectorAll('.node');
    allNodes.forEach(n => {
      const c = n.getAttribute('data-code');
      n.classList.remove('focused', 'focus-prereq', 'dimmed');
      if (c === code) n.classList.add('focused');
      else if (directPrereqs.has(c)) n.classList.add('focus-prereq');
      else n.classList.add('dimmed');
    });
    // Dim/un-dim arrows: keep arrows whose target = focused code
    const svg = _lastCanvas.querySelector('svg.dag-arrows');
    if (svg) {
      const paths = svg.querySelectorAll('path[data-edge-key]');
      paths.forEach(p => {
        const ek = p.getAttribute('data-edge-key');
        if (!ek) return;
        const [from, to] = ek.split('→');
        p.classList.remove('focus-edge', 'dim-edge');
        if (to === code) p.classList.add('focus-edge');
        else p.classList.add('dim-edge');
      });
    }
  }
  function clearFocus() {
    _focusedCode = null;
    if (!_lastCanvas) return;
    _lastCanvas.classList.remove('has-focus');
    _lastCanvas.querySelectorAll('.node').forEach(n => {
      n.classList.remove('focused', 'focus-prereq', 'dimmed');
    });
    const svg = _lastCanvas.querySelector('svg.dag-arrows');
    if (svg) svg.querySelectorAll('path[data-edge-key]').forEach(p => p.classList.remove('focus-edge', 'dim-edge'));
  }

  function renderGoalSummary(payload, goalCode, dag, layout, mode, student, scopeStudents) {
    const wrap = $('#goal-summary');
    wrap.style.display = 'flex';
    wrap.innerHTML = '';
    const mcg = MCG_GRAPH.events[goalCode] || {};
    const totalNodes = Object.keys(dag.nodesByCode).length;
    const visible = layout.tiers.reduce((n, t) => n + t.length, 0);
    const hidden = totalNodes - visible;
    const parts = [
      ['Target', `${goalCode} — ${mcg.eventName || ''}`],
      ['Applicability', (mcg.applicability || []).join(', ') || 'unrestricted'],
      ['View', mode === 'student' ? `Student — ${student.name} (${student.type})` : `Class aggregate (${(scopeStudents || payload.students).length} in scope)`],
      ['Board', payload.sheetName],
      ['Nodes shown', `${visible} of ${totalNodes}${hidden ? ` (${hidden} hidden)` : ''}`],
    ];
    for (const [k, v] of parts) {
      wrap.appendChild(el('div', null, [el('span', null, k + ': '), el('strong', null, v)]));
    }
  }

  return { renderAll, setAllExpanded, buildDag };
})();

/* --------------------------------------------------------
 * issues.js — fetch and render issues.md (simple MD subset)
 * -------------------------------------------------------- */
const issues = (() => {
  async function fetchIssues() {
    try {
      const r = await fetch('./issues.md');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.text();
    } catch (e) {
      return null;
    }
  }

  function renderMarkdown(md) {
    // Minimal MD: headings + **bold** + bullet lists. Good enough for the log.
    const lines = md.split(/\r?\n/);
    const out = [];
    for (let line of lines) {
      if (/^#+\s/.test(line)) {
        const depth = line.match(/^#+/)[0].length;
        const tag = 'h' + Math.min(depth + 2, 6);
        out.push(`<${tag}>${escHtml(line.replace(/^#+\s*/, ''))}</${tag}>`);
      } else if (/^---$/.test(line)) {
        out.push('<hr>');
      } else if (/^\s*[-*]\s+/.test(line)) {
        out.push(`<li>${escHtml(line.replace(/^\s*[-*]\s+/, ''))}</li>`);
      } else if (line.trim() === '') {
        out.push('<br>');
      } else {
        out.push(`<p>${escHtml(line).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>')}</p>`);
      }
    }
    return out.join('\n');
  }

  async function showPanel() {
    openPanel('Issue Log', null);
    const md = await fetchIssues();
    const body = $('#panel-body');
    if (md == null) {
      body.innerHTML = `
        <p>Couldn't fetch <code>issues.md</code> (probably running from <code>file://</code>).</p>
        <p>Either:</p>
        <ul>
          <li>Serve this folder locally: <code>python -m http.server 8080</code></li>
          <li>Or paste the file contents below:</li>
        </ul>
        <textarea id="paste-issues" style="width:100%;height:200px;font-family:var(--mono);font-size:11px;margin-top:8px;padding:8px;"></textarea>
        <button class="btn" style="margin-top:8px" id="paste-render">Render pasted issues</button>
        <div id="paste-output"></div>
      `;
      $('#paste-render').addEventListener('click', () => {
        const v = $('#paste-issues').value;
        $('#paste-output').innerHTML = '<hr>' + renderMarkdown(v);
      });
    } else {
      body.innerHTML = renderMarkdown(md);
    }
  }

  return { showPanel };
})();

/* --------------------------------------------------------
 * v0.5.2a — App settings (display toggles + duplicate handling).
 * Persisted to localStorage.bbcs::settings. Separate from layout
 * knobs so a user's display preferences survive a layout reset.
 * -------------------------------------------------------- */
// Event types that the Big Board is expected to track (if MCG says you need
// an event of this type and it's not on the board, that's a gap worth
// flagging). R/Y/Z/W/O are curriculum-only (reports, debriefs, working groups,
// space-ops) — we collapse those through bridges silently as before.
const BB_TRACKED_TYPES_ALL = new Set(['F','C','L','S','E','G','H','M','B','I']);

const APP_SETTINGS_DEFAULTS = Object.freeze({
  showMIBs: true,               // M-type nodes
  showAsync: true,              // B-type nodes
  showExams: false,             // E-type nodes (default off — low-signal for most users)
  showGround: false,            // G-type nodes (ground school — same)
  showMissingFromBB: true,      // render MCG-required-but-missing as warning nodes
  showUntrackedOffBoard: false, // show A/R/Y/Z/W/O as ghost nodes (default: hide/bridge)
  duplicates: {},               // { code: { mode: 'any'|'all'|'one', selected: [rowNumbers] } }
});
let _appSettings = null;
function getAppSettings() {
  if (_appSettings) return _appSettings;
  let stored = {};
  try { stored = JSON.parse(localStorage.getItem('bbcs::settings') || '{}'); } catch (_) {}
  _appSettings = Object.assign({}, APP_SETTINGS_DEFAULTS, stored);
  // Deep-restore duplicates subobject so stored overrides aren't lost
  _appSettings.duplicates = Object.assign({}, APP_SETTINGS_DEFAULTS.duplicates, (stored && stored.duplicates) || {});
  return _appSettings;
}
function saveAppSettings() {
  try { localStorage.setItem('bbcs::settings', JSON.stringify(_appSettings)); } catch (_) {}
}
function setAppSetting(key, value) {
  getAppSettings();
  _appSettings[key] = value;
  saveAppSettings();
}
function resetAppSettings() {
  _appSettings = JSON.parse(JSON.stringify(APP_SETTINGS_DEFAULTS));
  saveAppSettings();
}

// Effective BB-tracked types given user toggles. An event type in this set
// is "shown" (either as on-board node or as missing-from-BB warning). An
// event type NOT in this set is silently bridged through, regardless of
// whether the BB tracks it. So "hide MIBs" hides on-BB MIBs too.
function effectiveTrackedTypes() {
  const s = getAppSettings();
  const set = new Set(BB_TRACKED_TYPES_ALL);
  if (!s.showMIBs)   set.delete('M');
  if (!s.showAsync)  set.delete('B');
  if (!s.showExams)  set.delete('E');
  if (!s.showGround) set.delete('G');
  return set;
}

/* --------------------------------------------------------
 * Layout-knobs panel — exposes every dagre setting as a live
 * input. Changes are debounced 120ms and trigger re-layout.
 * Settings persist to localStorage.
 * -------------------------------------------------------- */
const LAYOUT_DEFAULTS = Object.freeze({
  rankdir: 'LR',
  ranksep: 80,
  nodesep: 16,
  edgesep: 8,
  marginx: 20,
  marginy: 20,
  ranker: 'network-simplex',
  align: '',            // '' = balanced (default); UL | UR | DL | DR
  minlen: 1,
  goalEdgeWeight: 1,    // multiplier for edges pointing into the goal
});

let _layoutSettings = null;
function getLayoutSettings() {
  if (_layoutSettings) return _layoutSettings;
  let stored = {};
  try { stored = JSON.parse(localStorage.getItem('bbcs::layoutKnobs') || '{}'); } catch (_) {}
  _layoutSettings = Object.assign({}, LAYOUT_DEFAULTS, stored);
  return _layoutSettings;
}
function setLayoutSetting(key, value) {
  const s = getLayoutSettings();
  s[key] = value;
  try { localStorage.setItem('bbcs::layoutKnobs', JSON.stringify(s)); } catch (_) {}
}
function resetLayoutSettings() {
  _layoutSettings = Object.assign({}, LAYOUT_DEFAULTS);
  try { localStorage.removeItem('bbcs::layoutKnobs'); } catch (_) {}
}

function layoutPanel() {
  const s = getLayoutSettings();
  const html = `
    <p style="font-size:12px; color:var(--ink-soft); margin-bottom:10px;">
      Every knob dagre exposes. Changes re-layout immediately.
    </p>

    <h4>Direction + algorithm</h4>
    <div class="knob-grid">
      <label>rankdir</label>
      <select data-knob="rankdir">
        <option value="LR" ${s.rankdir === 'LR' ? 'selected' : ''}>LR — prereq ← left, goal → right</option>
        <option value="RL" ${s.rankdir === 'RL' ? 'selected' : ''}>RL — flipped (goal on left)</option>
        <option value="TB" ${s.rankdir === 'TB' ? 'selected' : ''}>TB — top to bottom</option>
        <option value="BT" ${s.rankdir === 'BT' ? 'selected' : ''}>BT — bottom to top</option>
      </select>
      <label>ranker</label>
      <select data-knob="ranker">
        <option value="network-simplex" ${s.ranker === 'network-simplex' ? 'selected' : ''}>network-simplex (best quality, default)</option>
        <option value="tight-tree" ${s.ranker === 'tight-tree' ? 'selected' : ''}>tight-tree (faster, more compact)</option>
        <option value="longest-path" ${s.ranker === 'longest-path' ? 'selected' : ''}>longest-path (fastest, lower quality)</option>
      </select>
      <label>align</label>
      <select data-knob="align">
        <option value="" ${s.align === '' ? 'selected' : ''}>balanced (default)</option>
        <option value="UL" ${s.align === 'UL' ? 'selected' : ''}>UL — upper-left</option>
        <option value="UR" ${s.align === 'UR' ? 'selected' : ''}>UR — upper-right</option>
        <option value="DL" ${s.align === 'DL' ? 'selected' : ''}>DL — lower-left</option>
        <option value="DR" ${s.align === 'DR' ? 'selected' : ''}>DR — lower-right</option>
      </select>
    </div>

    <h4>Spacing (pixels)</h4>
    <div class="knob-grid">
      <label title="Gap between ranks (horizontal for LR)">ranksep</label>
      <input type="number" min="0" max="400" step="5" data-knob="ranksep" value="${s.ranksep}">
      <label title="Gap between nodes in the same rank">nodesep</label>
      <input type="number" min="0" max="200" step="2" data-knob="nodesep" value="${s.nodesep}">
      <label title="Gap between parallel edges">edgesep</label>
      <input type="number" min="0" max="100" step="1" data-knob="edgesep" value="${s.edgesep}">
      <label title="Left/right canvas padding">marginx</label>
      <input type="number" min="0" max="200" step="5" data-knob="marginx" value="${s.marginx}">
      <label title="Top/bottom canvas padding">marginy</label>
      <input type="number" min="0" max="200" step="5" data-knob="marginy" value="${s.marginy}">
    </div>

    <h4>Per-edge tuning</h4>
    <div class="knob-grid">
      <label title="Force every edge to span ≥ N ranks. Default 1.">minlen</label>
      <input type="number" min="1" max="5" step="1" data-knob="minlen" value="${s.minlen}">
      <label title="Weight multiplier for edges pointing directly into the goal. Higher = straighter.">goal-edge weight</label>
      <input type="number" min="1" max="10" step="1" data-knob="goalEdgeWeight" value="${s.goalEdgeWeight}">
    </div>

    <div style="margin-top:14px; display:flex; gap:8px; flex-wrap: wrap;">
      <button class="btn" id="knobs-reset">Reset to defaults</button>
      <button class="btn" id="knobs-close">Close</button>
    </div>

    <h4 style="margin-top:18px;">Presets</h4>
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <button class="btn" data-preset="compact">Compact</button>
      <button class="btn" data-preset="normal">Normal</button>
      <button class="btn" data-preset="spacious">Spacious</button>
    </div>
  `;
  openPanel('Layout knobs', html);

  // Live-update handlers
  const debounced = debounce(() => {
    if (state && state.payload) renderCurrent();
  }, 120);

  $$('#panel-body [data-knob]').forEach(input => {
    input.addEventListener('input', (e) => {
      const key = e.target.dataset.knob;
      const raw = e.target.value;
      const value = (e.target.type === 'number') ? (parseFloat(raw) || 0) : raw;
      setLayoutSetting(key, value);
      debounced();
    });
  });

  $$('#panel-body [data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const preset = btn.dataset.preset;
      const values = preset === 'compact'   ? { ranksep: 50, nodesep: 10, edgesep: 4, marginx: 10, marginy: 10 }
                   : preset === 'spacious'  ? { ranksep: 140, nodesep: 30, edgesep: 14, marginx: 30, marginy: 30 }
                   :                          { ranksep: 80, nodesep: 16, edgesep: 8, marginx: 20, marginy: 20 };
      for (const [k, v] of Object.entries(values)) setLayoutSetting(k, v);
      layoutPanel();  // re-render the panel to reflect new values
      if (state && state.payload) renderCurrent();
    });
  });

  $('#knobs-reset').addEventListener('click', () => {
    resetLayoutSettings();
    layoutPanel();  // reopen with defaults shown
    if (state && state.payload) renderCurrent();
  });
  $('#knobs-close').addEventListener('click', closePanel);
}

/* --------------------------------------------------------
 * v0.5.2a — Settings panel: display toggles + duplicate
 * handling overview + validation summary.
 * -------------------------------------------------------- */
function settingsPanel() {
  const s = getAppSettings();
  const payload = state && state.payload;
  const duplicates = (payload && payload.duplicates) || [];
  const loadedGoal = state && state.goalCode;

  const dupBlocks = duplicates.map(d => {
    const cfg = s.duplicates[d.code] || { mode: 'one', selected: [d.rows[0] && d.rows[0].row] };
    // v0.5.2f: 'one' mode renders rows as radios so the user picks
    // exactly one (was checkboxes + first-row-wins, which made it look
    // like a different row could win when it couldn't).
    const inputType = cfg.mode === 'one' ? 'radio' : 'checkbox';
    const radioGroup = `dup-row-${escAttr(d.code)}`;
    const rowItems = d.rows.map((r) => {
      const checked = (cfg.selected || []).indexOf(r.row) !== -1;

  $$('#panel-body input[data-dup-mode]').forEach(inp => {
    inp.addEventListener('change', e => {
      const code = e.target.dataset.dupMode;
      const mode = e.target.value;
      const cfg = getAppSettings().duplicates[code] || { mode: 'one', selected: [] };
      const patch = { mode };
      // v0.5.2f: switching to 'one' with multiple selected rows would be
      // ambiguous; trim to first selected so the radio reflects an actual
      // choice. If nothing is selected, default to first row of the dup.
      if (mode === 'one') {
        if (cfg.selected && cfg.selected.length) patch.selected = [cfg.selected[0]];
        else {
          const dup = (state && state.payload && state.payload.duplicates || []).find(d => d.code === code);
          if (dup && dup.rows.length) patch.selected = [dup.rows[0].row];
        }
      }
      updateDupConfig(code, patch);
      applyDupResolution();
      // Re-render the panel so checkbox↔radio swap takes effect.
      settingsPanel();
      if (state && state.payload) renderCurrent();
    });
  });
  $$('#panel-body input[data-dup-code]').forEach(inp => {

      const cfg = getAppSettings().duplicates[code] || { mode: 'one', selected: [] };
      let nextSelected;
      if (cfg.mode === 'one') {
        // Radio: this row is the entire selection.
        nextSelected = [row];
      } else {
        const selected = new Set(cfg.selected || []);
        if (e.target.checked) selected.add(row); else selected.delete(row);
        nextSelected = [...selected].sort((a, b) => a - b);
      }
      updateDupConfig(code, { selected: nextSelected });
      refreshDupNote(code);
      applyDupResolution();
      if (state && state.payload) renderCurrent();
    });
  });
  $('#settings-reset').addEventListener('click', () => {
    resetAppSettings();
    settingsPanel();
    if (state && state.payload) renderCurrent();
  });
  $('#settings-close').addEventListener('click', closePanel);
}

// Human-readable note for a duplicate config
function dupNote(cfg) {
  const n = (cfg.selected || []).length;
  if (!n) return 'no rows selected — defaults to first-row-only';
  if (cfg.mode === 'any')  return `merged as one event; complete if any of ${n} selected row${n>1?'s':''} is complete`;
  if (cfg.mode === 'all')  return `(v0.5.3 will split into ${n} sub-events; merging like "Any" for now)`;
  return `tracks row ${cfg.selected[0]} only`;
}
function refreshDupNote(code) {
  const cfg = getAppSettings().duplicates[code];
  const el = document.querySelector('[data-dup-note="' + cssEscAttr(code) + '"]');
  if (el) el.textContent = dupNote(cfg);
}
function updateDupConfig(code, patch) {
  const s = getAppSettings();
  s.duplicates[code] = Object.assign({ mode: 'one', selected: [] }, s.duplicates[code] || {}, patch);
  saveAppSettings();
}

// v0.5.2f: apply-duplicate-resolution.
// 'one' mode → use the single selected row (radio behavior).
// 'any' mode → synthesize a merged event whose per-student cell is the
//   "best status" across selected rows. User's case: F-16 TP and T-38 TP
//   share an event code; one student completed F-16 TP (lightGrey) while
//   T-38 TP cell is dark-grey (not required); other students reverse.
//   Merging picks the best status per col → student is "complete" on the
//   merged event regardless of which row recorded it.
// 'all' mode → not yet implemented as separate sub-events. Falls back to
//   'any' with a console warning. Wiring sub-event nodes through the DAG
//   builder is a v0.5.3 feature (would need synthetic codes + edge
//   rewriting elsewhere in the MCG graph).
function applyDupResolution() {
  const payload = state && state.payload;
  if (!payload || !payload.duplicates || !payload.duplicates.length) return;
  const settings = getAppSettings();
  for (const d of payload.duplicates) {
    const cfg = settings.duplicates[d.code] || { mode: 'one', selected: [] };
    const allRows = (payload.rowsByCode && payload.rowsByCode[d.code]) || [];
    if (!allRows.length) continue;
    const selRows = (cfg.selected && cfg.selected.length)
      ? allRows.filter(r => cfg.selected.indexOf(r.row) !== -1)
      : [];
    if (cfg.mode === 'one') {
      // Single row selected → use it. None selected → first row default.
      payload.byCode[d.code] = selRows[0] || allRows[0];
    } else if (cfg.mode === 'any' || cfg.mode === 'all') {
      const rowsToMerge = selRows.length ? selRows : allRows;
      payload.byCode[d.code] = mergeDupRowsBestStatus(d.code, rowsToMerge, cfg.mode);
      if (cfg.mode === 'all') {
        console.warn('[bbcs] dup mode "all" not yet split into sub-events; merged like "any" for', d.code);
      }
    } else {
      payload.byCode[d.code] = allRows[0];
    }
    payload.byCode[d.code].duplicated = true;
  }
}

// Pick "best" cell across rows for each student col. Priority:
//   complete (lightGrey OR paired+strike) > scheduled (white + future date)
//     > paired-opted (paired no strike) > pending past-dated (white + past)
//     > pending blank (white empty) > excused (darkGrey)
// Returns a synthesized event object that mirrors a normal Big Board row
// so downstream consumers (classifyCell, renderRoleCol) work unchanged.
function mergeDupRowsBestStatus(code, rows, mode) {
  function score(c) {
    if (!c) return -1;
    if (c.rgbFamily === 'lightGrey') return 100;
    if (c.rgbFamily === 'paired' && c.strikethrough) return 100;
    if (c.rgbFamily === 'paired') return 60;
    if (c.rgbFamily === 'white' && c.value) return 70;  // dated (sched or past-sched)
    if (c.rgbFamily === 'darkGrey') return 10;
    return 0;  // blank pending
  }
  // Group cells by col across all rows
  const byCol = {};
  for (const r of rows) {
    for (const c of (r.cells || [])) {
      (byCol[c.col] = byCol[c.col] || []).push(c);
    }
  }
  const mergedCells = [];
  for (const col of Object.keys(byCol).map(Number).sort((a,b)=>a-b)) {
    const cells = byCol[col];
    let best = cells[0], bestScore = score(best);
    for (let i = 1; i < cells.length; i++) {
      const s = score(cells[i]);
      if (s > bestScore) { best = cells[i]; bestScore = s; }
    }
    mergedCells.push(Object.assign({}, best, { col }));
  }
  // Use first row as template for non-cell metadata; replace cells.
  const template = rows[0];
  return Object.assign({}, template, {
    cells: mergedCells,
    title: rows.map(r => r.title).filter(Boolean).join(' / '),
    duplicateMerge: { mode, sourceRows: rows.map(r => r.row) },
  });
}

function renderValidationSummary(payload, goalCode) {
  if (!payload) return '<p class="muted small">No board loaded yet.</p>';
  const out = [];
  const dupes = payload.duplicates || [];
  out.push(`<div><strong>Duplicate BB codes:</strong> ${dupes.length}${dupes.length ? ' — ' + dupes.map(d => '<span class="mono">' + escHtml(d.code) + '</span>').join(', ') : ''}</div>`);

  // BB codes not in MCG (informational — the app won't render them anyway)
  const mcgCodes = (MCG_GRAPH && MCG_GRAPH.events) ? new Set(Object.keys(MCG_GRAPH.events)) : new Set();
  const bbOnly = Object.keys(payload.byCode || {}).filter(c => !mcgCodes.has(c));
  out.push(`<div><strong>BB codes not in MCG:</strong> ${bbOnly.length}${bbOnly.length ? ' <span class="muted small">(won\'t appear in any DAG — visible in the debug Events view)</span>' : ''}</div>`);
  if (bbOnly.length) {
    out.push('<ul class="small mono">' + bbOnly.map(c => '<li>' + escHtml(c) + '</li>').join('') + '</ul>');
  }

  // MCG-required for current goal but missing from BB
  if (goalCode && render && render.buildDag) {
    try {
      const dag = render.buildDag(goalCode, payload, { mode: 'class' });
      const missing = Object.values(dag.nodesByCode).filter(n => n.isMissing);
      out.push(`<div><strong>Missing from BB for ${escHtml(goalCode)} chain:</strong> ${missing.length}${missing.length ? ' — ' + missing.map(n => '<span class="mono">' + escHtml(n.code) + '</span>').join(', ') : ''}</div>`);
    } catch (e) {
      out.push('<div class="small muted">(could not compute — ' + escHtml(e.message) + ')</div>');
    }
  }
  return out.join('\n');
}

function escAttr(s)     { return String(s || '').replace(/["&<>]/g, c => ({'"':'&quot;','&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function cssEscAttr(s)  { return escAttr(s); }

// Generic debounce
function debounce(fn, ms) {
  let t = null;
  return function () {
    const args = arguments;
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

/* --------------------------------------------------------
 * Debug tables — Students & Events property inspection
 * Shows exactly the properties the code uses for filtering.
 * -------------------------------------------------------- */
let _debugPreviousView = null;  // stash so "Back" returns to the DAG

function cellClass(rgbFamily) {
  if (rgbFamily === 'darkGrey') return 'cell-dg';
  if (rgbFamily === 'lightGrey') return 'cell-lg';
  if (rgbFamily === 'paired') return 'cell-pa';
  if (rgbFamily === 'white') return 'cell-wh';
  return 'cell-na';
}
function cellLabel(cell) {
  if (!cell) return '—';
  if (cell.rgbFamily === 'darkGrey') return 'DG';
  if (cell.rgbFamily === 'lightGrey') return cell.value ? 'LG ' + cell.value : 'LG';
  if (cell.rgbFamily === 'paired') return cell.value ? 'PA ' + cell.value : 'PA';
  if (cell.rgbFamily === 'white' && cell.value) return cell.value;
  if (cell.rgbFamily === 'white') return '·';
  return '?';
}

function renderDebugStudents() {
  if (!state || !state.payload) return;
  const main = $('#main');
  _debugPreviousView = state.goalCode;
  main.innerHTML = '';

  const payload = state.payload;
  const wrap = el('div', { class: 'debug-table-wrap' });

  // Back button
  const backBtn = el('button', { class: 'btn debug-back-btn' }, '← Back to DAG');
  backBtn.addEventListener('click', () => { if (state.payload) renderCurrent(); });
  wrap.appendChild(backBtn);

  wrap.appendChild(el('h2', null, 'Student Properties'));
  wrap.appendChild(el('p', { class: 'subtitle' }, 'Properties used by the code for filtering. Cell colors are from the board (ground truth). DG=dark-grey (not required), LG=light-grey (complete), PA=paired, ·=white empty, date=white w/ date.'));

  // Collect on-board events for column headers — show goal events + let user filter
  const goalEvents = MCG_GRAPH.goalEvents.filter(g => payload.byCode[g]);

  // Filter
  const filterDiv = el('div', { class: 'debug-filter' });
  filterDiv.appendChild(el('label', null, 'Filter events: '));
  const filterInput = el('input', { type: 'text', placeholder: 'Type event code to add columns…', id: 'debug-evt-filter' });
  filterDiv.appendChild(filterInput);
  const filterInfo = el('span', { style: 'font-size:11px;color:var(--ink-faint)' }, `Showing ${goalEvents.length} goal events. Type a code (e.g. "CF 6370") to add columns.`);
  filterDiv.appendChild(filterInfo);
  wrap.appendChild(filterDiv);

  // Build table
  let extraCodes = [];
  function buildTable() {
    const existingTable = wrap.querySelector('table');
    if (existingTable) existingTable.remove();

    const allCodes = [...goalEvents, ...extraCodes];
    const table = el('table', { class: 'debug-table' });

    // Header
    const thead = el('thead');
    const hRow = el('tr');
    for (const h of ['#', 'Name', 'Type', 'Col']) hRow.appendChild(el('th', null, h));
    for (const code of allCodes) {
      const mcg = MCG_GRAPH.events[code];
      const th = el('th', { title: mcg ? mcg.eventName : code }, code);
      hRow.appendChild(th);
    }
    thead.appendChild(hRow);
    table.appendChild(thead);

    // Body
    const tbody = el('tbody');
    payload.students.forEach((s, idx) => {
      const row = el('tr');
      row.appendChild(el('td', null, String(idx + 1)));
      row.appendChild(el('td', null, s.name));
      row.appendChild(el('td', null, s.type));
      row.appendChild(el('td', null, String(s.col)));

      for (const code of allCodes) {
        const evt = payload.byCode[code];
        const cell = evt ? evt.cells.find(c => c.col === s.col) : null;
        const td = el('td', { class: cellClass(cell ? cell.rgbFamily : null), title: code + ': ' + (cell ? cell.rgbFamily + (cell.value ? ' = ' + cell.value : '') : 'no cell') }, cellLabel(cell));
        row.appendChild(td);
      }
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
  }

  buildTable();

  // Live filter: type event code to add columns
  filterInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const val = filterInput.value.trim().toUpperCase().replace(/\s+/g, ' ');
    if (!val) return;
    // Find matching on-board events
    const matches = Object.keys(payload.byCode).filter(c => c.includes(val) && !goalEvents.includes(c) && !extraCodes.includes(c));
    if (matches.length === 0) {
      filterInfo.textContent = `No on-board event matching "${val}"`;
      return;
    }
    extraCodes.push(...matches.slice(0, 10));
    filterInfo.textContent = `Added: ${matches.slice(0, 10).join(', ')}. ${goalEvents.length + extraCodes.length} total columns.`;
    filterInput.value = '';
    buildTable();
  });

  main.appendChild(wrap);
}
