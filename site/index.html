   1. Edit CONFIG.GAS_ENDPOINT below with your deployed Web App /exec URL.
   2. v0.5 requires an HTTP server (the MCG graph is fetched from
      `./mcg-26a.json` at boot, which browsers block over file://):
        python -m http.server 8080

   3. For GitHub Pages: push the folder to a repo with Pages enabled —

<!-- =========================================================
     STYLES
     White / bold-line / elegant theme. Subtle card shading,
     strong 1-2px borders, type-chip accents.
     ========================================================= -->
<style>
  :root {
    --bg: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-faint: #888;
    --line: #1a1a1a;
    --line-soft: #d0d0d0;
    --card: #fdfdfd;
    --card-head: #f5f5f5;
    --accent: #0059a6;
    --accent-soft: #e8f0f8;
    --complete: #2e7d32;
    --partial: #6a9e36;
    --started: #b88600;
    --notstarted: #757575;
    --prereqs-met: #0062b1;
    --prereqs-partial: #6b44a8;
    --prereqs-not: #c62828;
    --warn: #c62828;
    --paired: #8a56d6;
    --mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.45; }
  button { font-family: inherit; cursor: pointer; }
  code, .mono { font-family: var(--mono); }

  /* --- top header bar --- */
  header.app-header {
    border-bottom: 2px solid var(--line);
    padding: 10px 20px;
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    position: sticky; top: 0; background: var(--bg); z-index: 50;
  }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .app-title small { color: var(--ink-faint); font-weight: 400; font-size: 11px; margin-left: 6px; font-family: var(--mono); }
  .hbar-spacer { flex: 1; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-group label { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  select, input[type="text"], input[type="url"] {
    border: 1.5px solid var(--line); background: #fff; padding: 5px 9px; font-size: 13px; font-family: var(--mono);
    border-radius: 3px; outline: none; min-width: 180px;
  }
  select:focus, input:focus { border-color: var(--accent); }
  button.btn {
    border: 1.5px solid var(--line); background: #fff; padding: 5px 14px; font-size: 13px; font-weight: 600;
    border-radius: 3px; transition: all 0.12s;
  }
  button.btn:hover { background: var(--ink); color: #fff; }
  button.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.btn.primary:hover { background: #003d72; border-color: #003d72; }
  button.btn.icon { padding: 5px 8px; }
  button.btn[disabled] { opacity: 0.4; cursor: not-allowed; background: #fff !important; color: var(--ink) !important; }

  /* --- sub header / class meta --- */
  .class-meta {
    padding: 8px 20px; border-bottom: 1px solid var(--line-soft); font-size: 12px; color: var(--ink-soft);
    display: flex; flex-wrap: wrap; gap: 16px; font-family: var(--mono);
  }
  .class-meta .stat strong { color: var(--ink); }

  /* --- content layout --- */
  main { padding: 16px 20px 60px; max-width: 1400px; margin: 0 auto; }
  .empty-state { padding: 80px 20px; text-align: center; color: var(--ink-faint); }
  .empty-state h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .empty-state code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 12px; }

  /* --- track sections --- */
  .track { margin-bottom: 28px; }
  .track-header {
    display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--line);
    padding: 6px 0; margin-bottom: 14px;
  }
  .track-header h2 { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .track-header .count { color: var(--ink-faint); font-size: 12px; font-family: var(--mono); }

  /* --- goal event cards --- */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card { border: 1.5px solid var(--line); border-radius: 5px; background: var(--card); overflow: hidden; }
  .card.expanded { grid-column: 1 / -1; }
  .card-head {
    padding: 10px 14px; background: var(--card-head); border-bottom: 1px solid var(--line-soft);
    cursor: pointer; user-select: none;
  }
  .card-head:hover { background: #ebebeb; }
  .card-head-row { display: flex; align-items: center; gap: 10px; }
  .card-code { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
  .card-title { flex: 1; font-size: 13px; font-weight: 600; }
  .card-chevron { color: var(--ink-faint); font-size: 14px; }
  .card-sub { margin-top: 4px; font-size: 11px; color: var(--ink-soft); display: flex; flex-wrap: wrap; gap: 10px; }
  .card-sub .mono { font-size: 11px; }

  .status-pill {
    display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; border: 1.5px solid var(--line);
  }
  .status-Complete          { background: var(--complete); color: #fff; border-color: var(--complete); }
  .status-PartiallyComplete { background: var(--partial); color: #fff; border-color: var(--partial); }
  .status-Started           { background: var(--started); color: #fff; border-color: var(--started); }
  .status-NotStarted        { background: #f0f0f0; color: var(--notstarted); border-color: var(--line-soft); }
  .status-PrereqsMet        { background: var(--prereqs-met); color: #fff; border-color: var(--prereqs-met); }
  .status-PrereqsPartiallyMet { background: var(--prereqs-partial); color: #fff; border-color: var(--prereqs-partial); }
  .status-PrereqsNotMet     { background: #fdecea; color: var(--prereqs-not); border-color: var(--prereqs-not); }
  .status-Unknown           { background: #fff; color: var(--ink-faint); border-color: var(--line-soft); }

  .progress-wrap { padding: 10px 14px; border-bottom: 1px solid var(--line-soft); }
  .progress-bar-bg { background: #f0f0f0; border: 1px solid var(--line-soft); border-radius: 2px; height: 14px; position: relative; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(to right, var(--complete), var(--partial));
    display: flex; align-items: center; justify-content: flex-end; padding-right: 4px;
    font-size: 10px; color: #fff; font-weight: 600; font-family: var(--mono);
  }
  .progress-summary { margin-top: 4px; font-size: 11px; color: var(--ink-soft); font-family: var(--mono); }

  /* --- expanded body --- */
  .card-body { padding: 12px 14px 16px; }
  .students-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .students-header h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .students-header .hint { font-size: 11px; color: var(--ink-faint); font-style: italic; }
  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px; }
  .student-row {
    display: flex; align-items: center; gap: 6px; padding: 4px 8px; border: 1px solid var(--line-soft);
    border-radius: 3px; font-size: 12px; background: #fff; cursor: pointer; transition: all 0.1s;
  }
  .student-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .student-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--line); flex-shrink: 0; }
  .student-dot.complete { background: var(--complete); border-color: var(--complete); }
  .student-dot.scheduled { background: var(--started); border-color: var(--started); }
  .student-dot.pending { background: #fff; }
  .student-dot.notreq { background: var(--notstarted); border-color: var(--notstarted); }
  .student-dot.paired-opted { background: var(--paired); border-color: var(--paired); }
  .student-row.not-applicable { opacity: 0.35; }
  .student-name { font-family: var(--mono); font-size: 11px; font-weight: 600; }
  .student-meta { color: var(--ink-faint); font-size: 10px; margin-left: auto; font-family: var(--mono); }

  /* --- chain drilldown --- */
  .chain-panel {
    margin-top: 12px; padding: 10px; background: #fafafa; border: 1px solid var(--line-soft); border-radius: 3px;
  }
  .chain-header { font-size: 12px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .chain-header button { border: none; background: transparent; color: var(--ink-faint); font-size: 16px; line-height: 1; }
  .chain-list { list-style: none; }
  .chain-item {
    display: flex; gap: 8px; align-items: flex-start; padding: 4px 0; border-bottom: 1px dashed var(--line-soft);
  }
  .chain-item:last-child { border-bottom: none; }
  .chain-depth { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); width: 28px; flex-shrink: 0; text-align: right; }
  .chain-code { font-family: var(--mono); font-size: 11px; font-weight: 600; width: 88px; flex-shrink: 0; }
  .chain-title { font-size: 11px; flex: 1; color: var(--ink); }
  .chain-status { font-size: 10px; font-family: var(--mono); font-weight: 600; text-transform: uppercase; padding: 1px 6px; border-radius: 2px; white-space: nowrap; }
  .chain-status.c-complete { background: #e0f2e1; color: var(--complete); }
  .chain-status.c-scheduled { background: #fff4d6; color: #8a6700; }
  .chain-status.c-pending { background: #fbe8e8; color: var(--prereqs-not); }
  .chain-status.c-notreq { background: #eee; color: var(--notstarted); }
  .chain-status.c-offboard { background: #eef; color: var(--prereqs-met); font-style: italic; }
  .chain-item.offboard { opacity: 0.65; }

  /* --- panel (issues + legend) --- */
  .panel {
    position: fixed; top: 0; right: -440px; width: 440px; max-width: 96vw; height: 100vh;
    background: #fff; border-left: 2px solid var(--line); overflow-y: auto; z-index: 200;
    transition: right 0.2s ease; box-shadow: -4px 0 14px rgba(0,0,0,0.1);
  }
  .panel.open { right: 0; }
  .panel-header { padding: 12px 18px; border-bottom: 2px solid var(--line); display: flex; align-items: center; justify-content: space-between; background: var(--card-head); }
  .panel-header h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-body { padding: 16px 18px; font-size: 13px; }
  .panel-body h4 { font-size: 12px; font-weight: 700; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .panel-body pre { background: #f5f5f5; padding: 8px 10px; border: 1px solid var(--line-soft); border-radius: 3px; font-size: 11px; white-space: pre-wrap; word-break: break-word; }
  .legend-grid { display: grid; grid-template-columns: 24px 1fr; gap: 6px 10px; align-items: center; }
  .legend-swatch { width: 22px; height: 14px; border: 1.5px solid var(--line); border-radius: 2px; }

  /* v0.4.2: layout knobs panel — label / input pairs */
  .knob-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 10px; align-items: center; margin-bottom: 10px; }
  .knob-grid label { font-size: 11px; font-family: var(--mono); color: var(--ink-soft); }
  .knob-grid input[type="number"],
  .knob-grid select { width: 100%; padding: 3px 6px; font-size: 12px; font-family: var(--mono); border: 1px solid var(--line); border-radius: 3px; background: #fff; }
  .knob-grid input[type="number"]:focus,
  .knob-grid select:focus { outline: none; border-color: var(--accent); }

  .panel-backdrop { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.2); z-index: 150; display: none; }
  .panel-backdrop.open { display: block; }

  /* --- issue log list --- */
  .issue-entry { border-left: 3px solid var(--line-soft); padding: 6px 0 6px 10px; margin: 8px 0; font-size: 12px; }
  .issue-entry.blocker  { border-left-color: var(--warn); }
  .issue-entry.major    { border-left-color: var(--started); }
  .issue-entry.minor    { border-left-color: var(--prereqs-met); }
  .issue-entry.cosmetic { border-left-color: var(--line-soft); }
  .issue-entry .meta { color: var(--ink-faint); font-size: 11px; font-family: var(--mono); }

  /* --- debug tables (Students / Events tabs) --- */
  .debug-table-wrap { padding: 16px 20px; overflow-x: auto; }
  .debug-table-wrap h2 { font-size: 15px; margin: 0 0 4px; }
  .debug-table-wrap p.subtitle { font-size: 12px; color: var(--ink-faint); margin: 0 0 12px; }
  .debug-table {
    border-collapse: collapse; font-size: 11px; font-family: var(--mono);
    width: 100%; white-space: nowrap;
  }
  .debug-table th, .debug-table td {
    border: 1px solid var(--line-soft); padding: 3px 6px; text-align: left;
  }
  .debug-table th {
    background: var(--card-head); font-weight: 700; position: sticky; top: 0; z-index: 5;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .debug-table tr:hover { background: #f5f8ff; }
  .debug-table .cell-dg { background: #bbb; color: #fff; text-align: center; }
  .debug-table .cell-wh { background: #fff; text-align: center; }
  .debug-table .cell-lg { background: #d9ead3; text-align: center; }
  .debug-table .cell-pa { background: #c9daf8; text-align: center; }
  .debug-table .cell-na { background: #f4f4f4; color: #999; text-align: center; }
  .debug-table .prereq-list { font-size: 10px; max-width: 300px; white-space: normal; line-height: 1.4; }
  .debug-table .app-list { font-size: 10px; }
  .debug-table .flag { color: var(--warn); font-weight: 700; }
  .debug-filter { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .debug-filter input, .debug-filter select { font-size: 12px; padding: 3px 6px; border: 1px solid var(--line); border-radius: 3px; }
  .debug-filter input { width: 200px; }
  .debug-back-btn { margin-bottom: 10px; }

  /* --- toast / error banner --- */
  .banner { margin: 10px 20px; padding: 10px 14px; border: 1.5px solid var(--warn); background: #fdecea; color: var(--warn); font-size: 13px; border-radius: 4px; display: none; }
  .banner.show { display: block; }
  .banner .banner-cta {
    margin-left: 8px; padding: 3px 10px; border: 1px solid var(--warn);
    background: #fff; color: var(--warn); font-weight: 700; font-size: 12px;
    border-radius: 3px; cursor: pointer;
  }
  .banner .banner-cta:hover { background: var(--warn); color: #fff; }
  /* v0.5.2f: × dismiss for banners */
  .banner .banner-close {
    margin-left: 8px; background: transparent; border: none;
    color: var(--warn); font-size: 18px; line-height: 1;
    padding: 0 6px; cursor: pointer; font-weight: 700;
  }
  .banner .banner-close:hover { color: #8a1c1c; }

  /* --- footer --- */
  footer.app-footer { border-top: 1px solid var(--line-soft); padding: 12px 20px; font-size: 11px; color: var(--ink-faint); font-family: var(--mono); display: flex; gap: 16px; flex-wrap: wrap; }

  /* --- mismatch badge --- */
  .mismatch { color: var(--warn); font-weight: 700; font-size: 10px; margin-left: 4px; }

  /* ===========================================================
     v0.3.0 — DAG flow chart styles
     =========================================================== */
  .view-bar {
    padding: 8px 20px; border-bottom: 1px solid var(--line-soft);
    background: #fafafa; display: flex; flex-wrap: wrap; gap: 14px;
    align-items: center; position: sticky; top: 57px; z-index: 40;
  }
  .view-toggle { display: inline-flex; border: 1.5px solid var(--line); border-radius: 4px; overflow: hidden; }
  .view-opt {
    border: none; background: #fff; padding: 5px 14px; font-size: 12px; font-weight: 600;
    color: var(--ink); cursor: pointer; font-family: var(--sans);
  }
  .view-opt + .view-opt { border-left: 1.5px solid var(--line); }
  .view-opt.active { background: var(--ink); color: #fff; }
  .view-opt:hover:not(.active) { background: #f0f0f0; }

  /* DAG canvas — v0.4 uses dagre for layered layout; nodes are
     absolutely positioned based on dagre's reported coordinates. Canvas
     sizes itself to the full graph bounding box so the whole DAG scrolls
     horizontally + vertically. Fallback (no dagre) uses the old flex
     columns via the `.dag-canvas.fallback` class. */
  main.dag-main { padding: 14px 0 60px; max-width: none; margin: 0; overflow: auto; }
  .dag-canvas { position: relative; padding: 14px 24px 24px; }
  .dag-canvas .node { position: absolute; }
  /* Fallback layout (pre-dagre) */
  .dag-canvas.fallback { display: inline-flex; flex-direction: row-reverse; align-items: flex-start; gap: 60px; padding: 18px 28px 30px; min-width: 100%; }
  .dag-canvas.fallback .node { position: static; }
  .dag-col { display: flex; flex-direction: column; gap: 14px; min-width: 240px; }
  .dag-col-label { font-size: 10px; font-family: var(--mono); color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; margin-bottom: 4px; }

  /* node — v0.3.3: dropped the width transition. It caused arrows to be
     drawn against intermediate widths during the 150ms anim, giving the
     "arrows drift off the container edge" bug. Snap instead. */
  .node { border: 1.5px solid var(--line); border-radius: 5px; background: #fff; position: relative; z-index: 2; width: 240px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .node.goal { border-width: 2.5px; border-style: dashed; border-color: #999; background: #fafafa; }
  .node.collapsed { width: 180px; }
  .node.collapsed .node-progress,
  .node.collapsed .node-roles,
  .node.collapsed .node-student-chip { display: none; }
  .node.collapsed .node-head { border-bottom: none; border-radius: 3px; }
  /* v0.3.3: keep a shortened title visible when collapsed so users can
     scan without expanding everything. */
  .node.collapsed .node-head-title {
    font-size: 10px; line-height: 1.2; margin-top: 2px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis; padding-right: 18px;
  }
  .node-head { padding: 8px 10px; border-bottom: 1px solid var(--line); border-radius: 3px 3px 0 0; position: relative; }
  .node-head-code { font-family: var(--mono); font-size: 12px; font-weight: 700; }
  .node-head-title { font-size: 11px; margin-top: 2px; line-height: 1.3; padding-right: 18px; }
  .node-toggle {
    position: absolute; top: 4px; right: 4px; width: 18px; height: 18px;
    border: 1px solid rgba(0,0,0,0.2); background: rgba(255,255,255,0.6);
    border-radius: 3px; font-size: 12px; font-weight: 700; line-height: 1; color: inherit;
    cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
  }
  .node-toggle:hover { background: rgba(255,255,255,0.95); }

  /* Header status colors (class view — aggregate) */
  .node.s-none .node-head   { background: #fdecea; color: #8a1c1c; }
  .node.s-yellow .node-head { background: #fff4cc; color: #6b4b00; }
  .node.s-green .node-head  { background: #e4f5dc; color: #1f5313; }
  .node.goal .node-head     { background: #f0f0f0; color: #666; }

  /* Header status colors (student view — 4 states, v0.3.3: shifted OPTED
     to a blue hue so it reads as distinctly different from DONE green). */
  .node.s-done .node-head     { background: #2e7d32; color: #fff;    }  /* solid green   = complete */
  .node.s-opted .node-head    { background: #d7e8f5; color: #0a3d62; }  /* light blue    = prereqs met, not yet done */
  .node.s-scheduled .node-head{ background: #fff4cc; color: #6b4b00; }  /* yellow        = future date on sheet */
  .node.s-notopted .node-head { background: #fdecea; color: #8a1c1c; }  /* red           = prereqs not met */
  .node.s-warn .node-head     { background: #ff8c00; color: #fff; border-bottom-color: #c62828; }  /* orange = scheduled+not opted (HARD) */
  .node.s-warn { border-color: #c62828; border-width: 2.5px; }
  /* v0.5.2d: soft monitor — prereqs scheduled (past or future), no genuine
     hole. Amber/sand palette; no border-pulse. Tooltip and chip label
     explain whether it's "verify earlier" or "prereqs planned." */
  .node.s-soft .node-head    { background: #fff8d6; color: #6b4b00; border-bottom-color: #d4a017; }
  .node.s-soft .chip-pill    { color: #6b4b00; background: #fff4cc; border-color: #d4a017; font-weight: 600; }
  .node.s-soft               { border-color: #d4a017; }

  /* v0.5.1: click-to-focus — clicked node + direct prereqs stay sharp,
     everything else dims. Click the canvas (or the same node again) to clear. */
  .dag-canvas .node { transition: opacity 0.12s ease; cursor: pointer; }
  .dag-canvas.has-focus .node.dimmed { opacity: 0.18; pointer-events: none; }
  .dag-canvas.has-focus .node.focused {
    box-shadow: 0 0 0 3px var(--accent), 0 2px 6px rgba(0,0,0,0.18);
    z-index: 5;
  }
  .dag-canvas.has-focus .node.focus-prereq {
    box-shadow: 0 0 0 2px var(--accent-soft), 0 1px 4px rgba(0,0,0,0.10);
    z-index: 4;
  }
  .dag-arrows path { transition: opacity 0.12s ease; }
  .dag-arrows path.dim-edge { opacity: 0.12; }
  .dag-arrows path.focus-edge { opacity: 1; stroke-width: 2.5px; }

  /* v0.5.1: missing-prereqs block inside NOT OPTED / s-warn student nodes */
  .node-missing { padding: 6px 10px 8px; border-top: 1px dashed var(--line-soft); font-size: 10px; }
  .node-missing-label { font-weight: 700; margin-bottom: 3px; color: var(--ink-soft); }
  .node-missing ul { list-style: none; padding: 0; margin: 0; }
  .node-missing li { font-family: var(--mono); font-size: 10px; line-height: 1.5; color: #8a1c1c; }
  .node-missing li.more { font-family: var(--sans); font-style: italic; color: var(--ink-faint); }

  /* v0.5.2a: Settings panel internals */
  .settings-section { border-top: 1px solid var(--line-soft); padding-top: 12px; margin-top: 14px; }
  .settings-section:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  .settings-section h4 { font-size: 12px; margin-bottom: 6px; }
  .toggle-list label { display: block; padding: 6px 0; line-height: 1.4; cursor: pointer; }
  .toggle-list input { margin-right: 6px; vertical-align: middle; }
  .toggle-list .muted { color: var(--ink-faint); font-size: 11px; }
  .small { font-size: 11px; }
  .muted { color: var(--ink-soft); }
  .dup-block { border: 1px solid var(--line-soft); border-radius: 4px; padding: 8px 10px; margin-bottom: 8px; background: #fafafa; }
  .dup-head { display: flex; justify-content: space-between; align-items: baseline; font-weight: 700; margin-bottom: 6px; }
  .dup-head .muted { font-weight: 400; font-size: 11px; }
  .dup-modes label { display: block; padding: 3px 0; font-size: 12px; cursor: pointer; }
  .dup-modes input { margin-right: 4px; }
  .dup-rows { border-top: 1px dashed var(--line-soft); padding-top: 6px; margin-top: 6px; }
  .dup-row { display: block; padding: 2px 0; font-size: 11px; cursor: pointer; }
  .dup-row input { margin-right: 4px; }
  .dup-row .mono { background: #eef; padding: 1px 4px; border-radius: 3px; }
  .badge-count { display: inline-block; background: #c62828; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }

  /* v0.5.2a: MCG-required but missing from Big Board */
  .node.missing-node { border-style: dashed; border-color: #c97a0f; background: #fff6e8; }
  .node.missing-node .node-head { background: #ffe6c0; color: #7a4500; border-bottom-color: #c97a0f; }
  .node.missing-node .node-head-code { color: #c62828; }
  .node-missing-banner {
    padding: 4px 10px; font-size: 10px; font-weight: 700;
    color: #7a4500; background: #fff1db; border-bottom: 1px dashed #c97a0f;
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  /* v0.5: virtual "pick one of" group node for MCG oneOf prereqs */
  .node.group-node { width: 200px; border-style: dashed; border-color: #8a56d6; background: #f6f1ff; }
  .node.group-node .node-head { background: #ece0ff; color: #3c1e6b; border-bottom-color: #8a56d6; }
  .node.group-node .node-head-code { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .node.group-node .node-head-title { font-family: var(--mono); font-size: 10px; word-break: break-word; }

  /* Progress bar (class view only) */
  .node-progress { padding: 8px 10px; border-bottom: 1px solid var(--line-soft); }
  .node-bar-bg { background: #f2f2f2; border: 1px solid var(--line-soft); border-radius: 2px; height: 10px; position: relative; overflow: hidden; }
  .node-bar-fill { height: 100%; background: var(--partial); }
  .node.s-green .node-bar-fill { background: var(--complete); }
  .node.s-yellow .node-bar-fill { background: var(--started); }
  .node.s-none .node-bar-fill { background: var(--warn); }
  .node-pct { text-align: center; font-family: var(--mono); font-size: 14px; font-weight: 700; margin-top: 3px; }

  /* Role columns inside a node */
  .node-roles { display: flex; padding: 6px 8px 8px; gap: 8px; }
  .role-col { flex: 1; min-width: 0; }
  .role-col h5 { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--ink-faint); letter-spacing: 0.5px; text-align: center; padding-bottom: 3px; border-bottom: 1px solid var(--line-soft); margin-bottom: 4px; }
  .role-col.single { text-align: center; }
  .role-col ul { list-style: none; padding: 0; margin: 0; column-width: 90px; column-gap: 6px; }
  .role-col.one-col ul { column-count: 1; column-width: auto; }
  .role-col li { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: var(--mono); padding: 1px 0; break-inside: avoid; }
  .role-col li.dim-name { color: #aaa; }
  .role-col li .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.2); }
  .role-col li .dot.complete  { background: var(--complete); }
  .role-col li .dot.scheduled { background: var(--started); }
  .role-col li .dot.pending   { background: #fff; border-color: var(--warn); }
  .role-col li .dot.notreq    { background: #bbb; }
  .role-col li .dot.paired    { background: var(--paired); }
  /* v0.4: scheduled-but-not-opted (HARD warn) — orange with pulsing border.
     v0.5.2d: reserved for genuine planning holes (a missing prereq has no
     schedule at all). The soft case below covers the "scheduled but board
     not yet updated" situation that was previously over-flagged. */
  .role-col li .dot.warn      { background: #ff8c00; border: 2px solid #c62828; animation: warnPulse 1.6s ease-in-out infinite; }
  .role-col li.warn-row       { color: #c62828; font-weight: 600; }
  .role-col li.warn-row.dim-name { color: #c62828; }
  /* v0.5.2d: soft warn — amber dot, no pulse, no red text. Used when all
     missing prereqs are scheduled (past awaiting board update, or future
     planned). Tooltip explains. Lower visual weight to avoid alarm. */
  .role-col li .dot.warn-soft { background: #f5d76e; border: 1.5px solid #b58700; }
  .role-col li.warn-row-soft  { color: #6b4b00; }
  /* v0.5.2: excused-on-board (MCG/DBB applicability mismatch). Student is
     listed because MCG says required, but the board cell is dark-grey. */
  .role-col li .dot.excused   { background: repeating-linear-gradient(45deg, #bbb 0, #bbb 2px, #fff 2px, #fff 4px); border-color: #888; }
  .role-col li.excused-row    { color: #888; font-style: italic; }
  /* v0.5.2: paired-event partner suffix in roster — purple to echo dot. */
  .role-col li .paired-suffix { color: var(--paired); font-weight: 500; margin-left: 2px; }
  @keyframes warnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(198, 40, 40, 0.4); }
    50%      { box-shadow: 0 0 0 3px rgba(198, 40, 40, 0.1); }
  }
  /* v0.5.2: per-node banner for MCG-vs-DBB applicability mismatch. */
  .node-mismatch-banner {
    margin: 0 8px 6px; padding: 4px 8px; border-radius: 4px;
    background: #fff3cd; color: #6b4b00; border: 1px solid #d4a017;
    font-size: 10px; font-weight: 600; line-height: 1.3;
  }

  /* Student-view compact body (no role cols, just a chip) */
  .node-student-chip { padding: 10px 10px 12px; font-family: var(--mono); font-size: 11px; text-align: center; color: var(--ink); }
  .node-student-chip .chip-pill { display: inline-block; padding: 3px 10px; border: 1.5px solid currentColor; border-radius: 12px; font-weight: 700; letter-spacing: 0.3px; }
  .node.s-done .chip-pill      { color: #fff;    background: #2e7d32; border-color: #1f5313; }
  .node.s-opted .chip-pill     { color: #0a3d62; background: #d7e8f5; border-color: #5c8dba; }
  .node.s-scheduled .chip-pill { color: #6b4b00; background: #fff4cc; border-color: #b58700; }
  .node.s-notopted .chip-pill  { color: #8a1c1c; background: #fdecea; border-color: #c62828; }
  .node.s-warn .chip-pill      { color: #fff;    background: #ff8c00; border-color: #c62828; font-weight: 700; }
  .node-date {
    margin-top: 4px; font-family: var(--mono); font-size: 11px;
    color: var(--ink-soft); letter-spacing: 0.3px;
  }

  /* SVG arrow overlay */
  .dag-arrows { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
  .dag-arrows path { fill: none; stroke-width: 2; }
  .dag-arrows path.a-green  { stroke: var(--complete); }
  .dag-arrows path.a-yellow { stroke: var(--started); }
  .dag-arrows path.a-none   { stroke: var(--warn); }
  .dag-arrows path.a-goal   { stroke: #999; }

  /* Empty/help states inside main */
  .dag-empty { padding: 80px 40px; text-align: center; color: var(--ink-faint); }
  .dag-empty h2 { color: var(--ink); font-size: 16px; margin-bottom: 6px; }

  /* Info strip under the canvas */
  .goal-summary {
    padding: 10px 28px; border-top: 1px solid var(--line-soft); background: #fafafa;
    font-size: 12px; font-family: var(--mono); color: var(--ink-soft); display: flex; flex-wrap: wrap; gap: 16px;
  }
  .goal-summary strong { color: var(--ink); }
</style>
</head>

<!-- =========================================================
     DAGRE — layered graph layout engine (v0.4).
     Small sibling file (~280KB). Loads synchronously so `dagre` is on
     window before the main app script runs below. If the file is
     missing, the app falls back to the old flex-column layout and
     reports it in a banner.
     ========================================================= -->
<script src="./dagre.min.js"></script>

<!-- MCG graph is loaded at runtime from ./mcg-26a.json (see loadMcgGraph in the script below). -->

<!-- =========================================================
     APP LOGIC
     Layered modules, all inline. Order:
       CONFIG → helpers → api → parse → status → render → issues → boot
     ========================================================= -->
<script>
'use strict';

/* --------------------------------------------------------
 * CONFIG  (from <script id="config">; user-editable above)
 * -------------------------------------------------------- */
const CONFIG = (() => {
  try { return JSON.parse(document.getElementById('config').textContent); }
  catch (e) { return { GAS_ENDPOINT: '', ENABLE_CACHE: true, DEBUG: false }; }
})();

const APP_VERSION = '0.5.2f';
const MCG_VERSION = '26A';
const MCG_JSON_URL = './mcg-26a.json';

/* --------------------------------------------------------
 * MCG graph — fetched at boot from ./mcg-26a.json (static
 * file next to index.html). GitHub-Pages-compatible: Pages
 * serves static JSON as same-origin, so no CORS issues. For
 * `file://` viewing, serve locally (`python -m http.server`)
 * — the browser blocks fetch from file://.
 * -------------------------------------------------------- */
let MCG_GRAPH = { goalEvents: [], events: {}, _loaded: false };

async function loadMcgGraph() {
  try {
    const r = await fetch(MCG_JSON_URL, { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
    const g = await r.json();
    if (!g || !g.events || !g.goalEvents) throw new Error('Malformed MCG JSON (missing events/goalEvents)');
    g._loaded = true;
    MCG_GRAPH = g;
    console.log(`[bbcs] MCG loaded: ${Object.keys(g.events).length} events · ${g.goalEvents.length} goals · generated ${g.generatedDate || '?'}`);
    return g;
  } catch (e) {
    console.error('[bbcs] MCG load failed:', e);
    banner('Could not load mcg-26a.json (' + (e.message || e) + '). If you opened this via file://, run `python -m http.server 8080` and browse to http://localhost:8080/index.html instead.', true);
    throw e;
  }
}

/* --------------------------------------------------------
 * helpers
 * -------------------------------------------------------- */
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
function banner(msg, isError) {
  const b = $('#banner');
  b.textContent = msg;
  b.className = 'banner show';
  b.onclick = null;
  if (!isError) setTimeout(() => b.classList.remove('show'), 3500);
}
// v0.5.2a: banner variant with a clickable CTA button.
// v0.5.2f: also adds an × close button so the warning can be dismissed
// without opening Settings, and auto-hides when the CTA fires.
function bannerWithAction(msg, ctaLabel, ctaHandler, isError) {
  const b = $('#banner');
  b.innerHTML = '';
  b.appendChild(document.createTextNode(msg + '  '));
  const btn = document.createElement('button');
  btn.className = 'banner-cta';
  btn.textContent = ctaLabel;
  btn.addEventListener('click', e => { e.stopPropagation(); hideBanner(); ctaHandler(); });
  b.appendChild(btn);
  // × dismiss button
  const close = document.createElement('button');
  close.className = 'banner-close';
  close.title = 'Dismiss';
  close.textContent = '×';
  close.addEventListener('click', e => { e.stopPropagation(); hideBanner(); });
  b.appendChild(close);
  b.className = 'banner show';
  b.onclick = null;  // no passive auto-hide on click
}
function hideBanner() { $('#banner').classList.remove('show'); }
function log(...args) { if (CONFIG.DEBUG) console.log('[bbcs]', ...args); }

/* --------------------------------------------------------
 * api.js — GAS fetch + localStorage cache
 *
 * v0.2.1 switched from sessionStorage to localStorage so cached
 * payloads survive tab close / reload. The fetch_sheet call is the
 * expensive one (~3-8 s round trip with full formatting), so we
 * want the UI work loop to pull once and stay on that snapshot
 * until the user explicitly hits Refresh or Clear Cache.
 *
 * Cache keys:
 *   bbcs::sheet::<tabName>          stored JSON { cachedAt, payload }
 *   bbcs::index::sheets             list of cached tab names
 * -------------------------------------------------------- */
const api = (() => {
  const KEY = 'bbcs::sheet::';
  const INDEX_KEY = 'bbcs::index::sheets';
  const SHEET_LIST_KEY = 'bbcs::sheetlist';  // v0.4: cached sheets_avail response

  function readIndex() {
    try { return JSON.parse(localStorage.getItem(INDEX_KEY) || '[]'); } catch (_) { return []; }
  }
  function writeIndex(list) {
    try { localStorage.setItem(INDEX_KEY, JSON.stringify(list)); } catch (_) {}
  }
  function addToIndex(name) {
    const list = readIndex();
    if (!list.includes(name)) { list.push(name); writeIndex(list); }
  }
  function removeFromIndex(name) {
    writeIndex(readIndex().filter(n => n !== name));
  }

  async function call(params, { force = false } = {}) {
    if (!CONFIG.GAS_ENDPOINT) throw new Error('CONFIG.GAS_ENDPOINT is empty. Set it near the top of index.html.');
    const url = CONFIG.GAS_ENDPOINT + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url, { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error(`GAS ${res.status}: ${res.statusText}`);
    const body = await res.json();
    if (!body.ok) throw new Error(body.error || 'GAS reported not-ok');
    return body;
  }

  return {
    async health() { return call({ call: 'health' }); },
    async sheetsAvail() {
      const body = await call({ call: 'sheets_avail' });
      // v0.4: persist so boot can skip this round-trip next time
      try { localStorage.setItem(SHEET_LIST_KEY, JSON.stringify({ cachedAt: new Date().toISOString(), sheets: body.sheets })); }
      catch (e) { console.warn('[bbcs] sheet-list cache write failed', e); }
      return body;
    },

    getSheetList() {
      try {
        const raw = localStorage.getItem(SHEET_LIST_KEY);
        if (!raw) return null;
        const env = JSON.parse(raw);
        return env.sheets || null;
      } catch (_) { return null; }
    },

    async fetchSheet(name, { force = false } = {}) {
      const cacheKey = KEY + name;
      if (CONFIG.ENABLE_CACHE && !force) {
        let raw = null;
        try { raw = localStorage.getItem(cacheKey); }
        catch (e) { console.warn('[bbcs] cache READ threw:', e); }
        if (raw) {
          try {
            const env = JSON.parse(raw);
            console.log('[bbcs] cache HIT for', name, '— cachedAt=', env.cachedAt,
              '— size=', (raw.length / 1024).toFixed(1) + 'KB');
            return env.payload;
          } catch (e) {
            console.warn('[bbcs] cache PARSE failed for', name, e, '— evicting');
            try { localStorage.removeItem(cacheKey); } catch (_) {}
          }
        } else {
          console.log('[bbcs] cache MISS for', name, '— fetching from GAS');
        }
      } else if (force) {
        console.log('[bbcs] force refresh requested for', name);
      }
      const body = await call({ call: 'fetch_sheet', sheet: name });
      if (CONFIG.ENABLE_CACHE) {
        try {
          const envelope = { cachedAt: new Date().toISOString(), payload: body };
          const serialized = JSON.stringify(envelope);
          localStorage.setItem(cacheKey, serialized);
          addToIndex(name);
          console.log('[bbcs] cache WROTE', name, '—', (serialized.length / 1024).toFixed(1) + 'KB');
        } catch (e) {
          // QuotaExceededError is the most common cause — serialized payload
          // is ~1-2MB per sheet and localStorage caps vary. Report loudly.
          console.error('[bbcs] cache WRITE FAILED for', name, '—', e.name || '', e.message || e);
          banner('Warning: failed to cache "' + name + '" — ' + (e.message || e) + ' (next reload will re-fetch)', true);
        }
      }
      return body;
    },

    // What's cached right now? Returns [{name, cachedAt, sizeKB}]
    cacheInfo() {
      const out = [];
      for (const name of readIndex()) {
        try {
          const raw = localStorage.getItem(KEY + name);
          if (!raw) { removeFromIndex(name); continue; }
          const env = JSON.parse(raw);
          out.push({ name, cachedAt: env.cachedAt || null, sizeKB: Math.round(raw.length / 1024) });
        } catch (_) { removeFromIndex(name); }
      }
      return out;
    },

    // Remove a single sheet's cache entry
    clearSheet(name) {
      try { localStorage.removeItem(KEY + name); } catch (_) {}
      removeFromIndex(name);
    },

    // Nuke everything this app has stored
    clearAll() {
      const list = readIndex();
      for (const name of list) { try { localStorage.removeItem(KEY + name); } catch (_) {} }
      try { localStorage.removeItem(INDEX_KEY); } catch (_) {}
      // Best-effort sweep of any stray bbcs:: keys the index missed
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('bbcs::')) { try { localStorage.removeItem(k); } catch (_) {} }
      }
      return list.length;
    },
  };
})();

/* --------------------------------------------------------
 * parse.js — normalize sheet payload + index by event code
 * -------------------------------------------------------- */
const parse = (() => {
  function normalizeCode(raw) {
    if (!raw) return '';
    const s = String(raw).trim().replace(/\s+/g, ' ');
    const m = s.match(/^([A-Z]{2})[\s\-]?(\d.*)$/);
    return m ? (m[1] + ' ' + m[2]).trim() : s;
  }

  // Map student.type → set of applicability codes the MCG uses.
  // MCG applicability values observed: ABM, CSO, RPA, FTE, P.
  // Student types on the board: ABM, CSO, RPA, FTE, Pilot-F, Pilot-M, Pilot-B.
  function expandStudentTypeToMcg(type) {
    if (!type) return [];
    if (/^Pilot/i.test(type)) return ['P'];
    return [type.toUpperCase()];
  }

  function isStudentApplicable(student, eventApplicability) {
    if (!eventApplicability || !eventApplicability.length) return true; // unrestricted
    const mcgCodes = expandStudentTypeToMcg(student.type);
    return mcgCodes.some(c => eventApplicability.indexOf(c) !== -1);
  }

  function indexPayload(payload) {
    // v0.5.2: collect ALL rows per code into rowsByCode so the settings-driven
    // duplicate-resolution step (parse.resolveDuplicates) can pick the effective
    // row or merge cells. `byCode` still returns one row per code for backward
    // compatibility; `duplicates` lists codes with >1 row.
    const rowsByCode = {};
    for (const evt of payload.events) {
      const code = normalizeCode(evt.eventNo);
      if (!code) continue;
      (rowsByCode[code] = rowsByCode[code] || []).push(evt);
    }
    const byCode = {};
    const duplicates = [];
    for (const [code, rows] of Object.entries(rowsByCode)) {
      byCode[code] = rows[0];  // first-row-wins default; resolveDuplicates may replace
      if (rows.length > 1) {
        byCode[code].duplicated = true;
        duplicates.push({ code, rows: rows.map(r => ({ row: r.row, title: r.title })) });
      }
    }
    if (duplicates.length) {
      console.warn('[bbcs] duplicate event codes on board:',
        duplicates.map(d => d.code + ' (' + d.rows.map(r => 'row ' + r.row).join(', ') + ')').join('; '));
    }
    return { ...payload, byCode, rowsByCode, duplicates };
  }

  return { normalizeCode, isStudentApplicable, expandStudentTypeToMcg, indexPayload };
})();

/* --------------------------------------------------------
 * dagFilter.js — per-student MCG edge filtering + series collapse.
 *
 * Hoisted out of the render module in v0.5.2 so the chain module
 * (isOpted / missingPrereqs) can apply the same filtering. Before
 * v0.5.2, chain.buildChainForStudent walked every prereq in the MCG
 * regardless of student applicability or Rule G series collapse,
 * which produced false "prereqs not met" warnings — e.g. PF 8241F
 * flagged Pope/Sternat as not-opted because the chain walker
 * descended into PF 8240F's foundation prereqs even though those
 * students had already completed the higher-level event.
 * -------------------------------------------------------- */
const dagFilter = (() => {
  // Map board student-type to MCG applicability code.
  function viewerTypeOf(student) {
    if (!student || !student.type) return null;
    if (/^Pilot/i.test(student.type)) return 'P';
    return student.type;  // CSO, RPA, FTE, ABM
  }
  // Map board dataGroup to MCG datagroup value.
  function viewerDGOf(student) {
    if (!student || !student.dataGroup) return null;
    const dg = student.dataGroup;
    if (dg === 'LJ-25') return 'Learjet';
    return dg;  // C-12, F-16, T-38
  }

  // Rule A + Rule D/E + datagroup check. Does NOT check forDownstream
  // (that needs a 2-pass reach analysis — applied later in render.buildDag).
  function edgePassesForViewer(mainEvent, prereq, viewerType, viewerDG) {
    const mainMap = (mainEvent.applicabilityDetail && mainEvent.applicabilityDetail.standardMapping)
      || mainEvent.applicability || [];
    if (mainMap.length && !mainMap.includes(viewerType)) return false;
    if (prereq.nameTag && prereq.nameTag.length && !prereq.nameTag.includes(viewerType)) return false;
    if (viewerType === 'P' && prereq.nameTagRole === 'crew-solo' && prereq.nameTagAircraft) {
      if (viewerDG !== prereq.nameTagAircraft) return false;
    }
    if (viewerType === 'P' && prereq.nameTagRole === 'non-crew-solo' && prereq.nameTagAircraft) {
      if (viewerDG === prereq.nameTagAircraft) return false;
    }
    if (prereq.condition && prereq.condition.type === 'datagroup') {
      if (!viewerDG) return false;
      if (!prereq.condition.values.includes(viewerDG)) return false;
    }
    return true;
  }

  // Rule G: tight-serial series collapse. Pos > 1 in a ranged series
  // (e.g. CF 6540-2F) → effective sole prereq is pos N-1.
  function seriesPrevPrereq(event, mcgEvents) {
    const si = event && event.seriesInfo;
    if (!si || !si.inSeries || !si.seriesId || si.seriesPosition == null || si.seriesPosition <= 1) return null;
    const prevPos = si.seriesPosition - 1;
    for (const [code, ev] of Object.entries(mcgEvents || {})) {
      if (ev && ev.seriesInfo && ev.seriesInfo.seriesId === si.seriesId && ev.seriesInfo.seriesPosition === prevPos) {
        return { code, nameTag: null, nameTagRole: null, nameTagAircraft: null, condition: null, group: null, _seriesCollapse: true };
      }
    }
    return null;
  }

  return { viewerTypeOf, viewerDGOf, edgePassesForViewer, seriesPrevPrereq };
})();

/* --------------------------------------------------------
 * status.js — 7-state logic per event / per student
 *   Primitives:
 *     cell.rgbFamily: white | lightGrey | darkGrey | paired
 *     cell.value:     date string or blank
 *     cell.strikethrough: bool (paired events only)
 *
 *   Per-student completion for an event:
 *     lightGrey              → complete
 *     paired & strike        → complete
 *     darkGrey               → not required (drops from applicable set)
 *     white & future-date    → scheduled
 *     white & past-date      → pending (+ flag for issue log)
 *     white & blank          → pending
 *     paired & !strike       → pending
 * -------------------------------------------------------- */
const statusModule = (() => {
  const STATES = {
    COMPLETE: 'Complete',
    PARTIAL: 'PartiallyComplete',
    STARTED: 'Started',
    NOT_STARTED: 'NotStarted',
    PREREQS_MET: 'PrereqsMet',
    PREREQS_PARTIAL: 'PrereqsPartiallyMet',
    PREREQS_NOT: 'PrereqsNotMet',
    UNKNOWN: 'Unknown'
  };

  function parseCellDate(value, classStart, classEnd) {
    if (!value) return null;
    // Try m/d or m/d/yy or yyyy-mm-dd
    let m = String(value).match(/^(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?$/);
    if (m) {
      let year;
      if (m[3]) year = m[3].length === 2 ? (2000 + parseInt(m[3], 10)) : parseInt(m[3], 10);
      else {
        // Pick the year from class window that makes the date valid.
        const monthI = parseInt(m[1], 10) - 1;
        const dayI = parseInt(m[2], 10);
        const cs = classStart ? new Date(classStart) : null;
        const ce = classEnd ? new Date(classEnd) : null;
        if (cs && ce && cs.getFullYear() !== ce.getFullYear()) {
          const d1 = new Date(cs.getFullYear(), monthI, dayI);
          const d2 = new Date(ce.getFullYear(), monthI, dayI);
          const d1In = d1 >= cs && d1 <= ce;
          const d2In = d2 >= cs && d2 <= ce;
          // If neither year makes the date land inside the class window, the
          // cell is ambiguous — return null rather than silently picking
          // one year and letting the UI lie about "scheduled / past-dated."
          if (!d1In && !d2In) return null;
          year = d1In ? cs.getFullYear() : ce.getFullYear();
        } else {
          year = (cs || ce || new Date()).getFullYear();
        }
      }
      return new Date(year, parseInt(m[1], 10) - 1, parseInt(m[2], 10));
    }
    m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    return null;
  }

  function classifyCell(cell, classMeta, now) {
    // v0.3.3: surface the parsed date (`dateText`) on the result so UI can
    // show "SCHEDULED 4/14" regardless of which status wins the chip.
    // Also compare at day precision — a cell dated today should be
    // "scheduled" not "past-date-unchecked" (was bug: C RYAN PF 6121F
    // "4/14" showed OPTED instead of SCHEDULED because `d > now` was false
    // by mid-afternoon).
    const result = { completion: 'pending', scheduled: false, flag: null, dateText: null };
    if (!cell) return result;
    if (cell.rgbFamily === 'darkGrey') { result.completion = 'notreq'; return result; }
    if (cell.rgbFamily === 'lightGrey') {
      result.completion = 'complete';
      if (cell.value) result.dateText = String(cell.value);
      return result;
    }
    if (cell.rgbFamily === 'paired') {
      result.completion = cell.strikethrough ? 'complete' : 'paired-opted';
      if (cell.value) result.dateText = String(cell.value);
      return result;
    }
    // white
    if (cell.strikethrough) {
      console.warn('[bbcs] white cell with strikethrough', cell);
    }
    const d = parseCellDate(cell.value, classMeta.startDate, classMeta.endDate);
    if (d) {
      result.dateText = String(cell.value);
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      // v0.5.2e: a white cell with a date is "scheduled" regardless of
      // whether the date is in the past or future. The IP just hasn't
      // marked it complete yet — visually identical to future-scheduled.
      // The `past-date-unchecked` flag drives "verify" wording downstream;
      // it does not change the dot color or chip band.
      result.completion = 'scheduled';
      result.scheduled = true;
      if (d < today) result.flag = 'past-date-unchecked';
    }
    return result;
  }

  // v0.5.1: MCG-authority applicability check. Maps board student type
  // (Pilot-F/M/B → P) and DG (LJ-25 → Learjet) to MCG codes, then:
  //   - If MCG has no applicability list (truly universal event) → true
  //   - Otherwise student type must be in standardMapping
  //   - For crew-solo aircraft events (role=crew-solo + aircraft set):
  //     pilot DG must match the aircraft
  //   - For non-crew-solo aircraft events: pilot DG must NOT match
  //   - role=select P / select STC / optional → respect the underlying
  //     audience without further DG narrowing (manual selection by sched)
  function isStudentApplicablePerMcg(mcgEvent, student) {
    if (!mcgEvent) return true;  // unknown to MCG — defer to board
    const sType = /^Pilot/i.test(student.type) ? 'P' : student.type;
    const sDG = student.dataGroup === 'LJ-25' ? 'Learjet' : student.dataGroup;
    const det = mcgEvent.applicabilityDetail || {};
    const map = (det.standardMapping && det.standardMapping.length)
      ? det.standardMapping
      : (mcgEvent.applicability || []);
    if (!map.length) return true;  // truly universal
    if (!map.includes(sType)) return false;
    // Pilot DG narrowing
    if (sType === 'P' && det.aircraft) {
      if (det.role === 'crew-solo' && sDG !== det.aircraft) return false;
      if (det.role === 'non-crew-solo' && sDG === det.aircraft) return false;
    }
    return true;
  }

  function computeEventStatus(evt, students, classMeta, prereqStatusByStudent) {
    const now = new Date();
    const perStudent = {};
    for (const s of students) {
      const cell = evt.cells ? evt.cells.find(c => c.col === s.col) : null;
      const classified = classifyCell(cell, classMeta, now);
      perStudent[s.col] = {
        col: s.col,
        name: s.name,
        type: s.type,
        applicable: undefined,  // filled below
        cell: cell,
        completion: classified.completion,
        flag: classified.flag,
        dateText: classified.dateText,
      };
    }
    return perStudent;
  }

  function aggregateEvent(evt, mcgEvent, perStudent, students) {
    // v0.5.2 split: distinguish "MCG says applicable" from "board excused".
    // Both used to collapse into a single `applicable` flag, which let a
    // single mis-painted dark-grey cell make a student vanish (PF 8211F:
    // one CSO miscolored on the board → no roster shown for the entire
    // ABM/CSO/FTE event). Now:
    //   - mcgApplicable: MCG says this student type/DG must do the event.
    //     Always rendered in the roster.
    //   - excused:       mcgApplicable AND board cell is dark-grey. The
    //                    student is shown but flagged as a mismatch.
    //   - applicable:    mcgApplicable AND not excused. Used for the
    //                    completion-percentage math (excused students
    //                    don't count toward the denominator since they
    //                    aren't required to complete the event).
    // Per KB §0: MCG is authoritative for applicability; the Big Board is
    // not. Mismatches surface as warnings, not silent overrides.
    const apps = [];
    let mcgApplicableCount = 0;
    let excusedCount = 0;
    for (const s of students) {
      const ps = perStudent[s.col];
      const mcgOk = isStudentApplicablePerMcg(mcgEvent, s);
      const boardSaysNotReq = ps.completion === 'notreq';
      ps.mcgApplicable = mcgOk;
      ps.excused = mcgOk && boardSaysNotReq;
      ps.applicable = mcgOk && !boardSaysNotReq;
      if (ps.mcgApplicable) mcgApplicableCount++;
      if (ps.excused) excusedCount++;
      if (ps.applicable) apps.push(ps);
    }

    // Semantic note (BUG-2 fix):
    // `scheduled` means a white cell with a future date — real progress.
    // `paired-opted` means a colored pair cell with no strikethrough — the
    // student's partner hasn't finished either, so this is NOT evidence of
    // progress; it only tells us the scheduler has assigned a pair. We used
    // to lump both into `scheduledOrStarted` which bumped state to Started
    // and skipped the prereq-refinement branch in renderCard. Now:
    //   - `scheduled` → counts toward Started
    //   - `paired-opted` → tracked separately for the progress summary, but
    //     does NOT move the event past NotStarted on its own.
    let completes = 0, scheduled = 0, pairedOpted = 0;
    for (const ps of apps) {
      if (ps.completion === 'complete') completes++;
      else if (ps.completion === 'scheduled') scheduled++;
      else if (ps.completion === 'paired-opted') pairedOpted++;
    }
    const total = apps.length;
    let state = 'Unknown';
    if (total === 0) {
      state = 'PrereqsMet';  // no applicable students — benign
    } else if (completes === total) state = 'Complete';
    else if (completes / total >= 0.5) state = 'PartiallyComplete';
    else if (completes > 0 || scheduled > 0) state = 'Started';
    else state = 'NotStarted';

    return {
      state,
      applicable: apps.length,
      mcgApplicable: mcgApplicableCount,
      excused: excusedCount,
      mismatch: excusedCount > 0,  // v0.5.2: MCG-vs-DBB applicability mismatch
      completes,
      scheduled,
      pairedOpted,
      // kept for backwards-compat with any callers expecting the old field
      scheduledOrStarted: scheduled + pairedOpted,
      pctComplete: total ? Math.round((completes / total) * 100) : 0,
    };
  }

  return { STATES, classifyCell, parseCellDate, computeEventStatus, aggregateEvent, isStudentApplicablePerMcg };
})();

/* --------------------------------------------------------
 * chain.js — transitive prereq chain for a goal event,
 * filtered to only events that appear on the big board.
 *   Each chain item: { code, title, onBoard, depth, status }
 * -------------------------------------------------------- */
const chain = (() => {
  // v0.5.2: chain walking now applies per-student MCG filtering + Rule G
  // series collapse via dagFilter. Without these, isOpted descended into
  // prereqs that didn't apply to the student (e.g. crew-solo C-12 events
  // for an F-16 pilot, or PF 8240F's foundational prereqs after the
  // higher-level event was already complete) and produced false-positive
  // "prereqs not met" warnings.
  function buildChainForStudent(goalCode, payload, student) {
    const mcgEvents = MCG_GRAPH.events || {};
    const now = new Date();
    const seen = new Set();
    const out = [];
    const stack = [{ code: goalCode, depth: 0 }];
    const viewerType = dagFilter.viewerTypeOf(student);
    const viewerDG = dagFilter.viewerDGOf(student);
    while (stack.length) {
      const node = stack.shift();
      if (seen.has(node.code)) continue;
      seen.add(node.code);
      const mcg = mcgEvents[node.code];
      const onBoardEvt = payload.byCode[node.code];
      const onBoard = !!onBoardEvt;
      let status = 'offboard';
      let flag = null;
      let dateText = null;
      if (onBoard) {
        const cell = onBoardEvt.cells.find(c => c.col === student.col);
        const classified = statusModule.classifyCell(cell, payload.classMeta, now);
        status = classified.completion;
        flag = classified.flag || null;
        dateText = classified.dateText || null;
      }
      if (node.code !== goalCode) {
        out.push({
          code: node.code,
          title: (mcg && mcg.eventName) || (onBoardEvt && onBoardEvt.title) || '?',
          onBoard,
          status,
          flag,        // v0.5.2d: 'past-date-unchecked' for white cells with past dates
          dateText,    // v0.5.2d: scheduled date if any, used for soft-monitor categorization
          depth: node.depth,
        });
      }
      // Walk this event's prereqs only when the cell has truly no plan
      // (pending blank). Anything else — complete, scheduled (future or
      // past-await-update after v0.5.2e classifyCell change), notreq,
      // paired-opted — represents a plan we trust; don't descend, otherwise
      // a deeper blank cell would escalate the whole chain to "hard hole."
      if (status !== 'pending') continue;
      // Rule G: pos > 1 in a tight series collapses to pos N-1 only.
      const serialPrev = dagFilter.seriesPrevPrereq(mcg, mcgEvents);
      const rawPrereqs = serialPrev ? [serialPrev] : ((mcg && mcg.prerequisites) || []);
      for (const p of rawPrereqs) {
        if (!p || !p.code || seen.has(p.code)) continue;
        // Per-student filter: skip prereqs that don't apply to this viewer.
        if (mcg && !dagFilter.edgePassesForViewer(mcg, p, viewerType, viewerDG)) continue;
        stack.push({ code: p.code, depth: node.depth + 1 });
      }
    }
    // Sort: onBoard incomplete first, then onBoard complete, then offboard.
    out.sort((a, b) => {
      const ra = a.onBoard ? (a.status === 'complete' ? 2 : 1) : 3;
      const rb = b.onBoard ? (b.status === 'complete' ? 2 : 1) : 3;
      if (ra !== rb) return ra - rb;
      return a.depth - b.depth;
    });
    return out;
  }

  // Is student opted for goalCode? They are if every board-visible prereq is
  // marked complete for them. Off-board prereqs are assumed met (D10).
  function isOpted(goalCode, payload, student, mcgEvent) {
    // Board data check: if the student's cell for the goal is dark-grey,
    // they aren't required to do it → not opted.
    const goalEvt = payload.byCode[goalCode];
    if (goalEvt) {
      const goalCell = goalEvt.cells.find(c => c.col === student.col);
      if (goalCell && goalCell.rgbFamily === 'darkGrey') return false;
    }
    const items = buildChainForStudent(goalCode, payload, student);
    for (const it of items) {
      if (it.onBoard && it.status !== 'complete' && it.status !== 'notreq') return false;
    }
    return true;
  }

  // v0.5.1: list the on-board prereqs that aren't complete for this student.
  // Returns an array of { code, title, status } for the user warning detail.
  function missingPrereqs(goalCode, payload, student) {
    const items = buildChainForStudent(goalCode, payload, student);
    return items.filter(it => it.onBoard && it.status !== 'complete' && it.status !== 'notreq');
  }

  return { buildChainForStudent, isOpted, missingPrereqs };
})();

/* --------------------------------------------------------
 * render.js — the UI
 * -------------------------------------------------------- */
const render = (() => {

  // v0.3.2: collapse state persists per-goal, keyed by code. Default state
  // is "all collapsed" — the user asked for condensed nodes by default. Flip
  // by clicking the node's (+)/(−) toggle or the Expand/Collapse All buttons.
  let expanded = new Set();

  // Module-scoped refs so the toggle handler can redraw arrows after a
  // node changes width.
  let _lastCanvas = null;
  let _lastPayload = null;
  let _lastEdges = null;
  let _lastMode = 'class';
  let _lastStudent = null;
  let _lastGoalCode = null;
  let _resizeObserver = null;
  let _lastVisibleCodes = null;
  let _lastNodeByCode = null;
  let _focusedCode = null;  // v0.5.1: click-to-focus state

  // Goal-scope filter: students who SHOULD do the goal event.
  //   v0.5.1: MCG applicability is the authority. Board dark-grey is an
  //   additional override (scheduler explicitly excluded the student).
  //   Per-student goal cells with white/lightGrey colors but a student type
  //   not in the MCG applicability list are NOT in scope (CF 6370F bug).
  function goalScopeStudents(payload, goalCode) {
    const goalEvt = payload.byCode[goalCode];
    const mcgGoal = MCG_GRAPH.events[goalCode];
    return payload.students.filter(s => {
      if (!statusModule.isStudentApplicablePerMcg(mcgGoal, s)) return false;
      if (!goalEvt) return true;
      const cell = goalEvt.cells.find(c => c.col === s.col);
      return !cell || cell.rgbFamily !== 'darkGrey';
    });
  }

  // Role grouping for the two student columns inside each node.
  // PRIMARY = ABM + FTE + CSO + RPA (crew / ground); SECONDARY = pilots.
  // If applicability allows only one side, render that as a single column.
  function roleBucket(studentType) {
    if (!studentType) return null;
    if (/^Pilot/i.test(studentType)) return 'pilot';
    if (['ABM','FTE','CSO','RPA'].indexOf(studentType) !== -1) return 'crew';
    return 'crew';
  }

  // Label the "crew" column based on which roles are actually applicable.
  function crewColumnLabel(applicableTypes) {
    const have = new Set(applicableTypes.map(t => t.toUpperCase()));
    const order = ['ABM','FTE','CSO','RPA'];
    const present = order.filter(r => have.has(r));
    return present.length ? present.join('/') : 'Crew';
  }

  // Classify an aggregate percentage into a CSS status class for headers/bars.
  function bandForPct(pct, applicable) {
    if (applicable === 0) return 's-none';  // nothing applicable — treat as not-started
    if (pct >= 75) return 's-green';
    if (pct > 0)   return 's-yellow';
    return 's-none';
  }
  function arrowClassForBand(band) {
    if (band === 's-green') return 'a-green';
    if (band === 's-yellow') return 'a-yellow';
    return 'a-none';
  }

  // ============================================================
  // v0.5 DAG builder (new MCG schema — mcg-handoff-2026-04-21)
  //
  // Walks MCG prereqs backward from a goal and produces a DAG tuned
  // to the viewer. Keeps v0.4.3's output shape `{ nodesByCode, edges,
  // maxDepth }` so the rest of the render pipeline is unchanged.
  //
  // Rules applied (see mcg-handoff-2026-04-21/mcg-knowledge-base.md):
  //   Rule A  — viewer ∈ (mainEvent.applicability ∩ prereq.nameTag)
  //              (otherwise PRUNE the edge and its subtree)
  //   Rule C/J — universal aircraft events applied via applicability
  //              array already (data handles it)
  //   Rule D/E — crew-solo / non-crew-solo: prereq.nameTagRole +
  //              prereq.nameTagAircraft narrow pilots by DG
  //   Rule G  — tight-serial collapse when seriesInfo.inSeries AND
  //              position > 1: effective prereqs of pos-N are JUST
  //              {pos N-1}, not the full foundational list
  //   Rule I  — on-board = show; off-board = hide but traverse
  //              (post-walk collapse of off-board nodes, preserving
  //              bridge metadata for edge tooltips)
  //   oneOf   — prereq.group.id collapses alternatives. If the viewer
  //              has only one surviving alternative, edge is drawn
  //              direct; if multiple survive, a virtual "pick-one"
  //              group node merges them visually
  // Conditions applied:
  //   datagroup   — keep edge only if viewerDG ∈ condition.values
  //   forDownstream — keep edge only if condition.target is reached
  //                   in the viewer's DAG (2-pass; self-target is
  //                   treated as unconditional)
  //
  // CALLING CONVENTION:
  //   buildDag(goalCode, payload)  — dispatches by mode:
  //     mode 'class' (default) → union of per-applicable-student DAGs
  //     mode 'student' → single viewer DAG
  //   The render pipeline passes `mode` and `student` in via
  //   _lastMode / _lastStudent, but buildDag is also called from
  //   debug panels without mode — fall back to class-union.
  //
  // Returns { nodesByCode, edges, maxDepth }
  //   nodesByCode[code] = { code, depth, isGroup?, members?, groupDesc?, appliesTo: Set<studentType> }
  //   edges = [{ from, to, bridge: [offBoardCodes], groupId?, condition? }]
  // ============================================================

  // v0.5.2: viewerTypeOf / viewerDGOf hoisted to top-level dagFilter so chain
  // can use them too. Local aliases for back-compat with legacy call sites.
  const viewerTypeOf = dagFilter.viewerTypeOf;
  const viewerDGOf = dagFilter.viewerDGOf;
  // Goal-scope students: MCG applicability ∩ (no board dark-grey override).
  // v0.5.1: matches the higher-level goalScopeStudents() rule. The two used
  // to differ; now both use MCG-as-authority.
  function goalScopeStudentsRaw(payload, goalCode) {
    const goalEvt = payload.byCode[goalCode];
    const mcgGoal = MCG_GRAPH.events[goalCode];
    return payload.students.filter(s => {
      if (!statusModule.isStudentApplicablePerMcg(mcgGoal, s)) return false;
      if (!goalEvt) return true;
      const cell = goalEvt.cells.find(c => c.col === s.col);
      return !cell || cell.rgbFamily !== 'darkGrey';
    });
  }

  // v0.5.2: edgePassesForViewer + seriesPrevPrereq hoisted to top-level
  // dagFilter (see top of file). Local aliases keep the call sites below
  // unchanged.
  const edgePassesForViewer = dagFilter.edgePassesForViewer;
  const seriesPrevPrereq = (event) => dagFilter.seriesPrevPrereq(event, MCG_GRAPH.events);

  // Build single-viewer DAG including off-board nodes; conditions/applicability
  // pruning applied on edges. forDownstream filtering happens AFTER walk.
  function buildDagForViewer(goalCode, payload, viewerType, viewerDG) {
    const nodesByCode = {};
    const edges = [];
    const seenEdges = new Set();
    if (!MCG_GRAPH.events[goalCode] && !payload.byCode[goalCode]) {
      return { nodesByCode, edges, maxDepth: 0 };
    }

    function addEdge(from, to, meta) {
      const k = `${from}→${to}`;
      if (seenEdges.has(k)) return;
      seenEdges.add(k);
      edges.push(Object.assign({ from, to, bridge: [] }, meta));
    }

    const queue = [{ code: goalCode, depth: 0 }];
    const seen = new Set();
    let maxDepth = 0;

    while (queue.length) {
      const { code, depth } = queue.shift();
      if (seen.has(code)) continue;
      seen.add(code);
      if (!nodesByCode[code]) nodesByCode[code] = { code, depth };
      else nodesByCode[code].depth = Math.max(nodesByCode[code].depth, depth);
      maxDepth = Math.max(maxDepth, depth);

      const event = MCG_GRAPH.events[code];
      if (!event) continue;  // dangling prereq (e.g. TF 5301A). Render node; stop walk.

      // Rule G: collapse tight series. Pos > 1 keeps ONLY the pos-N-1 link.
      const serialPrev = seriesPrevPrereq(event);
      const rawPrereqs = serialPrev ? [serialPrev] : (event.prerequisites || []);

      // Partition prereqs into oneOf groups vs direct.
      const byGroup = {};
      const direct = [];
      for (const p of rawPrereqs) {
        if (!p || !p.code) continue;
        if (p.group && p.group.id) {
          (byGroup[p.group.id] = byGroup[p.group.id] || []).push(p);
        } else {
          direct.push(p);
        }
      }

      // Direct prereqs — filter by Rule A + DG, then add edge.
      for (const p of direct) {
        if (!edgePassesForViewer(event, p, viewerType, viewerDG)) continue;
        addEdge(p.code, code, { condition: p.condition || null });
        if (!seen.has(p.code)) queue.push({ code: p.code, depth: depth + 1 });
      }

      // oneOf groups — filter members, then either direct-edge (1 member) or
      // virtual group node (multiple members).
      for (const gid of Object.keys(byGroup)) {
        const members = byGroup[gid];
        const kept = members.filter(p => edgePassesForViewer(event, p, viewerType, viewerDG));
        if (kept.length === 0) continue;
        if (kept.length === 1) {
          const p = kept[0];
          addEdge(p.code, code, { condition: p.condition || null, groupId: gid });
          if (!seen.has(p.code)) queue.push({ code: p.code, depth: depth + 1 });
        } else {
          const groupCode = 'GROUP:' + gid;
          if (!nodesByCode[groupCode]) {
            nodesByCode[groupCode] = {
              code: groupCode,
              depth: depth + 1,
              isGroup: true,
              groupId: gid,
              members: kept.map(p => p.code),
              groupDesc: (members[0].group && members[0].group.description) || 'Pick one of the alternatives',
            };
          }
          addEdge(groupCode, code, { groupId: gid });
          for (const p of kept) {
            addEdge(p.code, groupCode, { groupId: gid });
            if (!seen.has(p.code)) queue.push({ code: p.code, depth: depth + 1 });
          }
        }
      }
    }

    // Pass 2: forDownstream filter. Drop edges whose target event didn't
    // end up in the walker's reach set (and isn't the edge's own to-node).
    // Self-target is a tautology (common extraction artifact) → keep.
    // Non-code targets (sentinels like "all", "P", descriptive phrases)
    // → keep as unconditional (KB open question; conservative behavior).
    function dropForDownstream() {
      const reachNodes = new Set(Object.keys(nodesByCode));
      const removedKeys = new Set();
      for (const e of edges) {
        const c = e.condition;
        if (!c || c.type !== 'forDownstream' || !c.target) continue;
        const target = c.target;
        if (target === e.to) continue;                  // tautology — keep
        if (!/^[A-Z]{2} \d{4}[A-Z]?$/.test(target)) continue;  // sentinel — keep
        if (!reachNodes.has(target)) removedKeys.add(e.from + '→' + e.to);
      }
      if (!removedKeys.size) return false;
      for (let i = edges.length - 1; i >= 0; i--) {
        if (removedKeys.has(edges[i].from + '→' + edges[i].to)) edges.splice(i, 1);
      }
      return true;
    }
    // Iterate until stable (target may have been reached through a dropped edge).
    let guard = 8;
    while (dropForDownstream() && guard-- > 0) { /* re-evaluate */ }

    return { nodesByCode, edges, maxDepth };
  }

  // Collapse off-board nodes. Any node not on the board (except the goal
  // itself and virtual group nodes) is removed; its in/out edges are
  // bridged, and the traversed off-board code is appended to the bridge
  // metadata for edge tooltips. Iterates until only on-board nodes remain.
  // v0.5.2a: classify each node for off-board handling.
  //   'on-board'   → kept as-is (has a BB row AND type is not hidden)
  //   'virtual'    → kept (virtual oneOf group node)
  //   'missing'    → MCG needs it, type is BB-tracked, no BB row → render as
  //                  a MISSING warning node so the user sees the gap
  //   'collapse'   → untracked or user-hidden type → bridge & drop
  //
  // Order matters: if the user disables a type (e.g. Exams), we bridge ALL
  // events of that type — including ones that ARE on the board — so the
  // "hide" toggle is intuitive.
  function classifyNode(code, payload, goalCode) {
    if (code === goalCode) return 'on-board';
    if (typeof code === 'string' && code.startsWith('GROUP:')) return 'virtual';

    const mcg = (typeof MCG_GRAPH !== 'undefined' && MCG_GRAPH.events) ? MCG_GRAPH.events[code] : null;
    const settings = getAppSettings();
    const tracked = effectiveTrackedTypes();
    const onBoard = !!payload.byCode[code];
    const eventType = mcg && mcg.eventType;

    // Known type the user has hidden → always bridge through.
    if (eventType && !tracked.has(eventType)) return 'collapse';

    // On board AND type is visible → on-board.
    if (onBoard) return 'on-board';

    // Not on board; type is tracked → missing warning (if user wants those).
    if (eventType && tracked.has(eventType)) {
      return settings.showMissingFromBB ? 'missing' : 'collapse';
    }

    // Unknown-to-MCG dangling reference (e.g. TF 5301A) — only show if the
    // "untracked off-board" escape-hatch is on.
    if (settings.showUntrackedOffBoard && mcg) return 'missing';
    return 'collapse';
  }

  function collapseOffBoard(dag, payload, goalCode) {
    let changed = true;
    let guard = 64;
    while (changed && guard-- > 0) {
      changed = false;
      // Only collapse nodes whose classification is 'collapse'. Keep 'missing'
      // (tracked type, no BB row) visible so the user sees the gap.
      const collapseCodes = Object.keys(dag.nodesByCode).filter(c =>
        classifyNode(c, payload, goalCode) === 'collapse'
      );
      if (!collapseCodes.length) break;
      const code = collapseCodes[0];
      const ins = dag.edges.filter(e => e.to === code);
      const outs = dag.edges.filter(e => e.from === code);
      const newEdges = [];
      const seenNew = new Set();
      for (const inE of ins) {
        for (const outE of outs) {
          if (inE.from === outE.to) continue;
          const bridge = (inE.bridge || []).concat([code], (outE.bridge || []));
          const key = inE.from + '→' + outE.to;
          if (seenNew.has(key)) continue;
          seenNew.add(key);
          newEdges.push({ from: inE.from, to: outE.to, bridge, condition: null });
        }
      }
      dag.edges = dag.edges.filter(e => e.from !== code && e.to !== code);
      for (const ne of newEdges) {
        const existing = dag.edges.find(e => e.from === ne.from && e.to === ne.to);
        if (!existing) dag.edges.push(ne);
        else if ((existing.bridge || []).length > ne.bridge.length) existing.bridge = ne.bridge;
      }
      delete dag.nodesByCode[code];
      changed = true;
    }

    // Tag any remaining off-board (i.e. 'missing') nodes so renderers can
    // pick up the flag without re-classifying.
    for (const c of Object.keys(dag.nodesByCode)) {
      const klass = classifyNode(c, payload, goalCode);
      if (klass === 'missing') {
        dag.nodesByCode[c].isMissing = true;
      }
    }

    // Refresh maxDepth after structure changes.
    dag.maxDepth = 0;
    for (const c of Object.keys(dag.nodesByCode)) {
      const d = dag.nodesByCode[c].depth || 0;
      if (d > dag.maxDepth) dag.maxDepth = d;
    }
  }

  // Break 2-cycles before dagre layout. Symmetric MCG entries (e.g. CF 6660S ↔
  // CF 6672F) cause dagre's FAS to reverse one edge at layout time, which
  // drew as "lines loop back" in v0.4.0. Keep upstream-deeper direction.
  function break2Cycles(dag) {
    const keys = new Set(dag.edges.map(e => e.from + '→' + e.to));
    const drop = new Set();
    for (const e of dag.edges) {
      const rev = e.to + '→' + e.from;
      const fwd = e.from + '→' + e.to;
      if (!keys.has(rev)) continue;
      if (drop.has(fwd) || drop.has(rev)) continue;
      const fd = (dag.nodesByCode[e.from] && dag.nodesByCode[e.from].depth) || 0;
      const td = (dag.nodesByCode[e.to]   && dag.nodesByCode[e.to].depth)   || 0;
      if (fd >= td) drop.add(rev);
      else drop.add(fwd);
    }
    dag.edges = dag.edges.filter(e => !drop.has(e.from + '→' + e.to));
  }

  // Union multiple per-student DAGs into one class-view DAG. Each node is
  // annotated with `appliesTo` = set of student types that include it; depth
  // is the max across students (longest path wins).
  function unionDags(dags, studentTypeByDag) {
    const nodesByCode = {};
    const edgeMap = {};
    let maxDepth = 0;
    for (let i = 0; i < dags.length; i++) {
      const dag = dags[i];
      const stype = studentTypeByDag[i];
      for (const [code, n] of Object.entries(dag.nodesByCode)) {
        if (!nodesByCode[code]) {
          nodesByCode[code] = Object.assign({}, n, { appliesTo: new Set() });
        }
        if (stype) nodesByCode[code].appliesTo.add(stype);
        nodesByCode[code].depth = Math.max(nodesByCode[code].depth || 0, n.depth || 0);
        if (n.isGroup) {
          nodesByCode[code].isGroup = true;
          nodesByCode[code].groupId = n.groupId;
          nodesByCode[code].members = n.members;
          nodesByCode[code].groupDesc = n.groupDesc;
        }
      }
      for (const e of dag.edges) {
        const k = e.from + '→' + e.to;
        if (!edgeMap[k]) {
          edgeMap[k] = Object.assign({}, e, { bridge: (e.bridge || []).slice() });
        } else if ((edgeMap[k].bridge || []).length > (e.bridge || []).length) {
          edgeMap[k].bridge = (e.bridge || []).slice();
        }
      }
      if (dag.maxDepth > maxDepth) maxDepth = dag.maxDepth;
    }
    return { nodesByCode, edges: Object.values(edgeMap), maxDepth };
  }

  // Public entry point. Mode = 'student' with `student` → single viewer DAG;
  // mode = 'class' (default) → union of DAGs for every goal-scope student.
  function buildDag(goalCode, payload, opts) {
    opts = opts || {};
    const mode = opts.mode || 'class';

    if (mode === 'student' && opts.student) {
      const s = opts.student;
      const viewerType = viewerTypeOf(s);
      const viewerDG = viewerDGOf(s);
      const dag = buildDagForViewer(goalCode, payload, viewerType, viewerDG);
      collapseOffBoard(dag, payload, goalCode);
      break2Cycles(dag);
      // Annotate appliesTo (single-student case)
      for (const c of Object.keys(dag.nodesByCode)) {
        dag.nodesByCode[c].appliesTo = new Set([s.type]);
      }
      return dag;
    }

    // Class view: union of per-student DAGs over goal-scope students.
    const scope = goalScopeStudentsRaw(payload, goalCode);
    if (!scope.length) {
      // No one is scoped — still return a goal-only DAG so the picker works.
      return { nodesByCode: { [goalCode]: { code: goalCode, depth: 0, appliesTo: new Set() } }, edges: [], maxDepth: 0 };
    }
    const dags = [];
    const types = [];
    for (const s of scope) {
      dags.push(buildDagForViewer(goalCode, payload, viewerTypeOf(s), viewerDGOf(s)));
      types.push(s.type);
    }
    // Collapse each per-student DAG individually so bridges are correct per viewer.
    for (const d of dags) collapseOffBoard(d, payload, goalCode);
    const merged = unionDags(dags, types);
    break2Cycles(merged);
    return merged;
  }

  // ------------------------------------------------------------
  // Per-node aggregate (class view) — reuses statusModule.
  // ------------------------------------------------------------
  function computeNodeAggregate(code, payload) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    const perStudent = statusModule.computeEventStatus(boardEvent, payload.students, payload.classMeta);
    const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, payload.students);
    return { boardEvent, mcgEvent, perStudent, agg };
  }
