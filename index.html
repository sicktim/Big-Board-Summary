<!DOCTYPE html>
<!--
============================================================
 File:       index.html
 Module:     big-board-curriculum-status / client
 Version:    0.4.1
 MCG Target: 26A
 Updated:    2026-04-15
 Changelog:
   0.4.1 - Line-rendering pass:
           - Orphan-node fix: nodes whose visible edges all got
             filtered out (e.g. CF 6605S on some goal views) are
             now dropped from the canvas instead of shown as
             floating islands. Goal itself is always kept.
           - Endpoint clamping: every arrow visibly starts at the
             right-center of its source node and ends at the left-
             center of its target. Fixes the "lines emerge from the
             centroid" artifact from v0.4.0.
           - New "Lines" selector in the sub-bar with four styles:
             Polyline (default, straight segments along dagre
             waypoints), Smooth curve (cubic bezier with horizontal
             tangents), Orthogonal (right-angle routing), and
             Straight (direct line, ignores waypoints entirely —
             useful for debugging).
           - Choice persisted in localStorage so reloads remember.
           - Dropped the v0.4.0 Q/T smoothing path — it produced
             the "loops back on itself" artifacts the user reported.
           - 2-cycle breaker in buildDag: when the MCG has mutual
             prereq entries (CF 6660S ↔ CF 6672F on 26A), keep the
             direction whose 'from' is deeper (further from goal)
             and drop the reverse. Without this, dagre's feedback-
             arc-set reversal drew the other direction backward.
   0.4.0 - Feedback pass (issues.md v0.3.3):
           - Cache-first boot. Page no longer hangs on reload waiting
             for sheets_avail. Boot auto-loads the most-recently-cached
             sheet (prefers 26A FTC Big Board). New ⟳ Tabs button to
             manually refresh the tab list.
           - Dagre layered layout replaces the hand-rolled flex columns.
             Fixes line crossings + lines cutting through nodes. Edge
             waypoints are computed to route around nodes.
           - Fallback path: if dagre.min.js isn't loaded, app still
             works using the old column layout with a banner warning.
           - Off-board bridge tooltip on edges (hover a line that goes
             through an off-board chain — it shows "via off-board:
             CODE → CODE").
           - Student-dot hover tooltips now show the actual completion
             state + date, e.g. "R POPE — scheduled · 4/16". Replaces
             the v0.3.2 misleading "always says Opted" tooltip.
           - New WARN state: scheduled-but-not-opted. Fires when a
             student has a future date on the board but their prereqs
             aren't met (a planning red flag). Shown as:
               * Class view — orange pulsing dot + ⚠ prefix on name
               * Student view — orange header + "⚠ SCHEDULED · NOT
                 OPTED" chip instead of the regular SCHEDULED.
   0.3.3 - Feedback pass (issues.md v0.3.2):
           - Off-board prereq bridge: buildDag now walks through
             off-board events transitively and flattens the chain
             to on-board edges. Fixes FQ 9511F showing as a one-
             node DAG when its on-board ancestors (through the
             FQ 8210Y oral report bridge) were being hidden.
           - Today's date now counts as SCHEDULED, not past-dated
             pending. Day-precision comparison (was: timestamp
             comparison that flipped by mid-afternoon).
           - Date from cell.value threaded through to the student-
             view node and shown under the chip, regardless of
             whether the chip is OPTED or SCHEDULED (so "OPTED
             4/14" reads as "prereqs met AND scheduled on 4/14").
           - OPTED recolored to blue (#d7e8f5 / #0a3d62) so it's
             distinct from DONE's solid green at a glance.
           - Collapsed nodes now show a 2-line clamped title, not
             just the event code. Minimum width bumped to 180px.
           - Arrow drift on toggle fixed: removed the 150ms width
             transition that caused SVG to be drawn during the
             anim; redraw uses double-RAF and a ResizeObserver on
             the canvas so window resize also works.
           - Cache diagnostics:
             * Every fetchSheet logs cache HIT/MISS/WRITE/FAIL
               to console (unconditional, not behind DEBUG).
             * Boot-time canary detects if localStorage persists
               across reloads; banner warns if it doesn't.
             * Write failures surface in the banner with the
               specific error (QuotaExceeded, etc.).
   0.3.2 - Feedback pass (issues.md v0.3.1):
           - Student view now has 4 distinct states: DONE (dark
             green), OPTED (light green), SCHEDULED (yellow),
             NOT OPTED (red). Renamed from v0.3.1 "BLOCKED".
           - Class view nodes default to COLLAPSED. Each node has
             a (+)/(−) button that expands to the full progress+
             roster view. Arrows redraw when width changes.
           - Added Expand all / Collapse all buttons in the sub-bar
             (class view only).
           - Dense roster lists wrap into multiple CSS columns
             (column-width: 90px) so nodes like CF 6605S with 11
             pilots no longer leave dead space.
           - Node rosters are now pre-filtered by GOAL applicability
             — a PF 8332F (ABM/FTE/P) view never shows CSO/RPA
             anywhere, even on prereq nodes they'd technically
             qualify for. Aggregates also restrict to goal scope.
           - Class view dims (light grey) student names when they
             aren't opted for that specific node's event (prereqs
             not met). Still visible, just faded so you can see at
             a glance who's ready vs who's blocked.
           - Student view: if the selected student isn't applicable
             to the chosen goal, shows a Not Applicable screen
             instead of trying to render a DAG.
   0.3.1 - Blocker fix found in pre-flight DAG harness:
           buildDag had no visited-set guard, so MCG cycles (notably
           CF 6660S ↔ CF 6672F on 26A) caused an infinite BFS loop
           that would hang the tab for 6 of the 10 goal events
           (PF 8311F, PF 8332F, SY 7503F, SY 7511F, SY 7512C,
           TF 9111E). Added seen-set; first-visit-wins gives tier
           depth = shortest-path-from-goal, which is fine for layout.
   0.3.0 - UI rewrite per user's example-class-overview.png:
           - Replaced card-dashboard with a DAG flow chart rooted on
             one user-chosen goal event (Target Event dropdown).
           - Added View toggle: Class (aggregate %) vs Student (binary
             opted/not-opted for one picked student).
           - Nodes show header code+title (colored by status), a
             progress bar+percentage, and two role columns
             (ABM/FTE | Pilots) with per-student dots.
           - Off-board prereqs NO LONGER SHOWN anywhere. Issue #1.
           - Not-applicable events hidden (for class: nodes with zero
             applicable students; for student: nodes where this
             student isn't applicable).
           - Color bands: 0% red · 1-74% yellow · 75%+ green · goal
             node grey-dashed.
           - Arrow color follows source node's status.
           - Auto-layout by depth with horizontal scroll if wide.
           - Dropped TRACKS config + renderMissingCard + the old
             legend's "cell format" section (cell formats still
             matter under the hood but shouldn't clutter the UI).
   0.2.1 - Cache upgrade (tooling for UI iteration, no schema change):
           - Switched from sessionStorage to localStorage so cached
             fetches survive tab close / reload. Heavy fetch_sheet
             calls only happen when the user explicitly hits Refresh
             or Clear Cache.
           - Cache entries now stored as {cachedAt, payload} envelope
             so we know when each was pulled.
           - Footer shows cache status (sheet count · total KB · time
             of newest entry). Hover for per-sheet breakdown.
           - New "Clear cache" button at bottom-right of the footer
             wipes all bbcs:: keys (with a confirm prompt).
           - Banner on Load now says whether data came from cache or
             a live fetch, with timestamp.
   0.2.0 - Bug fixes from review-harness pass:
           BUG-1 (blocker): TRACKS filter accepted MCG-only goals →
             renderCard dereferenced undefined boardEvent. Tighten
             filter to require payload.byCode[g]; missing goals now
             always route through renderMissingCard.
           BUG-2 (major): paired-opted cells bumped state to Started,
             bypassing prereq refinement. Now counted separately as
             pairedOpted and do NOT trigger the Started branch.
           BUG-3 (major): duplicate event codes (multi-mission events
             like TF 7201M) silently dropped. Now collected in
             payload.duplicates[] and console.warn'd.
           BUG-4 (minor): parseCellDate picked a year silently when a
             date fit neither end of a cross-year class window. Now
             returns null on ambiguous-year cells.
           BUG-5 (minor): white-cell with strikethrough was ignored.
             Now console.warn'd so sheet drift is visible.
           BUG-6 (cosmetic): "try STC tab?" hint hardcoded on every
             missing card. Now only shown for SY 7521O specifically.
           Also removed orphaned $('#empty-state').style access after
             main.innerHTML='' in renderAll (was throwing on load).
   0.1.0 - Initial UI: sheet picker, goal-event cards grouped by
           track, per-student drilldown with prereq chain, issue-log
           panel, status legend. Embedded MCG graph between
           MCG-GRAPH fences (regenerate via build-prereq-graph.cjs).
============================================================
 How to use:
   1. Edit CONFIG.GAS_ENDPOINT below with your deployed Web App /exec URL.
   2. For issue-log fetch to work, serve locally:
        python -m http.server 8080
      then open http://localhost:8080/index.html
      (file:// works too, but the issues.md fetch will be blocked by CORS
      and you'll need to copy-paste into the side panel instead.)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Board Curriculum Status — MCG 26A</title>

<!-- =========================================================
     STYLES
     White / bold-line / elegant theme. Subtle card shading,
     strong 1-2px borders, type-chip accents.
     ========================================================= -->
<style>
  :root {
    --bg: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-faint: #888;
    --line: #1a1a1a;
    --line-soft: #d0d0d0;
    --card: #fdfdfd;
    --card-head: #f5f5f5;
    --accent: #0059a6;
    --accent-soft: #e8f0f8;
    --complete: #2e7d32;
    --partial: #6a9e36;
    --started: #b88600;
    --notstarted: #757575;
    --prereqs-met: #0062b1;
    --prereqs-partial: #6b44a8;
    --prereqs-not: #c62828;
    --warn: #c62828;
    --paired: #8a56d6;
    --mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.45; }
  button { font-family: inherit; cursor: pointer; }
  code, .mono { font-family: var(--mono); }

  /* --- top header bar --- */
  header.app-header {
    border-bottom: 2px solid var(--line);
    padding: 10px 20px;
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    position: sticky; top: 0; background: var(--bg); z-index: 50;
  }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .app-title small { color: var(--ink-faint); font-weight: 400; font-size: 11px; margin-left: 6px; font-family: var(--mono); }
  .hbar-spacer { flex: 1; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-group label { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  select, input[type="text"], input[type="url"] {
    border: 1.5px solid var(--line); background: #fff; padding: 5px 9px; font-size: 13px; font-family: var(--mono);
    border-radius: 3px; outline: none; min-width: 180px;
  }
  select:focus, input:focus { border-color: var(--accent); }
  button.btn {
    border: 1.5px solid var(--line); background: #fff; padding: 5px 14px; font-size: 13px; font-weight: 600;
    border-radius: 3px; transition: all 0.12s;
  }
  button.btn:hover { background: var(--ink); color: #fff; }
  button.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.btn.primary:hover { background: #003d72; border-color: #003d72; }
  button.btn.icon { padding: 5px 8px; }
  button.btn[disabled] { opacity: 0.4; cursor: not-allowed; background: #fff !important; color: var(--ink) !important; }

  /* --- sub header / class meta --- */
  .class-meta {
    padding: 8px 20px; border-bottom: 1px solid var(--line-soft); font-size: 12px; color: var(--ink-soft);
    display: flex; flex-wrap: wrap; gap: 16px; font-family: var(--mono);
  }
  .class-meta .stat strong { color: var(--ink); }

  /* --- content layout --- */
  main { padding: 16px 20px 60px; max-width: 1400px; margin: 0 auto; }
  .empty-state { padding: 80px 20px; text-align: center; color: var(--ink-faint); }
  .empty-state h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
  .empty-state code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 12px; }

  /* --- track sections --- */
  .track { margin-bottom: 28px; }
  .track-header {
    display: flex; align-items: center; gap: 10px; border-bottom: 2px solid var(--line);
    padding: 6px 0; margin-bottom: 14px;
  }
  .track-header h2 { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .track-header .count { color: var(--ink-faint); font-size: 12px; font-family: var(--mono); }

  /* --- goal event cards --- */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card { border: 1.5px solid var(--line); border-radius: 5px; background: var(--card); overflow: hidden; }
  .card.expanded { grid-column: 1 / -1; }
  .card-head {
    padding: 10px 14px; background: var(--card-head); border-bottom: 1px solid var(--line-soft);
    cursor: pointer; user-select: none;
  }
  .card-head:hover { background: #ebebeb; }
  .card-head-row { display: flex; align-items: center; gap: 10px; }
  .card-code { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
  .card-title { flex: 1; font-size: 13px; font-weight: 600; }
  .card-chevron { color: var(--ink-faint); font-size: 14px; }
  .card-sub { margin-top: 4px; font-size: 11px; color: var(--ink-soft); display: flex; flex-wrap: wrap; gap: 10px; }
  .card-sub .mono { font-size: 11px; }

  .status-pill {
    display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; border: 1.5px solid var(--line);
  }
  .status-Complete          { background: var(--complete); color: #fff; border-color: var(--complete); }
  .status-PartiallyComplete { background: var(--partial); color: #fff; border-color: var(--partial); }
  .status-Started           { background: var(--started); color: #fff; border-color: var(--started); }
  .status-NotStarted        { background: #f0f0f0; color: var(--notstarted); border-color: var(--line-soft); }
  .status-PrereqsMet        { background: var(--prereqs-met); color: #fff; border-color: var(--prereqs-met); }
  .status-PrereqsPartiallyMet { background: var(--prereqs-partial); color: #fff; border-color: var(--prereqs-partial); }
  .status-PrereqsNotMet     { background: #fdecea; color: var(--prereqs-not); border-color: var(--prereqs-not); }
  .status-Unknown           { background: #fff; color: var(--ink-faint); border-color: var(--line-soft); }

  .progress-wrap { padding: 10px 14px; border-bottom: 1px solid var(--line-soft); }
  .progress-bar-bg { background: #f0f0f0; border: 1px solid var(--line-soft); border-radius: 2px; height: 14px; position: relative; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(to right, var(--complete), var(--partial));
    display: flex; align-items: center; justify-content: flex-end; padding-right: 4px;
    font-size: 10px; color: #fff; font-weight: 600; font-family: var(--mono);
  }
  .progress-summary { margin-top: 4px; font-size: 11px; color: var(--ink-soft); font-family: var(--mono); }

  /* --- expanded body --- */
  .card-body { padding: 12px 14px 16px; }
  .students-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .students-header h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .students-header .hint { font-size: 11px; color: var(--ink-faint); font-style: italic; }
  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px; }
  .student-row {
    display: flex; align-items: center; gap: 6px; padding: 4px 8px; border: 1px solid var(--line-soft);
    border-radius: 3px; font-size: 12px; background: #fff; cursor: pointer; transition: all 0.1s;
  }
  .student-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .student-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--line); flex-shrink: 0; }
  .student-dot.complete { background: var(--complete); border-color: var(--complete); }
  .student-dot.scheduled { background: var(--started); border-color: var(--started); }
  .student-dot.pending { background: #fff; }
  .student-dot.notreq { background: var(--notstarted); border-color: var(--notstarted); }
  .student-dot.paired-opted { background: var(--paired); border-color: var(--paired); }
  .student-row.not-applicable { opacity: 0.35; }
  .student-name { font-family: var(--mono); font-size: 11px; font-weight: 600; }
  .student-meta { color: var(--ink-faint); font-size: 10px; margin-left: auto; font-family: var(--mono); }

  /* --- chain drilldown --- */
  .chain-panel {
    margin-top: 12px; padding: 10px; background: #fafafa; border: 1px solid var(--line-soft); border-radius: 3px;
  }
  .chain-header { font-size: 12px; font-weight: 700; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .chain-header button { border: none; background: transparent; color: var(--ink-faint); font-size: 16px; line-height: 1; }
  .chain-list { list-style: none; }
  .chain-item {
    display: flex; gap: 8px; align-items: flex-start; padding: 4px 0; border-bottom: 1px dashed var(--line-soft);
  }
  .chain-item:last-child { border-bottom: none; }
  .chain-depth { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); width: 28px; flex-shrink: 0; text-align: right; }
  .chain-code { font-family: var(--mono); font-size: 11px; font-weight: 600; width: 88px; flex-shrink: 0; }
  .chain-title { font-size: 11px; flex: 1; color: var(--ink); }
  .chain-status { font-size: 10px; font-family: var(--mono); font-weight: 600; text-transform: uppercase; padding: 1px 6px; border-radius: 2px; white-space: nowrap; }
  .chain-status.c-complete { background: #e0f2e1; color: var(--complete); }
  .chain-status.c-scheduled { background: #fff4d6; color: #8a6700; }
  .chain-status.c-pending { background: #fbe8e8; color: var(--prereqs-not); }
  .chain-status.c-notreq { background: #eee; color: var(--notstarted); }
  .chain-status.c-offboard { background: #eef; color: var(--prereqs-met); font-style: italic; }
  .chain-item.offboard { opacity: 0.65; }

  /* --- panel (issues + legend) --- */
  .panel {
    position: fixed; top: 0; right: -440px; width: 440px; max-width: 96vw; height: 100vh;
    background: #fff; border-left: 2px solid var(--line); overflow-y: auto; z-index: 200;
    transition: right 0.2s ease; box-shadow: -4px 0 14px rgba(0,0,0,0.1);
  }
  .panel.open { right: 0; }
  .panel-header { padding: 12px 18px; border-bottom: 2px solid var(--line); display: flex; align-items: center; justify-content: space-between; background: var(--card-head); }
  .panel-header h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-body { padding: 16px 18px; font-size: 13px; }
  .panel-body h4 { font-size: 12px; font-weight: 700; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .panel-body pre { background: #f5f5f5; padding: 8px 10px; border: 1px solid var(--line-soft); border-radius: 3px; font-size: 11px; white-space: pre-wrap; word-break: break-word; }
  .legend-grid { display: grid; grid-template-columns: 24px 1fr; gap: 6px 10px; align-items: center; }
  .legend-swatch { width: 22px; height: 14px; border: 1.5px solid var(--line); border-radius: 2px; }

  .panel-backdrop { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.2); z-index: 150; display: none; }
  .panel-backdrop.open { display: block; }

  /* --- issue log list --- */
  .issue-entry { border-left: 3px solid var(--line-soft); padding: 6px 0 6px 10px; margin: 8px 0; font-size: 12px; }
  .issue-entry.blocker  { border-left-color: var(--warn); }
  .issue-entry.major    { border-left-color: var(--started); }
  .issue-entry.minor    { border-left-color: var(--prereqs-met); }
  .issue-entry.cosmetic { border-left-color: var(--line-soft); }
  .issue-entry .meta { color: var(--ink-faint); font-size: 11px; font-family: var(--mono); }

  /* --- toast / error banner --- */
  .banner { margin: 10px 20px; padding: 10px 14px; border: 1.5px solid var(--warn); background: #fdecea; color: var(--warn); font-size: 13px; border-radius: 4px; display: none; }
  .banner.show { display: block; }

  /* --- footer --- */
  footer.app-footer { border-top: 1px solid var(--line-soft); padding: 12px 20px; font-size: 11px; color: var(--ink-faint); font-family: var(--mono); display: flex; gap: 16px; flex-wrap: wrap; }

  /* --- mismatch badge --- */
  .mismatch { color: var(--warn); font-weight: 700; font-size: 10px; margin-left: 4px; }

  /* ===========================================================
     v0.3.0 — DAG flow chart styles
     =========================================================== */
  .view-bar {
    padding: 8px 20px; border-bottom: 1px solid var(--line-soft);
    background: #fafafa; display: flex; flex-wrap: wrap; gap: 14px;
    align-items: center; position: sticky; top: 57px; z-index: 40;
  }
  .view-toggle { display: inline-flex; border: 1.5px solid var(--line); border-radius: 4px; overflow: hidden; }
  .view-opt {
    border: none; background: #fff; padding: 5px 14px; font-size: 12px; font-weight: 600;
    color: var(--ink); cursor: pointer; font-family: var(--sans);
  }
  .view-opt + .view-opt { border-left: 1.5px solid var(--line); }
  .view-opt.active { background: var(--ink); color: #fff; }
  .view-opt:hover:not(.active) { background: #f0f0f0; }

  /* DAG canvas — v0.4 uses dagre for layered layout; nodes are
     absolutely positioned based on dagre's reported coordinates. Canvas
     sizes itself to the full graph bounding box so the whole DAG scrolls
     horizontally + vertically. Fallback (no dagre) uses the old flex
     columns via the `.dag-canvas.fallback` class. */
  main.dag-main { padding: 14px 0 60px; max-width: none; margin: 0; overflow: auto; }
  .dag-canvas { position: relative; padding: 14px 24px 24px; }
  .dag-canvas .node { position: absolute; }
  /* Fallback layout (pre-dagre) */
  .dag-canvas.fallback { display: inline-flex; flex-direction: row-reverse; align-items: flex-start; gap: 60px; padding: 18px 28px 30px; min-width: 100%; }
  .dag-canvas.fallback .node { position: static; }
  .dag-col { display: flex; flex-direction: column; gap: 14px; min-width: 240px; }
  .dag-col-label { font-size: 10px; font-family: var(--mono); color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; margin-bottom: 4px; }

  /* node — v0.3.3: dropped the width transition. It caused arrows to be
     drawn against intermediate widths during the 150ms anim, giving the
     "arrows drift off the container edge" bug. Snap instead. */
  .node { border: 1.5px solid var(--line); border-radius: 5px; background: #fff; position: relative; z-index: 2; width: 240px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .node.goal { border-width: 2.5px; border-style: dashed; border-color: #999; background: #fafafa; }
  .node.collapsed { width: 180px; }
  .node.collapsed .node-progress,
  .node.collapsed .node-roles,
  .node.collapsed .node-student-chip { display: none; }
  .node.collapsed .node-head { border-bottom: none; border-radius: 3px; }
  /* v0.3.3: keep a shortened title visible when collapsed so users can
     scan without expanding everything. */
  .node.collapsed .node-head-title {
    font-size: 10px; line-height: 1.2; margin-top: 2px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis; padding-right: 18px;
  }
  .node-head { padding: 8px 10px; border-bottom: 1px solid var(--line); border-radius: 3px 3px 0 0; position: relative; }
  .node-head-code { font-family: var(--mono); font-size: 12px; font-weight: 700; }
  .node-head-title { font-size: 11px; margin-top: 2px; line-height: 1.3; padding-right: 18px; }
  .node-toggle {
    position: absolute; top: 4px; right: 4px; width: 18px; height: 18px;
    border: 1px solid rgba(0,0,0,0.2); background: rgba(255,255,255,0.6);
    border-radius: 3px; font-size: 12px; font-weight: 700; line-height: 1; color: inherit;
    cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
  }
  .node-toggle:hover { background: rgba(255,255,255,0.95); }

  /* Header status colors (class view — aggregate) */
  .node.s-none .node-head   { background: #fdecea; color: #8a1c1c; }
  .node.s-yellow .node-head { background: #fff4cc; color: #6b4b00; }
  .node.s-green .node-head  { background: #e4f5dc; color: #1f5313; }
  .node.goal .node-head     { background: #f0f0f0; color: #666; }

  /* Header status colors (student view — 4 states, v0.3.3: shifted OPTED
     to a blue hue so it reads as distinctly different from DONE green). */
  .node.s-done .node-head     { background: #2e7d32; color: #fff;    }  /* solid green   = complete */
  .node.s-opted .node-head    { background: #d7e8f5; color: #0a3d62; }  /* light blue    = prereqs met, not yet done */
  .node.s-scheduled .node-head{ background: #fff4cc; color: #6b4b00; }  /* yellow        = future date on sheet */
  .node.s-notopted .node-head { background: #fdecea; color: #8a1c1c; }  /* red           = prereqs not met */
  .node.s-warn .node-head     { background: #ff8c00; color: #fff; border-bottom-color: #c62828; }  /* orange = scheduled+not opted */
  .node.s-warn { border-color: #c62828; border-width: 2.5px; }

  /* Progress bar (class view only) */
  .node-progress { padding: 8px 10px; border-bottom: 1px solid var(--line-soft); }
  .node-bar-bg { background: #f2f2f2; border: 1px solid var(--line-soft); border-radius: 2px; height: 10px; position: relative; overflow: hidden; }
  .node-bar-fill { height: 100%; background: var(--partial); }
  .node.s-green .node-bar-fill { background: var(--complete); }
  .node.s-yellow .node-bar-fill { background: var(--started); }
  .node.s-none .node-bar-fill { background: var(--warn); }
  .node-pct { text-align: center; font-family: var(--mono); font-size: 14px; font-weight: 700; margin-top: 3px; }

  /* Role columns inside a node */
  .node-roles { display: flex; padding: 6px 8px 8px; gap: 8px; }
  .role-col { flex: 1; min-width: 0; }
  .role-col h5 { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--ink-faint); letter-spacing: 0.5px; text-align: center; padding-bottom: 3px; border-bottom: 1px solid var(--line-soft); margin-bottom: 4px; }
  .role-col.single { text-align: center; }
  .role-col ul { list-style: none; padding: 0; margin: 0; column-width: 90px; column-gap: 6px; }
  .role-col.one-col ul { column-count: 1; column-width: auto; }
  .role-col li { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: var(--mono); padding: 1px 0; break-inside: avoid; }
  .role-col li.dim-name { color: #aaa; }
  .role-col li .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.2); }
  .role-col li .dot.complete  { background: var(--complete); }
  .role-col li .dot.scheduled { background: var(--started); }
  .role-col li .dot.pending   { background: #fff; border-color: var(--warn); }
  .role-col li .dot.notreq    { background: #bbb; }
  .role-col li .dot.paired    { background: var(--paired); }
  /* v0.4: scheduled-but-not-opted warning — orange with pulsing border */
  .role-col li .dot.warn      { background: #ff8c00; border: 2px solid #c62828; animation: warnPulse 1.6s ease-in-out infinite; }
  .role-col li.warn-row       { color: #c62828; font-weight: 600; }
  .role-col li.warn-row.dim-name { color: #c62828; }
  @keyframes warnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(198, 40, 40, 0.4); }
    50%      { box-shadow: 0 0 0 3px rgba(198, 40, 40, 0.1); }
  }

  /* Student-view compact body (no role cols, just a chip) */
  .node-student-chip { padding: 10px 10px 12px; font-family: var(--mono); font-size: 11px; text-align: center; color: var(--ink); }
  .node-student-chip .chip-pill { display: inline-block; padding: 3px 10px; border: 1.5px solid currentColor; border-radius: 12px; font-weight: 700; letter-spacing: 0.3px; }
  .node.s-done .chip-pill      { color: #fff;    background: #2e7d32; border-color: #1f5313; }
  .node.s-opted .chip-pill     { color: #0a3d62; background: #d7e8f5; border-color: #5c8dba; }
  .node.s-scheduled .chip-pill { color: #6b4b00; background: #fff4cc; border-color: #b58700; }
  .node.s-notopted .chip-pill  { color: #8a1c1c; background: #fdecea; border-color: #c62828; }
  .node.s-warn .chip-pill      { color: #fff;    background: #ff8c00; border-color: #c62828; font-weight: 700; }
  .node-date {
    margin-top: 4px; font-family: var(--mono); font-size: 11px;
    color: var(--ink-soft); letter-spacing: 0.3px;
  }

  /* SVG arrow overlay */
  .dag-arrows { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
  .dag-arrows path { fill: none; stroke-width: 2; }
  .dag-arrows path.a-green  { stroke: var(--complete); }
  .dag-arrows path.a-yellow { stroke: var(--started); }
  .dag-arrows path.a-none   { stroke: var(--warn); }
  .dag-arrows path.a-goal   { stroke: #999; }

  /* Empty/help states inside main */
  .dag-empty { padding: 80px 40px; text-align: center; color: var(--ink-faint); }
  .dag-empty h2 { color: var(--ink); font-size: 16px; margin-bottom: 6px; }

  /* Info strip under the canvas */
  .goal-summary {
    padding: 10px 28px; border-top: 1px solid var(--line-soft); background: #fafafa;
    font-size: 12px; font-family: var(--mono); color: var(--ink-soft); display: flex; flex-wrap: wrap; gap: 16px;
  }
  .goal-summary strong { color: var(--ink); }
</style>
</head>
<body>

<!-- =========================================================
     HEADER
     ========================================================= -->
<header class="app-header">
  <div class="app-title">
    Big Board Curriculum Status
    <small id="app-version">v0.1.0 · MCG 26A</small>
  </div>
  <div class="ctrl-group">
    <label for="sheet-picker">Board</label>
    <select id="sheet-picker" disabled>
      <option>— cache-only mode —</option>
    </select>
    <button class="btn primary" id="btn-load" disabled title="Load selected board (cache-first)">Load</button>
    <button class="btn" id="btn-refresh" disabled title="Force re-fetch selected board from GAS, bypass cache">Refresh</button>
    <button class="btn" id="btn-refresh-list" title="Pull fresh list of tabs from GAS">⟳ Tabs</button>
  </div>
  <div class="hbar-spacer"></div>
</header>
<div class="view-bar" id="view-bar" style="display:none;">
  <div class="ctrl-group">
    <label>View</label>
    <div class="view-toggle" id="view-toggle" role="tablist">
      <button class="view-opt active" data-mode="class" role="tab">Class</button>
      <button class="view-opt" data-mode="student" role="tab">Student</button>
    </div>
  </div>
  <div class="ctrl-group">
    <label for="student-picker">Student</label>
    <select id="student-picker" disabled>
      <option value="">— class view —</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label for="goal-picker">Target Event</label>
    <select id="goal-picker" disabled>
      <option value="">— load a board first —</option>
    </select>
  </div>
  <div class="ctrl-group" id="expand-group" style="display:none;">
    <button class="btn" id="btn-expand-all" title="Expand all nodes">Expand all</button>
    <button class="btn" id="btn-collapse-all" title="Collapse all nodes to just code + status">Collapse all</button>
  </div>
  <div class="ctrl-group">
    <label for="line-style">Lines</label>
    <select id="line-style" title="How edges are drawn between nodes">
      <option value="polyline" selected>Polyline</option>
      <option value="smooth">Smooth curve</option>
      <option value="orthogonal">Orthogonal (right-angle)</option>
      <option value="straight">Straight</option>
    </select>
  </div>
  <div class="hbar-spacer"></div>
  <button class="btn" id="btn-legend">Legend</button>
  <button class="btn" id="btn-issues">Issues</button>
</div>

<div id="banner" class="banner"></div>

<!-- =========================================================
     MAIN — DAG canvas
     ========================================================= -->
<main id="main" class="dag-main">
  <div class="dag-empty" id="empty-state">
    <h2>No board loaded</h2>
    <p>Pick a board above and press <strong>Load</strong>.</p>
    <p style="margin-top:8px; font-size:12px;">
      First run? Open this file and set <code>CONFIG.GAS_ENDPOINT</code> to your deployed Apps Script Web App /exec URL.
    </p>
  </div>
</main>
<div id="goal-summary" class="goal-summary" style="display:none;"></div>

<footer class="app-footer">
  <span>v<span id="foot-version"></span></span>
  <span>MCG <span id="foot-mcg"></span></span>
  <span id="foot-endpoint"></span>
  <span class="foot-spacer" style="flex:1"></span>
  <span id="foot-cache" title="Cached sheets — data stays local until you clear it or hit Refresh"></span>
  <button class="btn" id="btn-clear-cache" style="padding:3px 10px;font-size:11px">Clear cache</button>
</footer>

<!-- =========================================================
     SIDE PANEL (Issues / Legend)
     ========================================================= -->
<div class="panel-backdrop" id="panel-backdrop"></div>
<aside class="panel" id="panel">
  <div class="panel-header">
    <h3 id="panel-title">Panel</h3>
    <button class="btn icon" id="panel-close">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</aside>

<!-- =========================================================
     CONFIG  — edit GAS_ENDPOINT for your deployment.
     ========================================================= -->
<script id="config" type="application/json">
{
  "GAS_ENDPOINT": "https://script.google.com/macros/s/AKfycbyU4XfKl5ct6SMzl1nh7e4yZOR6U_wqD9_4HbUNBUOm7fgUaJIPTUIH95CVEGsIfVmiUw/exec",

}
</script>

    "AS 7110A": {
      "eventName": "Satellite Attitude Dynamics, Estimation, and Control Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "AS",
      "moduleCode": "AS 7100",
      "parentCourse": "AS 7000 Satellite Sub-systems",
      "applicability": [],
      "description": "These blocks elaborate on nonlinear (and linearized) motion state dynamics (including autogenetic gravity center location); nonlinear state estimation; and nonlinear and linear state control (e.g. disturbance rejection). Lectures include time propagation of Euler's coupled, nonlinear moment equations relative to inertial reference frames and expressed in coordinates of the body reference frame. Luenberger observers are introduced as one option for nonlinear state estimation. Nonlinear feedforward control is introduced with dynamic inversion for feedback, optionally augmented by linear state feedback control. Structural dynamics are taught in the context of controlling highly flexible space robotics with hands-on elaboration on the robotic on-orbit trainer during AS 7140S GROOT Handling Qualities. These lectures can take place before or after AS 7150O.",
      "prerequisites": [
        {
          "code": "AS 7101A",
          "name": "Satellite Systems Review",
          "requiredFor": null,
          "notes": null
        }
      ]
    },

      "moduleCode": "AS 7100",
      "parentCourse": "AS 7000 Satellite Sub-systems",

    "PF 7201A": {

      "applicability": [],
      "description": "These blocks cover the fundamentals of propulsion with an emphasis on flight test applications. It begins with first-principles analysis and applies them to various propulsion types, with a primary focus on turbine engines. Key topics include engine components, cycle analysis, performance evaluation, operability, and control characteristics. Students will assess propulsion system limitations, failure modes, and advanced concepts, including emerging technologies and alternative propulsion methods. The course prepares students to analyze, evaluate, and test propulsion systems in a flight test environment using analytical methods and practical applications.",

    "PF 8101A": {
      "eventName": "Takeoff and Landing Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "PF",
      "moduleCode": "PF 8100",
      "parentCourse": "PF 8000 Performance Characterization",
      "applicability": [],
      "description": "Equations that can be used to determine takeoff performance and to correct flight test data to standard conditions; equations to analyze ground roll and speed on landing, braking distances and the effects of reverse thrust, aerodynamic braking and runway surface conditions on landing; effects of atmospheric influences and variations in pilot technique at varying gross weights under various conditions; discussion of a variety of typical takeoff and landing tests accomplished at AFTC; braking, anti-skid and barrier testing. The brief will cover test techniques for performing takeoff and landing tests and gathering data for takeoff and landing ground roll distances; development of a method for reducing these data to standard day conditions; and safety considerations that apply. Though specific flights are not dedicated to collecting takeoff and landing data, it is expected that students will collect the data on all applicable sorties.",
      "prerequisites": [

          "name": "Introduction to Aerodynamics Exam",
          "requiredFor": null,
          "notes": null
        }

      "parentCourse": "PF 8000 Performance Characterization",
      "applicability": [],
      "description": "Theoretical background required to determine aircraft cruise performance; data reduction methods oriented toward providing cruise data in the format used at the AFTC; definition of the basic cruise assumption of level unaccelerated flight; development of lift and drag functional relationships based on subsonic aerodynamics in a form suitable for cruise performance analysis; determination of thrust and fuel flow parameters; derivation of the equations for range and endurance; determination of optimum fuel flows and RPM settings for cruise.",

    "SY 5201A": {
      "eventName": "Data-Driven Analysis and Decision Making for Mission Systems Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "SY",
      "moduleCode": "SY 5200",
      "parentCourse": "SY 5000 Mission Systems Foundations",
      "applicability": [],
      "description": "This block will cover data-driven testing for mission systems, including a broad scope of topics that include data science, uncertainty quantification, test & evaluation, statistical hypothesis testing, and decision making. Topics covered in the 1-week block include exploratory data analysis, data visualization, structured vs unstructured data, streaming vs. post-mission data, meta-data tagging, and structured inputs and data pipelines. It will also cover key performance indicators (KPIs), system performance and predictive modelling, validation and verification in data-driven test, statistical comparisons, Experimental design, adversarial machine learning & resilience strategies, and software for T&E of data-driven mission systems. Additionally, the block will cover probabilistic reasoning, reinforcement learning, autonomous control with RL (model-free and model-based), ethical considerations, data and decision fusion techniques, and considerations for tactical vs. operational vs. strategic environments.",
      "prerequisites": [

    "SY 7110A": {
      "eventName": "Computer Software and Networks Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "SY",
      "moduleCode": "SY 7100",
      "parentCourse": "SY 7000 Platform Mission Systems",
      "applicability": [],
      "description": "This is a 3-hour academic overview of the types of documentation and specifications common in software and networks mission systems testing. The MIL-STD-1760 interface and MIL-STD-1553 data bus protocol is introduced as well as other military and commercial data busses. This block introduces the various software development and test methodologies used by defense industry partners and the DoD for aircraft, space and cyber systems, and how requirements definition, development, and test approaches differ between legacy and more modern development frameworks. It focuses on how to create a software test plan that meets specification, performance, maintenance, and quality requirements while effectively managing the tradeoffs between risk, quality, and cost. Finally, the block introduces the DevSecOps cycle, Open Mission Systems fundamentals, and continuous integration and continuous development concepts as applied to software testing of aircraft and spacecraft systems. This block also discusses vehicles as a system of systems, then decomposes individual systems using the design process down to specific mission systems, mission essential functionality, and cyber-physical systems technologies. This provides a context necessary to understand how information flow within cyber-physical systems and physical technology shapes integrated avionics/regression testing as well as cyber vulnerability analysis.",
      "prerequisites": [
        {
          "code": "SY 5101A",
          "name": "Mission Systems Fundamentals Lecture",
          "requiredFor": null,
          "notes": null
        }
      ]
    },

      "parentCourse": "SY 7000 Platform Mission Systems",
      "applicability": [],
      "description": "These labs reinforce academic knowledge acquired in the lecture with a 1-hour lab conducted with 4 students at a time. Students can manipulate code on a stand-alone computer to illustrate vulnerabilities such as buffer overflows and race conditions. They are also exposed to automated testing using CI/CD pipelines. Additionally, students demonstrate the performance differences between programming languages (compiled and interpreted), virtualization technologies (virtual machines and containers), Internet Protocol (IP) network data transfers (TCP and UDP), and cryptographic algorithms (AES and RSA) to better internalize the tradeoffs and promise of the cutting-edge computer science currently being used in modern mission systems architectures.",
      "prerequisites": [

    "TF 5101A": {
      "eventName": "Systems Engineering for Testers Lecture",

      "moduleCode": "TF 5100",
      "parentCourse": "TF 5000 Foundations",
      "applicability": [],
      "description": "The first block will teach students the fundamentals of Systems Engineering and how it applies to test. It covers complexity, systems theory, the scientific method, an abstract approach for decomposing the modern battlespace into test requirements, and a process for generating data and reducing system risk. The following blocks will then build on these modeling concepts and provide simple constructs for modeling systems from function to form. The written report provides an opportunity for the student to engage individually in Systems Engineering artifact development and communicate their purpose and importance to complexity management, test strategy development, and risk management using a notional system provided by the instructor. This project consists of a short technical report on a notional complex system, providing an opportunity for the student to demonstrate comprehension across a spectrum of Systems Engineering artifacts.",

    "TF 5201A": {
      "eventName": "Human Systems Integration Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "TF",
      "moduleCode": "TF 5200",
      "parentCourse": "TF 5000 Foundations",
      "applicability": [],
      "description": "The first block introduces Human System Integration (HSI) as a systems-based scientific methodology and highlights test considerations. It presents considerations for the human element cross- over into other all other disciplines. This block will introduce concepts of cognitive workload assessment and conducting HSI evaluations of systems. This block will also introduce qualitative and quantitative approaches to Human Systems Integration. The Model-Based Human Systems Integration (MB HSI) sim/lab orients students to human systems testing in a simulation environment. During a 1.5-hour test block, each student will receive a simulator orientation and individual simulator tasks. Basic Performance Resource measures will be collected and used in appropriate curriculum events for analysis. The last block reviews aspects of the human role in the operations process and describes the role of the TPS graduate in the Human Systems testing process. The block emphasizes space/aviation Human Systems history as it relates to major aviation, military, and space developments. The topics covered include control and display principles, along with cognitive workload assessment. Additionally, the last block covers basic functionality and limitations of human sensation and perception, as well as components of situation awareness, models of decision making, and case studies of both, mishaps and recent real-world test programs involving Human Machine Interface.",
      "prerequisites": [
        {
          "code": "AN 5180A",
          "name": "Test Foundations Phase Intro",
          "requiredFor": null,
          "notes": null
        }
      ]
    },

      "parentCourse": "TF 6000 Plan, Execute, Analyze, Report, Special Subjects (PEARS)",
      "applicability": [],
      "description": "The first block introduces students to the basic components involved with planning, executing, analyzing, and reporting during a test program. It provides context for the TF 6000 level of academics and introduces some of the basic “vocabulary” of aerospace test programs. The second block introduces students to the responsibilities of a tester, provides the context to help them understand where developmental testing fits into the greater acquisition enterprise, and introduces them to the processes which support test planning and execution. The third block will introduce students to the basic format and development strategy for Air Force Test Center (AFTC)-style test plans. It will explain the construct of specific and achievable objectives and detail the sub-sections that are hallmarks of an executable plan that will answer the customer’s questions. The oral report consists of a ten-minute group presentation that will take place a few days after the Test Planning Lecture. Students will analyze a provided test vignette, identify requirements and test objectives, develop a test methodology, identify a risk, and communicate their plan.",

    "TF 6260A": {

      "parentCourse": "TF 6000 Plan, Execute, Analyze, Report, Special Subjects (PEARS)",
      "applicability": [
        "STC"
      ],
      "description": "The aerodynamics lesson describes the four basic forces of flight, Bernoulli’s Theory and Newton’s Laws, how a wing makes lift, critical angle of attack and stalls, how center of gravity affects aircraft stability, and why an aircraft turns. The pitot statics lesson describes the basic concepts of a pitot-static system and associated instruments, common sources of error in pitot-static measurements, error sources to data accuracy, and the relationship of data accuracy to test and evaluation results. The Low L/D guest lecture will provide students with background and lessons learned in developing and executing the low L/D profile in the T-38 aircraft and an opportunity to interact with an experienced T&E professional. The glider exercise consists of multiple lessons to prepare the class to execute a limited scope test, analyze the results and report on those results. The purpose of the exercise is to reinforce the preceding classroom lessons and introduce students to the dynamics of testing in a controlled environment with coaching from instructors. Student teams will need to operate in an unfamiliar environment and under significant time constraints. Students will prepare a limited scope test plan and submit it for approval prior to execution of the events. Students have the option to fly with an instructor on at least one data collection. Data from each will be compiled into a shared set of test data for the class. The exercise will include a risk assessment workshop (1.5 hr.) and Test Plan review (1.5 hr.). The last block will expose the student to test conduct in a unique environment while exploring additional concepts.",

    "TF 6301A": {
      "eventName": "Statistics for Testers Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "TF",
      "moduleCode": "TF 6300",
      "parentCourse": "TF 6000 Plan, Execute, Analyze, Report, Special Subjects (PEARS)",
      "applicability": [],
      "description": "This block will teach students how to use statistical techniques to extract information from test data. Specifically, the role that statistics can play in the test process is discussed. The following basic concepts are explained: variability, random sampling, designed experiments, mechanistic versus empirical models, enumerative versus analytic studies, and finally sample mean and variance versus population mean and variance. This block also teaches students to compute various statistics, display results, and interpret them. It covers the basics of probability distributions and how to use them. Finally, students will be able to apply the following basic statistical techniques to test problems: hypothesis tests, linear regression, confidence intervals, and prediction intervals.",
      "prerequisites": [

    "TF 8101A": {
      "eventName": "TMP Assignments and Intro Lecture",
      "eventType": "A",
      "eventTypeName": "Academic Lecture",
      "phase": "TF",
      "moduleCode": "TF 8100",
      "parentCourse": "TF 8000 Test Management Project",
      "applicability": [],
      "description": "During the TMP Assignments and Introduction Lecture, students will be presented with their assigned TMP groups. A basic overview of the 412 Test Wing Program Management process, expectations and timelines for the TMP process, and differences between the USAF TPS TMP process and 412 TW process will be presented. During the Resources Workshop, each student team will meet with the USAF TPS Program Managers, TMP Director, and their Staff Advisors to discuss their specific programmatic requirements and resources. Students will be instructed to draft a 412 TW Test Concept Document (TCD), identifying their TMP's overall objectives, any aircraft or pod modifications required, and support required from other organizations such as logistics, ranges, instrumentation, environmental, frequency management, and/or maintenance. The TCD will be required for TF 8103W. Prior to the Core Team Meeting, the student teams will send their TCDs to the USAF TPS A5 TMP Program Manager and TMP Director, who will review the TCDs for any final edits. The A5 Program Manager will formally begin the 412 TW PID/SOC process by distributing the TCDs to the 412 TW POCs and non-AFTC organizations identified by each student team and requesting a JON. During the Core Team Meeting, the student teams will present their TCDs to the respective organizations, allowing the organizations an opportunity to either concur or non-concur with the support being requested. During the TMP planning process, students will have two test plan working groups (TPWGs) to assist them with drafting their test plan, safety plan, execution schedule, and any additional documentation as required by their TMP. The first TPWG will focus on defining the general test objectives (GTOs), specific test objectives (STOs), measures of performance (MOPs), and any outstanding technical planning discussions that will feed directly into their test plan development. For the second TPWG, the TMP Director, Staff Advisors, and assigned Unit Test Safety Officer will review the updated draft test and safety plans. The focus will be on ensuring the team's test plan objectives, methodologies, and data analysis plans are well-constructed, and that the safety plan identifies and mitigates all risks associated with executing the test plan. Upon conclusion of the second TPWG, student teams will be able to incorporate feedback to have a finalized test plan and safety plan ready to submit to the technical and safety review boards. Graded test plans and safety plans will be submitted to the TPS-led Technical Review Board and the 412 TW SET-led Safety Review Board. The purpose of the Technical Review Board (TRB) is to have the student teams present their TMP test plans to the USAF TPS Technical Director (or delegate) and other appointed TRB members, to defend that the test plan is technically adequate, and answer the proposed TMP research question and customer's need. The TRB chair will provide a letter of technical adequacy to the Technical Execution Authority (TEA)/TPS Commandant. The Safety Review Board (SRB), led by a representative of the 412 TW Test Safety Office, is composed of a panel of Independent Operational Reviewers, Technical Experts, TPS Chief UTSO, assigned TMP UTSO, and potentially STARCOM DEL 12 Safety Officers. The purpose of the SRB is to provide a safety review and risk assessment of the finalized safety plan, which will be presented to the TEA/TPS Commandant. Upon completion of both the TRB and SRB, the students will document and correct any action items prior to proceeding with their request for test execution approval.",

    "TF 8301Y": {
      "eventName": "TMP Program Assessment Review 1",
      "eventType": "Y",
      "eventTypeName": "Oral Report",
      "phase": "TF",
      "moduleCode": "TF 8300",
      "parentCourse": "TF 8000 Test Management Project",
      "applicability": [],
      "description": "The purpose of the first Program Assessment Review (PAR) is for each student TMP team to present their planned test objectives, test methodology, test schedule, and expected test results to their peers and TPS staff. The purpose of the Pre-Writers meeting is to brief students on the reporting expectations for their TMP, instruct them on how to write a TPS technical information memorandum (TIM), and to highlight the differences between the USAF TPS TMP TIM versus the 412 TW Technical Report. Upon conclusion of this meeting, student teams will be able to develop their draft TIMs. The second Program Assessment Review is intended to have the student teams brief their peers and TPS Staff on what occurred during their two-week TMP execution window. This will include the actual test execution schedule, preliminary status of data analysis, completion status of the test objectives and measures of performance, and any constraints or limitations that affected execution. The TMP Data Working Group is a post-execution, one-hour meeting with the student teams, TMP Director, Staff Advisor, and appropriate operations/technical experts to discuss data collected, analysis progress and way forward, and the anticipated scope of results and conclusions before completion of the final draft report for the TMP Report Coordination Meeting. The Report Coordination Meeting is a graded event for TMPs, equivalent to the 412 TW \"murder board.\" The purpose of this meeting is to review the students' TIMs by conducting a line-by-line review, and discuss action items and comments required prior to submitting the final report for approval and signature by the TPS commandant and Technical Directors. The final signed and approved TMP TIM is an official USAF TPS document that will be submitted to the TMP customers. Depending on the distribution statement and classification of the TIM, the TIM may be submitted for Public Release Approval and stored in the Defense Technical Information Center and/or 412 TW Technical Library. The TMP final oral report is a graded 45-minute presentation by each of the student teams to brief their peers, AFTC, STARCOM, 412 TW, Delta 12, senior base leadership, and/or key stakeholders on their TMP results.",

      "parentCourse": "TF 9000 Comprehensive Exams",

      "description": "Students will be evaluated on their ability to: 1) analyze a test scenario and clearly identify proper objectives that trace to data elements required to meet those objectives; 2) clearly identify the primary safety, security, technical, and programmatic risks; 3) demonstrate a clear understanding of the fundamental engineering principles related to test, translating program objectives and data requirements into proper test techniques and/or procedures; 4) translate test techniques and procedures into correct instrumentation and resource requirements; 5) demonstrate proper Test Judgement; and 6) effectively communicate and defend the test program and adapt it to unexpected circumstances. Students will think critically and apply skills and knowledge gained throughout the year to develop a plan for evaluating a system. Students must consider program requirements, test objectives, data requirements, test techniques, resources, and risks while properly scoping the test campaign with appropriate technical and safety buildup. Students must effectively communicate and defend their plan to a review board comprised of USAF Test Pilot School instructors.",
