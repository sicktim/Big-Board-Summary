<!-- =========================================================
     APP LOGIC
     Layered modules, all inline. Order:
       CONFIG → helpers → api → parse → status → render → issues → boot
     ========================================================= -->
<script>
'use strict';

/* --------------------------------------------------------
 * CONFIG  (from <script id="config">; user-editable above)
 * -------------------------------------------------------- */
const CONFIG = (() => {
  try { return JSON.parse(document.getElementById('config').textContent); }
  catch (e) { return { GAS_ENDPOINT: '', ENABLE_CACHE: true, DEBUG: false }; }
})();

const APP_VERSION = '0.4.1';
const MCG_VERSION = '26A';

/* --------------------------------------------------------
 * Load embedded MCG graph
 * -------------------------------------------------------- */
const MCG_GRAPH = (() => {
  try {
    return JSON.parse(document.getElementById('mcg-graph').textContent);
  } catch (e) {
    console.error('Failed to parse embedded MCG graph:', e);
    return { goalEvents: [], events: {} };
  }
})();

/* --------------------------------------------------------
 * helpers
 * -------------------------------------------------------- */
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
function banner(msg, isError) {
  const b = $('#banner');
  b.textContent = msg;
  b.className = 'banner show';
  if (!isError) setTimeout(() => b.classList.remove('show'), 3500);
}
function hideBanner() { $('#banner').classList.remove('show'); }
function log(...args) { if (CONFIG.DEBUG) console.log('[bbcs]', ...args); }

/* --------------------------------------------------------
 * api.js — GAS fetch + localStorage cache
 *
 * v0.2.1 switched from sessionStorage to localStorage so cached
 * payloads survive tab close / reload. The fetch_sheet call is the
 * expensive one (~3-8 s round trip with full formatting), so we
 * want the UI work loop to pull once and stay on that snapshot
 * until the user explicitly hits Refresh or Clear Cache.
 *
 * Cache keys:
 *   bbcs::sheet::<tabName>          stored JSON { cachedAt, payload }
 *   bbcs::index::sheets             list of cached tab names
 * -------------------------------------------------------- */
const api = (() => {
  const KEY = 'bbcs::sheet::';
  const INDEX_KEY = 'bbcs::index::sheets';
  const SHEET_LIST_KEY = 'bbcs::sheetlist';  // v0.4: cached sheets_avail response

  function readIndex() {
    try { return JSON.parse(localStorage.getItem(INDEX_KEY) || '[]'); } catch (_) { return []; }
  }
  function writeIndex(list) {
    try { localStorage.setItem(INDEX_KEY, JSON.stringify(list)); } catch (_) {}
  }
  function addToIndex(name) {
    const list = readIndex();
    if (!list.includes(name)) { list.push(name); writeIndex(list); }
  }
  function removeFromIndex(name) {
    writeIndex(readIndex().filter(n => n !== name));
  }

  async function call(params, { force = false } = {}) {
    if (!CONFIG.GAS_ENDPOINT) throw new Error('CONFIG.GAS_ENDPOINT is empty. Set it near the top of index.html.');
    const url = CONFIG.GAS_ENDPOINT + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url, { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error(`GAS ${res.status}: ${res.statusText}`);
    const body = await res.json();
    if (!body.ok) throw new Error(body.error || 'GAS reported not-ok');
    return body;
  }

  return {
    async health() { return call({ call: 'health' }); },
    async sheetsAvail() {
      const body = await call({ call: 'sheets_avail' });
      // v0.4: persist so boot can skip this round-trip next time
      try { localStorage.setItem(SHEET_LIST_KEY, JSON.stringify({ cachedAt: new Date().toISOString(), sheets: body.sheets })); }
      catch (e) { console.warn('[bbcs] sheet-list cache write failed', e); }
      return body;
    },

    getSheetList() {
      try {
        const raw = localStorage.getItem(SHEET_LIST_KEY);
        if (!raw) return null;
        const env = JSON.parse(raw);
        return env.sheets || null;
      } catch (_) { return null; }
    },

    async fetchSheet(name, { force = false } = {}) {
      const cacheKey = KEY + name;
      if (CONFIG.ENABLE_CACHE && !force) {
        let raw = null;
        try { raw = localStorage.getItem(cacheKey); }
        catch (e) { console.warn('[bbcs] cache READ threw:', e); }
        if (raw) {
          try {
            const env = JSON.parse(raw);
            console.log('[bbcs] cache HIT for', name, '— cachedAt=', env.cachedAt,
              '— size=', (raw.length / 1024).toFixed(1) + 'KB');
            return env.payload;
          } catch (e) {
            console.warn('[bbcs] cache PARSE failed for', name, e, '— evicting');
            try { localStorage.removeItem(cacheKey); } catch (_) {}
          }
        } else {
          console.log('[bbcs] cache MISS for', name, '— fetching from GAS');
        }
      } else if (force) {
        console.log('[bbcs] force refresh requested for', name);
      }
      const body = await call({ call: 'fetch_sheet', sheet: name });
      if (CONFIG.ENABLE_CACHE) {
        try {
          const envelope = { cachedAt: new Date().toISOString(), payload: body };
          const serialized = JSON.stringify(envelope);
          localStorage.setItem(cacheKey, serialized);
          addToIndex(name);
          console.log('[bbcs] cache WROTE', name, '—', (serialized.length / 1024).toFixed(1) + 'KB');
        } catch (e) {
          // QuotaExceededError is the most common cause — serialized payload
          // is ~1-2MB per sheet and localStorage caps vary. Report loudly.
          console.error('[bbcs] cache WRITE FAILED for', name, '—', e.name || '', e.message || e);
          banner('Warning: failed to cache "' + name + '" — ' + (e.message || e) + ' (next reload will re-fetch)', true);
        }
      }
      return body;
    },

    // What's cached right now? Returns [{name, cachedAt, sizeKB}]
    cacheInfo() {
      const out = [];
      for (const name of readIndex()) {
        try {
          const raw = localStorage.getItem(KEY + name);
          if (!raw) { removeFromIndex(name); continue; }
          const env = JSON.parse(raw);
          out.push({ name, cachedAt: env.cachedAt || null, sizeKB: Math.round(raw.length / 1024) });
        } catch (_) { removeFromIndex(name); }
      }
      return out;
    },

    // Remove a single sheet's cache entry
    clearSheet(name) {
      try { localStorage.removeItem(KEY + name); } catch (_) {}
      removeFromIndex(name);
    },

    // Nuke everything this app has stored
    clearAll() {
      const list = readIndex();
      for (const name of list) { try { localStorage.removeItem(KEY + name); } catch (_) {} }
      try { localStorage.removeItem(INDEX_KEY); } catch (_) {}
      // Best-effort sweep of any stray bbcs:: keys the index missed
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('bbcs::')) { try { localStorage.removeItem(k); } catch (_) {} }
      }
      return list.length;
    },
  };
})();

/* --------------------------------------------------------
 * parse.js — normalize sheet payload + index by event code
 * -------------------------------------------------------- */
const parse = (() => {
  function normalizeCode(raw) {
    if (!raw) return '';
    const s = String(raw).trim().replace(/\s+/g, ' ');
    const m = s.match(/^([A-Z]{2})[\s\-]?(\d.*)$/);
    return m ? (m[1] + ' ' + m[2]).trim() : s;
  }

  // Map student.type → set of applicability codes the MCG uses.
  // MCG applicability values observed: ABM, CSO, RPA, FTE, P.
  // Student types on the board: ABM, CSO, RPA, FTE, Pilot-F, Pilot-M, Pilot-B.
  function expandStudentTypeToMcg(type) {
    if (!type) return [];
    if (/^Pilot/i.test(type)) return ['P'];
    return [type.toUpperCase()];
  }

  function isStudentApplicable(student, eventApplicability) {
    if (!eventApplicability || !eventApplicability.length) return true; // unrestricted
    const mcgCodes = expandStudentTypeToMcg(student.type);
    return mcgCodes.some(c => eventApplicability.indexOf(c) !== -1);
  }

  function indexPayload(payload) {
    // Multi-mission events (e.g. TF 7201M x6) legitimately repeat. We keep
    // the first occurrence in byCode for chain visualization and collect the
    // rest in `duplicates` so they can be surfaced in the issues panel. This
    // is a minor correctness gap — if a student completes any of the
    // later-row instances but not the first, chain-status will read false-
    // negative. Acceptable for v0.2 because no goal event has duplicates.
    const byCode = {};
    const duplicates = [];
    for (const evt of payload.events) {
      const code = normalizeCode(evt.eventNo);
      if (!code) continue;
      if (byCode[code]) {
        duplicates.push({ code, row: evt.row, firstRow: byCode[code].row });
        byCode[code].duplicated = true;
        continue;
      }
      byCode[code] = evt;
    }
    if (duplicates.length) {
      console.warn('[bbcs] duplicate event codes on board:',
        duplicates.reduce((m, d) => { (m[d.code] = m[d.code] || []).push(d.row); return m; }, {}));
    }
    return { ...payload, byCode, duplicates };
  }

  return { normalizeCode, isStudentApplicable, expandStudentTypeToMcg, indexPayload };
})();

/* --------------------------------------------------------
 * status.js — 7-state logic per event / per student
 *   Primitives:
 *     cell.rgbFamily: white | lightGrey | darkGrey | paired
 *     cell.value:     date string or blank
 *     cell.strikethrough: bool (paired events only)
 *
 *   Per-student completion for an event:
 *     lightGrey              → complete
 *     paired & strike        → complete
 *     darkGrey               → not required (drops from applicable set)
 *     white & future-date    → scheduled
 *     white & past-date      → pending (+ flag for issue log)
 *     white & blank          → pending
 *     paired & !strike       → pending
 * -------------------------------------------------------- */
const statusModule = (() => {
  const STATES = {
    COMPLETE: 'Complete',
    PARTIAL: 'PartiallyComplete',
    STARTED: 'Started',
    NOT_STARTED: 'NotStarted',
    PREREQS_MET: 'PrereqsMet',
    PREREQS_PARTIAL: 'PrereqsPartiallyMet',
    PREREQS_NOT: 'PrereqsNotMet',
    UNKNOWN: 'Unknown'
  };

  function parseCellDate(value, classStart, classEnd) {
    if (!value) return null;
    // Try m/d or m/d/yy or yyyy-mm-dd
    let m = String(value).match(/^(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?$/);
    if (m) {
      let year;
      if (m[3]) year = m[3].length === 2 ? (2000 + parseInt(m[3], 10)) : parseInt(m[3], 10);
      else {
        // Pick the year from class window that makes the date valid.
        const monthI = parseInt(m[1], 10) - 1;
        const dayI = parseInt(m[2], 10);
        const cs = classStart ? new Date(classStart) : null;
        const ce = classEnd ? new Date(classEnd) : null;
        if (cs && ce && cs.getFullYear() !== ce.getFullYear()) {
          const d1 = new Date(cs.getFullYear(), monthI, dayI);
          const d2 = new Date(ce.getFullYear(), monthI, dayI);
          const d1In = d1 >= cs && d1 <= ce;
          const d2In = d2 >= cs && d2 <= ce;
          // If neither year makes the date land inside the class window, the
          // cell is ambiguous — return null rather than silently picking
          // one year and letting the UI lie about "scheduled / past-dated."
          if (!d1In && !d2In) return null;
          year = d1In ? cs.getFullYear() : ce.getFullYear();
        } else {
          year = (cs || ce || new Date()).getFullYear();
        }
      }
      return new Date(year, parseInt(m[1], 10) - 1, parseInt(m[2], 10));
    }
    m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
    return null;
  }

  function classifyCell(cell, classMeta, now) {
    // v0.3.3: surface the parsed date (`dateText`) on the result so UI can
    // show "SCHEDULED 4/14" regardless of which status wins the chip.
    // Also compare at day precision — a cell dated today should be
    // "scheduled" not "past-date-unchecked" (was bug: C RYAN PF 6121F
    // "4/14" showed OPTED instead of SCHEDULED because `d > now` was false
    // by mid-afternoon).
    const result = { completion: 'pending', scheduled: false, flag: null, dateText: null };
    if (!cell) return result;
    if (cell.rgbFamily === 'darkGrey') { result.completion = 'notreq'; return result; }
    if (cell.rgbFamily === 'lightGrey') {
      result.completion = 'complete';
      if (cell.value) result.dateText = String(cell.value);
      return result;
    }
    if (cell.rgbFamily === 'paired') {
      result.completion = cell.strikethrough ? 'complete' : 'paired-opted';
      if (cell.value) result.dateText = String(cell.value);
      return result;
    }
    // white
    if (cell.strikethrough) {
      console.warn('[bbcs] white cell with strikethrough', cell);
    }
    const d = parseCellDate(cell.value, classMeta.startDate, classMeta.endDate);
    if (d) {
      result.dateText = String(cell.value);
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (d >= today) { result.completion = 'scheduled'; result.scheduled = true; }
      else { result.completion = 'pending'; result.flag = 'past-date-unchecked'; }
    }
    return result;
  }

  function computeEventStatus(evt, students, classMeta, prereqStatusByStudent) {
    const now = new Date();
    const perStudent = {};
    for (const s of students) {
      const cell = evt.cells ? evt.cells.find(c => c.col === s.col) : null;
      const classified = classifyCell(cell, classMeta, now);
      perStudent[s.col] = {
        col: s.col,
        name: s.name,
        type: s.type,
        applicable: undefined,  // filled below
        cell: cell,
        completion: classified.completion,
        flag: classified.flag,
        dateText: classified.dateText,
      };
    }
    return perStudent;
  }

  function aggregateEvent(evt, mcgEvent, perStudent, students) {
    // Applicability set: students where the MCG says this type is in scope
    // AND the cell isn't dark-grey.
    const applicability = (mcgEvent && mcgEvent.applicability) || [];
    const apps = [];
    for (const s of students) {
      const ps = perStudent[s.col];
      const appByType = parse.isStudentApplicable(s, applicability);
      const appByCell = ps.completion !== 'notreq';
      ps.applicable = appByType && appByCell;
      if (ps.applicable) apps.push(ps);
    }

    // Semantic note (BUG-2 fix):
    // `scheduled` means a white cell with a future date — real progress.
    // `paired-opted` means a colored pair cell with no strikethrough — the
    // student's partner hasn't finished either, so this is NOT evidence of
    // progress; it only tells us the scheduler has assigned a pair. We used
    // to lump both into `scheduledOrStarted` which bumped state to Started
    // and skipped the prereq-refinement branch in renderCard. Now:
    //   - `scheduled` → counts toward Started
    //   - `paired-opted` → tracked separately for the progress summary, but
    //     does NOT move the event past NotStarted on its own.
    let completes = 0, scheduled = 0, pairedOpted = 0;
    for (const ps of apps) {
      if (ps.completion === 'complete') completes++;
      else if (ps.completion === 'scheduled') scheduled++;
      else if (ps.completion === 'paired-opted') pairedOpted++;
    }
    const total = apps.length;
    let state = 'Unknown';
    if (total === 0) {
      state = 'PrereqsMet';  // no applicable students — benign
    } else if (completes === total) state = 'Complete';
    else if (completes / total >= 0.5) state = 'PartiallyComplete';
    else if (completes > 0 || scheduled > 0) state = 'Started';
    else state = 'NotStarted';

    return {
      state,
      applicable: apps.length,
      completes,
      scheduled,
      pairedOpted,
      // kept for backwards-compat with any callers expecting the old field
      scheduledOrStarted: scheduled + pairedOpted,
      pctComplete: total ? Math.round((completes / total) * 100) : 0,
    };
  }

  return { STATES, classifyCell, parseCellDate, computeEventStatus, aggregateEvent };
})();

/* --------------------------------------------------------
 * chain.js — transitive prereq chain for a goal event,
 * filtered to only events that appear on the big board.
 *   Each chain item: { code, title, onBoard, depth, status }
 * -------------------------------------------------------- */
const chain = (() => {
  function buildChainForStudent(goalCode, payload, student) {
    const mcgEvents = MCG_GRAPH.events || {};
    const now = new Date();
    const seen = new Set();
    const out = [];
    const stack = [{ code: goalCode, depth: 0 }];
    while (stack.length) {
      const node = stack.shift();
      if (seen.has(node.code)) continue;
      seen.add(node.code);
      const mcg = mcgEvents[node.code];
      const onBoardEvt = payload.byCode[node.code];
      const onBoard = !!onBoardEvt;
      let status = 'offboard';
      if (onBoard) {
        const cell = onBoardEvt.cells.find(c => c.col === student.col);
        const classified = statusModule.classifyCell(cell, payload.classMeta, now);
        status = classified.completion;
      }
      if (node.code !== goalCode) {
        out.push({
          code: node.code,
          title: (mcg && mcg.eventName) || (onBoardEvt && onBoardEvt.title) || '?',
          onBoard,
          status,
          depth: node.depth,
        });
      }
      const prereqs = (mcg && mcg.prerequisites) || [];
      for (const p of prereqs) {
        if (p.code && !seen.has(p.code)) stack.push({ code: p.code, depth: node.depth + 1 });
      }
    }
    // Sort: onBoard incomplete first, then onBoard complete, then offboard.
    out.sort((a, b) => {
      const ra = a.onBoard ? (a.status === 'complete' ? 2 : 1) : 3;
      const rb = b.onBoard ? (b.status === 'complete' ? 2 : 1) : 3;
      if (ra !== rb) return ra - rb;
      return a.depth - b.depth;
    });
    return out;
  }

  // Is student opted for goalCode? They are if every board-visible prereq is
  // marked complete for them. Off-board prereqs are assumed met (D10).
  function isOpted(goalCode, payload, student, mcgEvent) {
    const apps = (mcgEvent && mcgEvent.applicability) || [];
    if (!parse.isStudentApplicable(student, apps)) return false;
    const items = buildChainForStudent(goalCode, payload, student);
    for (const it of items) {
      if (it.onBoard && it.status !== 'complete' && it.status !== 'notreq') return false;
    }
    return true;
  }

  return { buildChainForStudent, isOpted };
})();

/* --------------------------------------------------------
 * render.js — the UI
 * -------------------------------------------------------- */
const render = (() => {

  // v0.3.2: collapse state persists per-goal, keyed by code. Default state
  // is "all collapsed" — the user asked for condensed nodes by default. Flip
  // by clicking the node's (+)/(−) toggle or the Expand/Collapse All buttons.
  let expanded = new Set();

  // Module-scoped refs so the toggle handler can redraw arrows after a
  // node changes width.
  let _lastCanvas = null;
  let _lastPayload = null;
  let _lastEdges = null;
  let _lastMode = 'class';
  let _lastStudent = null;
  let _lastGoalCode = null;
  let _resizeObserver = null;
  let _lastVisibleCodes = null;
  let _lastNodeByCode = null;

  // Goal-scope filter: the set of students who could ever attempt the goal
  // event (per MCG applicability). Used to pre-filter every node in the DAG
  // — a PF 8332F (ABM/FTE/P) view never shows CSO/RPA, even on prereq nodes
  // where CSO/RPA would technically be applicable.
  function goalScopeStudents(payload, goalCode) {
    const mcg = MCG_GRAPH.events[goalCode] || {};
    const apps = mcg.applicability || [];
    if (!apps.length) return payload.students.slice();
    return payload.students.filter(s => parse.isStudentApplicable(s, apps));
  }

  // Role grouping for the two student columns inside each node.
  // PRIMARY = ABM + FTE + CSO + RPA (crew / ground); SECONDARY = pilots.
  // If applicability allows only one side, render that as a single column.
  function roleBucket(studentType) {
    if (!studentType) return null;
    if (/^Pilot/i.test(studentType)) return 'pilot';
    if (['ABM','FTE','CSO','RPA'].indexOf(studentType) !== -1) return 'crew';
    return 'crew';
  }

  // Label the "crew" column based on which roles are actually applicable.
  function crewColumnLabel(applicableTypes) {
    const have = new Set(applicableTypes.map(t => t.toUpperCase()));
    const order = ['ABM','FTE','CSO','RPA'];
    const present = order.filter(r => have.has(r));
    return present.length ? present.join('/') : 'Crew';
  }

  // Classify an aggregate percentage into a CSS status class for headers/bars.
  function bandForPct(pct, applicable) {
    if (applicable === 0) return 's-none';  // nothing applicable — treat as not-started
    if (pct >= 75) return 's-green';
    if (pct > 0)   return 's-yellow';
    return 's-none';
  }
  function arrowClassForBand(band) {
    if (band === 's-green') return 'a-green';
    if (band === 's-yellow') return 'a-yellow';
    return 'a-none';
  }

  // ------------------------------------------------------------
  // Graph build: transitive prereqs from a goal, restricted to events
  // that exist on the board (off-board = hidden per issue feedback).
  // Depth 0 = goal. Each code appears at its *maximum* depth from the
  // goal (longest path wins) so tier columns stay clean.
  // Returns { nodesByCode, edges, maxDepth }
  // ------------------------------------------------------------
  function buildDag(goalCode, payload) {
    // BFS backward from goal through MCG prereqs. v0.3.3 resolves through
    // off-board prereqs transitively so nothing falls off the display just
    // because the direct MCG chain crosses an academic lecture. Example:
    // FQ 9511F's only MCG prereq is FQ 8210Y (oral report, off-board), and
    // that has on-board FQ/PF events behind it — those now show up as
    // direct prereqs of FQ 9511F via the bridge resolver.
    //
    // Cycles: MCG has at least one on-board cycle (CF 6660S ↔ CF 6672F)
    // plus off-board cycles. The outer BFS uses a seen-set; the bridge
    // resolver tracks a seenBridge set so it never walks an off-board code
    // twice within a single resolution.
    const nodesByCode = {};
    const edges = [];           // { from, to, bridge: [offBoardCodes] }
    if (!payload.byCode[goalCode]) return { nodesByCode, edges, maxDepth: 0 };

    const queue = [{ code: goalCode, depth: 0 }];
    const seen = new Set();
    const seenEdges = new Set();
    let maxDepth = 0;

    while (queue.length) {
      const { code, depth } = queue.shift();
      if (seen.has(code)) continue;
      seen.add(code);
      nodesByCode[code] = { code, depth };
      maxDepth = Math.max(maxDepth, depth);

      const resolved = resolveToOnBoardPrereqs(code, payload);
      for (const onBoardCode of Object.keys(resolved)) {
        const bridge = resolved[onBoardCode];  // may be empty (direct) or an array of off-board codes
        const eKey = `${onBoardCode}→${code}`;
        if (!seenEdges.has(eKey)) {
          seenEdges.add(eKey);
          edges.push({ from: onBoardCode, to: code, bridge });
        }
        if (!seen.has(onBoardCode)) {
          queue.push({ code: onBoardCode, depth: depth + 1 });
        }
      }
    }

    // v0.4.1: break 2-cycles before dagre sees them. The MCG contains
    // symmetric entries like CF 6660S ↔ CF 6672F (each lists the other
    // as a prereq). Without this, dagre's FAS algorithm reverses one
    // edge at layout time and draws it going backward, which showed up
    // as "lines loop back" in v0.4.0. Keep the edge toward the deeper
    // (further-from-goal) node; drop the other.
    const edgeKeys = new Set(edges.map(e => `${e.from}→${e.to}`));
    const droppedKeys = new Set();
    for (const e of edges) {
      const rev = `${e.to}→${e.from}`;
      if (!edgeKeys.has(rev)) continue;
      if (droppedKeys.has(`${e.from}→${e.to}`) || droppedKeys.has(rev)) continue;
      const fromDepth = nodesByCode[e.from] ? nodesByCode[e.from].depth : 0;
      const toDepth = nodesByCode[e.to] ? nodesByCode[e.to].depth : 0;
      // Keep edge whose 'from' (prereq) is deeper than 'to' (target).
      // That matches the canonical "upstream → downstream" direction.
      if (fromDepth >= toDepth) {
        droppedKeys.add(rev);
      } else {
        droppedKeys.add(`${e.from}→${e.to}`);
      }
    }
    const filteredEdges = edges.filter(e => !droppedKeys.has(`${e.from}→${e.to}`));
    return { nodesByCode, edges: filteredEdges, maxDepth };
  }

  // Walk MCG prereqs of `code`, skipping over off-board events, until we
  // hit on-board ones. Returns an object keyed by on-board prereq code →
  // array of off-board codes traversed to reach it (for tooltip/awareness).
  // Direct on-board prereqs map to an empty array.
  function resolveToOnBoardPrereqs(code, payload) {
    const result = {};  // onBoardCode -> bridge array
    const seenBridge = new Set();

    function walk(fromCode, bridgeSoFar) {
      const mcg = MCG_GRAPH.events[fromCode];
      if (!mcg || !mcg.prerequisites) return;
      for (const p of mcg.prerequisites) {
        if (!p.code) continue;
        if (payload.byCode[p.code]) {
          // On-board: edge destination
          if (!(p.code in result) || result[p.code].length > bridgeSoFar.length) {
            result[p.code] = bridgeSoFar.slice();
          }
        } else {
          // Off-board: recurse through it
          if (seenBridge.has(p.code)) continue;  // cycle-safety
          seenBridge.add(p.code);
          walk(p.code, bridgeSoFar.concat(p.code));
        }
      }
    }

    walk(code, []);
    return result;
  }

  // ------------------------------------------------------------
  // Per-node aggregate (class view) — reuses statusModule.
  // ------------------------------------------------------------
  function computeNodeAggregate(code, payload) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    const perStudent = statusModule.computeEventStatus(boardEvent, payload.students, payload.classMeta);
    const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, payload.students);
    return { boardEvent, mcgEvent, perStudent, agg };
  }

  // ------------------------------------------------------------
  // Per-node student status (student view) — opted/complete/blocked.
  // ------------------------------------------------------------
  function computeNodeForStudent(code, payload, student) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    if (!boardEvent) return { applicable: false };
    const apps = (mcgEvent && mcgEvent.applicability) || [];
    const applicable = parse.isStudentApplicable(student, apps);
    if (!applicable) return { applicable: false };

    const cell = boardEvent.cells.find(c => c.col === student.col);
    const classified = statusModule.classifyCell(cell, payload.classMeta, new Date());
    // Skip "not required" nodes too — student's dark-grey means the scheduler
    // doesn't expect them to do this one.
    if (classified.completion === 'notreq') return { applicable: false };
    const isComplete = classified.completion === 'complete';
    // Opted = applicable + all board-visible prereqs complete-or-notreq for this student.
    const opted = chain.isOpted(code, payload, student, mcgEvent);
    return {
      applicable: true,
      completion: classified.completion,
      isComplete,
      opted,
      dateText: classified.dateText,
    };
  }

  // ------------------------------------------------------------
  // Node renderer: class view
  // ------------------------------------------------------------
  // scopeStudents = goal-applicability-filtered student list. Aggregation
  // and roster display are restricted to this set, so PF 8332F (ABM/FTE/P)
  // view never mentions CSO/RPA even on shared prereq nodes.
  function renderNodeClass(code, payload, isGoal, scopeStudents, mcgGoal) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    // aggregateEvent uses the (students) argument to decide applicable set
    const perStudent = statusModule.computeEventStatus(boardEvent, scopeStudents, payload.classMeta);
    const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scopeStudents);

    const band = isGoal ? 'goal' : bandForPct(agg.pctComplete, agg.applicable);
    const applicableStudents = scopeStudents.filter(s => perStudent[s.col].applicable);

    const crew = applicableStudents.filter(s => roleBucket(s.type) === 'crew');
    const pilots = applicableStudents.filter(s => roleBucket(s.type) === 'pilot');
    const crewLabel = crewColumnLabel(crew.map(s => s.type));

    const isExpanded = expanded.has(code);
    const node = el('div', {
      class: 'node' + (isGoal ? ' goal' : ' ' + band) + (isExpanded ? '' : ' collapsed'),
      'data-code': code,
    });

    // Header with toggle
    const head = el('div', { class: 'node-head' }, [
      el('div', { class: 'node-head-code' }, code),
      el('div', { class: 'node-head-title' }, (mcgEvent && mcgEvent.eventName) || boardEvent.title),
    ]);
    if (!isGoal) {
      const toggle = el('button', {
        class: 'node-toggle',
        title: isExpanded ? 'Collapse' : 'Expand',
        onClick: (e) => {
          e.stopPropagation();
          if (expanded.has(code)) expanded.delete(code);
          else expanded.add(code);
          node.classList.toggle('collapsed');
          toggle.textContent = expanded.has(code) ? '−' : '+';
          toggle.title = expanded.has(code) ? 'Collapse' : 'Expand';
          redrawArrowsSoon();
        },
      }, isExpanded ? '−' : '+');
      head.appendChild(toggle);
    }
    node.appendChild(head);

    if (isGoal) {
      node.appendChild(el('div', { class: 'node-progress' }, [
        el('div', { class: 'node-pct', style: 'font-size:12px;font-weight:600;color:#777' },
          `TARGET · ${applicableStudents.length} applicable`),
      ]));
      return node;
    }

    // Progress bar
    node.appendChild(el('div', { class: 'node-progress' }, [
      el('div', { class: 'node-bar-bg' }, [
        el('div', { class: 'node-bar-fill', style: `width:${agg.pctComplete}%` }),
      ]),
      el('div', { class: 'node-pct' },
        agg.applicable ? `${agg.pctComplete}%` : '—'),
    ]));

    // Role columns — also need to know who's opted for dimming
    const optedByCol = computeOptedMap(code, payload, applicableStudents, mcgEvent);
    const rolesWrap = el('div', { class: 'node-roles' });
    const bothPresent = crew.length && pilots.length;

    if (crew.length) {
      rolesWrap.appendChild(renderRoleCol(crewLabel, crew, perStudent, !bothPresent, optedByCol));
    }
    if (pilots.length) {
      rolesWrap.appendChild(renderRoleCol('Pilots', pilots, perStudent, !bothPresent, optedByCol));
    }
    if (!crew.length && !pilots.length) {
      rolesWrap.appendChild(el('div', { class: 'role-col single', style: 'color:var(--ink-faint);font-size:10px' },
        '(no applicable students)'));
    }
    node.appendChild(rolesWrap);
    return node;
  }

  // Per-node opt map: which of the applicable students has all board-visible
  // prereqs satisfied? Students who aren't opted get dimmed in the roster
  // (they show up for awareness but you can see at a glance they're blocked).
  function computeOptedMap(code, payload, students, mcgEvent) {
    const map = {};
    for (const s of students) {
      map[s.col] = chain.isOpted(code, payload, s, mcgEvent);
    }
    return map;
  }

  function renderRoleCol(label, students, perStudent, isSingle, optedByCol) {
    const useSingleColumn = students.length <= 5;
    const col = el('div', { class: 'role-col' + (isSingle ? ' single' : '') + (useSingleColumn ? ' one-col' : '') });
    col.appendChild(el('h5', null, label));
    const ul = el('ul');
    for (const s of students) {
      const ps = perStudent[s.col];
      const opted = optedByCol ? optedByCol[s.col] : true;
      const isComplete = ps.completion === 'complete';
      const isScheduled = ps.completion === 'scheduled';
      const dim = !opted && !isComplete && !isScheduled;

      // v0.4: flag a warning when a student has a scheduled date but
      // their prereqs are NOT met. That's a planning error (someone
      // was put on the schedule without checking they're opted).
      const isWarn = isScheduled && !opted;

      // v0.4: per-dot hover tooltip shows the actual completion state
      // for this student on this node, plus any date. Removes the
      // v0.3.2 misleading "always says Opted" tooltip.
      const stateText = (
        ps.completion === 'complete' ? 'complete' :
        ps.completion === 'scheduled' ? (opted ? 'scheduled' : 'scheduled (WARN: prereqs not met)') :
        ps.completion === 'paired-opted' ? 'paired (partner incomplete)' :
        ps.completion === 'notreq' ? 'not required' :
        opted ? 'opted (prereqs met, not started)' : 'pending (prereqs not met)'
      );
      const dateSuffix = ps.dateText ? ` · ${ps.dateText}` : '';
      const tooltip = `${s.name} — ${stateText}${dateSuffix}`;

      let dotClass = 'dot ' + (ps.completion === 'paired-opted' ? 'paired' : ps.completion);
      if (isWarn) dotClass += ' warn';

      const li = el('li', {
        class: (dim ? 'dim-name ' : '') + (isWarn ? 'warn-row' : ''),
        title: tooltip,
      }, [
        el('span', { class: dotClass }),
        el('span', null, (isWarn ? '⚠ ' : '') + s.name),
      ]);
      ul.appendChild(li);
    }
    col.appendChild(ul);
    return col;
  }

  // ------------------------------------------------------------
  // Node renderer: student view — 4 states per v0.3.2 feedback
  //   DONE      (dark green)  — student has completed the event
  //   OPTED     (light green) — prereqs met but not yet done
  //   SCHEDULED (yellow)      — student has a future date on the sheet
  //   NOT OPTED (red)         — at least one board-visible prereq pending
  // Renamed from v0.3.1 "BLOCKED" per user feedback.
  // ------------------------------------------------------------
  function renderNodeStudent(code, payload, student, isGoal) {
    const boardEvent = payload.byCode[code];
    const mcgEvent = MCG_GRAPH.events[code];
    const info = computeNodeForStudent(code, payload, student);
    let band = 'goal', label = 'TARGET';
    if (!isGoal) {
      if (info.isComplete) { band = 's-done'; label = 'DONE'; }
      else if (info.completion === 'scheduled' && !info.opted) {
        // v0.4: scheduled-but-not-opted is a planning error — flag it
        band = 's-warn'; label = '⚠ SCHEDULED · NOT OPTED';
      }
      else if (info.completion === 'scheduled') { band = 's-scheduled'; label = 'SCHEDULED'; }
      else if (info.opted) { band = 's-opted'; label = 'OPTED'; }
      else { band = 's-notopted'; label = 'NOT OPTED'; }
    }
    const node = el('div', {
      class: 'node' + (isGoal ? ' goal' : ' ' + band),
      'data-code': code,
    });
    node.appendChild(el('div', { class: 'node-head' }, [
      el('div', { class: 'node-head-code' }, code),
      el('div', { class: 'node-head-title' }, (mcgEvent && mcgEvent.eventName) || boardEvent.title),
    ]));
    if (isGoal) {
      node.appendChild(el('div', { class: 'node-student-chip' },
        el('span', { class: 'chip-pill' }, `TARGET · ${student.name}`)));
    } else {
      // Chip + optional date sub-line. If there's a date on the cell, show it
      // even when the primary state is OPTED or NOT OPTED — per user feedback
      // "should also show 'Scheduled 4/14' in addition to Opted".
      const chipWrap = el('div', { class: 'node-student-chip' });
      chipWrap.appendChild(el('span', { class: 'chip-pill' }, label));
      if (info.dateText && !info.isComplete) {
        chipWrap.appendChild(el('div', {
          class: 'node-date',
          title: 'Date recorded on the big board for this student',
        }, info.dateText));
      }
      node.appendChild(chipWrap);
    }
    return node;
  }

  // ------------------------------------------------------------
  // Layout: put nodes into tiers (columns) by depth.
  // Filters:
  //   class view  — drop nodes with 0 applicable students
  //   student view — drop nodes where the student isn't applicable
  // Returns { tiers: [[code, ...], ...] } where tier[0] = goal.
  // ------------------------------------------------------------
  function layoutDag(dag, payload, { mode, student, scopeStudents }) {
    const tiers = [];
    for (let d = 0; d <= dag.maxDepth; d++) tiers.push([]);

    // Pass 1: applicability filter (class = zero goal-scope applicable,
    // student = not applicable to this student).
    const applicable = new Set();
    for (const code of Object.keys(dag.nodesByCode)) {
      if (mode === 'student' && student) {
        const info = computeNodeForStudent(code, payload, student);
        if (!info.applicable && dag.nodesByCode[code].depth !== 0) continue;
      } else {
        const boardEvent = payload.byCode[code];
        const mcgEvent = MCG_GRAPH.events[code];
        const perStudent = statusModule.computeEventStatus(boardEvent, scopeStudents, payload.classMeta);
        const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scopeStudents);
        if (agg.applicable === 0 && dag.nodesByCode[code].depth !== 0) continue;
      }
      applicable.add(code);
    }

    // Pass 2: edge filter — keep only edges whose both endpoints survived.
    let edges = dag.edges.filter(e => applicable.has(e.from) && applicable.has(e.to));

    // Pass 3: orphan filter — drop nodes that have no visible edge connection.
    // Without this, CF 6605S and similar show up as floating islands with no
    // lines (user feedback v0.4.0). Keep the goal itself unconditionally.
    const goalCode = Object.keys(dag.nodesByCode).find(c => dag.nodesByCode[c].depth === 0);
    const connected = new Set(goalCode ? [goalCode] : []);
    for (const e of edges) { connected.add(e.from); connected.add(e.to); }
    const visible = new Set([...applicable].filter(c => connected.has(c)));
    edges = edges.filter(e => visible.has(e.from) && visible.has(e.to));

    // Distribute into tier columns (only used by fallback layout)
    for (const code of visible) {
      tiers[dag.nodesByCode[code].depth].push(code);
    }
    for (const t of tiers) t.sort();
    return { tiers, edges };
  }

  // ------------------------------------------------------------
  // Arrow renderer: single SVG overlaying the canvas, drawing a
  // cubic bezier from right-edge of source to left-edge of target.
  // Called after nodes are attached so getBoundingClientRect works.
  // Source-node status determines arrow color.
  // ------------------------------------------------------------
  function drawArrows(canvas, edges, payload, { mode, student }) {
    // Remove old SVG if present
    const existing = canvas.querySelector('svg.dag-arrows');
    if (existing) existing.remove();
    if (!edges.length) return;

    const canvasRect = canvas.getBoundingClientRect();
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'dag-arrows');
    svg.setAttribute('width', canvas.scrollWidth);
    svg.setAttribute('height', canvas.scrollHeight);

    // Arrowhead markers (one per color)
    const defs = document.createElementNS(svgNS, 'defs');
    for (const cls of ['a-green', 'a-yellow', 'a-none', 'a-goal']) {
      const m = document.createElementNS(svgNS, 'marker');
      m.setAttribute('id', 'mk-' + cls);
      m.setAttribute('viewBox', '0 0 10 10');
      m.setAttribute('refX', '8'); m.setAttribute('refY', '5');
      m.setAttribute('markerWidth', '7'); m.setAttribute('markerHeight', '7');
      m.setAttribute('orient', 'auto-start-reverse');
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', 'M0,0 L10,5 L0,10 z');
      p.setAttribute('fill',
        cls === 'a-green' ? '#2e7d32' :
        cls === 'a-yellow' ? '#b88600' :
        cls === 'a-none' ? '#c62828' : '#999');
      m.appendChild(p); defs.appendChild(m);
    }
    svg.appendChild(defs);

    for (const e of edges) {
      const fromNode = canvas.querySelector(`.node[data-code="${cssEsc(e.from)}"]`);
      const toNode = canvas.querySelector(`.node[data-code="${cssEsc(e.to)}"]`);
      if (!fromNode || !toNode) continue;
      const fr = fromNode.getBoundingClientRect();
      const tr = toNode.getBoundingClientRect();
      // Source right edge → target left edge (canvas-relative)
      const x1 = fr.right - canvasRect.left;
      const y1 = fr.top - canvasRect.top + fr.height / 2;
      const x2 = tr.left - canvasRect.left;
      const y2 = tr.top - canvasRect.top + tr.height / 2;
      const dx = Math.max(30, (x2 - x1) * 0.4);
      const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;

      // Arrow color = source node status
      let cls = 'a-none';
      if (mode === 'student' && student) {
        const info = computeNodeForStudent(e.from, payload, student);
        if (info.isComplete) cls = 'a-green';
        else if (info.completion === 'scheduled') cls = 'a-yellow';
        else if (info.opted) cls = 'a-green';
        else cls = 'a-none';
      } else {
        // Use goal-scope in the aggregate, same as layoutDag / renderNodeClass
        const scope = goalScopeStudents(payload, _lastGoalCode || e.to);
        const boardEvent = payload.byCode[e.from];
        const mcgEvent = MCG_GRAPH.events[e.from];
        const perStudent = statusModule.computeEventStatus(boardEvent, scope, payload.classMeta);
        const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scope);
        cls = arrowClassForBand(bandForPct(agg.pctComplete, agg.applicable));
      }
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', cls);
      path.setAttribute('marker-end', `url(#mk-${cls})`);
      svg.appendChild(path);
    }
    canvas.insertBefore(svg, canvas.firstChild);
  }

  function cssEsc(s) { return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/([^\w-])/g, '\\$1'); }

  // ------------------------------------------------------------
  // Main render entry — called by boot() on Load and on any
  // state change (view / goal / student).
  // ------------------------------------------------------------
  function renderAll(payload, opts) {
    opts = opts || {};
    const mode = opts.mode || 'class';
    const goalCode = opts.goalCode;
    const student = opts.studentCol
      ? payload.students.find(s => s.col === opts.studentCol)
      : null;

    const main = $('#main');
    main.innerHTML = '';

    if (!goalCode) {
      main.appendChild(el('div', { class: 'dag-empty' }, [
        el('h2', null, 'Pick a target event above.'),
        el('p', null, 'The canvas will draw the board-visible prereq chain leading to that goal.'),
      ]));
      $('#goal-summary').style.display = 'none';
      return;
    }
    if (mode === 'student' && !student) {
      main.appendChild(el('div', { class: 'dag-empty' }, [
        el('h2', null, 'Pick a student.'),
        el('p', null, 'Student view needs a student selected.'),
      ]));
      $('#goal-summary').style.display = 'none';
      return;
    }
    if (!payload.byCode[goalCode]) {
      main.appendChild(el('div', { class: 'dag-empty' }, [
        el('h2', null, `${goalCode} is not on this board.`),
        el('p', null, goalCode === 'SY 7521O'
          ? 'Try a STC tab in the Board picker above — SY 7521O lives on the STC board.'
          : 'This goal event exists in the MCG but isn\'t on the currently loaded tab.'),
      ]));
      $('#goal-summary').style.display = 'none';
      return;
    }

    // v0.3.2: Student view — if the selected student isn't applicable to
    // the chosen goal, don't render a DAG at all. Show an explicit Not
    // Applicable screen per issue feedback.
    if (mode === 'student' && student) {
      const mcg = MCG_GRAPH.events[goalCode] || {};
      const apps = mcg.applicability || [];
      if (!parse.isStudentApplicable(student, apps)) {
        main.appendChild(el('div', { class: 'dag-empty' }, [
          el('h2', null, 'Not Applicable'),
          el('p', null, `${goalCode} (${mcg.eventName || ''}) applies to ${apps.join('/') || 'unrestricted'}.`),
          el('p', null, `${student.name} is ${student.type} — not in the applicability set for this goal.`),
          el('p', { style: 'margin-top:10px;font-size:12px;color:var(--ink-faint)' },
            'Pick a different goal or switch to Class view.'),
        ]));
        $('#goal-summary').style.display = 'none';
        return;
      }
    }

    _lastGoalCode = goalCode;
    const scopeStudents = goalScopeStudents(payload, goalCode);

    // Build DAG + filtered layout
    const dag = buildDag(goalCode, payload);
    const layout = layoutDag(dag, payload, { mode, student, scopeStudents });

    const mcgGoal = MCG_GRAPH.events[goalCode];
    const dagreAvailable = typeof dagre !== 'undefined';
    const canvas = el('div', {
      class: 'dag-canvas' + (dagreAvailable ? '' : ' fallback'),
      id: 'dag-canvas',
    });

    // Collect visible node codes in a flat list (dagre doesn't care about tiers)
    const visibleCodes = [];
    for (const codes of layout.tiers) for (const c of codes) visibleCodes.push(c);

    // Build all node DOM elements first — we need them in the DOM to measure
    // their size before running dagre. Nodes are rendered invisible until
    // layout completes so we don't flash the pre-layout positions.
    const nodeByCode = {};
    for (const code of visibleCodes) {
      const isGoal = code === goalCode;
      const node = mode === 'student'
        ? renderNodeStudent(code, payload, student, isGoal)
        : renderNodeClass(code, payload, isGoal, scopeStudents, mcgGoal);
      if (dagreAvailable) {
        node.style.visibility = 'hidden';
        node.style.left = '0px';
        node.style.top = '0px';
      }
      nodeByCode[code] = node;
      canvas.appendChild(node);
    }
    main.appendChild(canvas);

    _lastCanvas = canvas;
    _lastPayload = payload;
    _lastEdges = layout.edges;
    _lastMode = mode;
    _lastStudent = student;
    _lastVisibleCodes = visibleCodes;
    _lastNodeByCode = nodeByCode;

    if (dagreAvailable) {
      // Wait for DOM to compute sizes, then layout.
      requestAnimationFrame(() => requestAnimationFrame(() => applyDagreLayout()));
    } else {
      // Fallback path — needs the tiered column structure the pre-v0.4
      // code generated. Re-render with columns.
      main.innerHTML = '';
      const canvasFb = el('div', { class: 'dag-canvas fallback', id: 'dag-canvas' });
      for (let d = 0; d < layout.tiers.length; d++) {
        const codes = layout.tiers[d];
        if (!codes.length) continue;
        const col = el('div', { class: 'dag-col' });
        col.appendChild(el('div', { class: 'dag-col-label' }, d === 0 ? 'GOAL' : `TIER −${d}`));
        for (const code of codes) {
          const isGoal = d === 0;
          const n = mode === 'student'
            ? renderNodeStudent(code, payload, student, isGoal)
            : renderNodeClass(code, payload, isGoal, scopeStudents, mcgGoal);
          col.appendChild(n);
        }
        canvasFb.appendChild(col);
      }
      main.appendChild(canvasFb);
      _lastCanvas = canvasFb;
      redrawArrowsSoon();
      banner('Dagre not loaded — using fallback column layout. Check that dagre.min.js sits next to index.html.', true);
    }

    if (_resizeObserver) _resizeObserver.disconnect();
    if (typeof ResizeObserver !== 'undefined' && dagreAvailable) {
      _resizeObserver = new ResizeObserver(() => redrawArrowsSoon());
      _resizeObserver.observe(_lastCanvas);
    }

    // Summary strip
    renderGoalSummary(payload, goalCode, dag, layout, mode, student, scopeStudents);
  }

  // Measure all rendered nodes, feed sizes+edges to dagre, then position
  // nodes using dagre's coords and draw arrows through its waypoints.
  function applyDagreLayout() {
    if (!_lastCanvas || !_lastVisibleCodes) return;
    const canvas = _lastCanvas;
    const nodeByCode = _lastNodeByCode;
    const edges = _lastEdges;

    const g = new dagre.graphlib.Graph({ compound: false });
    g.setGraph({
      rankdir: 'LR',      // prereq (source) on left → goal (sink) on right
      ranksep: 80,        // horizontal gap between tiers
      nodesep: 16,        // vertical gap between nodes in same tier
      edgesep: 8,         // vertical gap between edges
      marginx: 20,
      marginy: 20,
    });
    g.setDefaultEdgeLabel(() => ({}));

    // Measure each node (its CSS class already reflects collapsed/expanded state)
    for (const code of _lastVisibleCodes) {
      const el = nodeByCode[code];
      const rect = el.getBoundingClientRect();
      g.setNode(code, { width: rect.width, height: rect.height });
    }
    for (const e of edges) {
      if (g.hasNode(e.from) && g.hasNode(e.to)) {
        g.setEdge(e.from, e.to, { code_from: e.from, code_to: e.to, bridge: e.bridge || [] });
      }
    }

    try {
      dagre.layout(g);
    } catch (err) {
      console.error('[bbcs] dagre.layout threw:', err);
      banner('Layout error: ' + (err.message || err), true);
      return;
    }

    // Apply positions
    g.nodes().forEach(code => {
      const n = g.node(code);
      const el = nodeByCode[code];
      if (!el || !n) return;
      const left = n.x - n.width / 2;
      const top = n.y - n.height / 2;
      el.style.left = left + 'px';
      el.style.top = top + 'px';
      el.style.visibility = '';
    });

    // Size canvas to graph bounding box
    const gi = g.graph();
    canvas.style.width = (gi.width + 20) + 'px';
    canvas.style.height = (gi.height + 20) + 'px';

    drawArrowsDagre(canvas, g, _lastPayload, { mode: _lastMode, student: _lastStudent });
  }

  // Expand/collapse all nodes in the current canvas.
  function setAllExpanded(shouldExpand) {
    if (!_lastCanvas) return;
    const nodes = _lastCanvas.querySelectorAll('.node:not(.goal)');
    nodes.forEach(n => {
      const code = n.getAttribute('data-code');
      if (!code) return;
      if (shouldExpand) {
        expanded.add(code);
        n.classList.remove('collapsed');
      } else {
        expanded.delete(code);
        n.classList.add('collapsed');
      }
      const toggle = n.querySelector('.node-toggle');
      if (toggle) {
        toggle.textContent = shouldExpand ? '−' : '+';
        toggle.title = shouldExpand ? 'Collapse' : 'Expand';
      }
    });
    redrawArrowsSoon();
  }

  // v0.4: toggles and resizes trigger a full dagre re-layout (nodes change
  // size, so the whole rank layout may shift). Fallback path just redraws
  // arrows since there's no dagre output to reapply.
  function redrawArrowsSoon() {
    if (!_lastCanvas || !_lastEdges) return;
    if (typeof dagre !== 'undefined' && _lastVisibleCodes) {
      requestAnimationFrame(() => requestAnimationFrame(() => applyDagreLayout()));
    } else {
      requestAnimationFrame(() => requestAnimationFrame(() =>
        drawArrows(_lastCanvas, _lastEdges, _lastPayload, { mode: _lastMode, student: _lastStudent })));
    }
  }

  // SVG arrow renderer using dagre edge waypoints. Waypoints are computed
  // to avoid passing through nodes. Draw a smoothed path through them.
  function drawArrowsDagre(canvas, dagreGraph, payload, { mode, student }) {
    const existing = canvas.querySelector('svg.dag-arrows');
    if (existing) existing.remove();

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('class', 'dag-arrows');
    const gi = dagreGraph.graph();
    svg.setAttribute('width', gi.width + 20);
    svg.setAttribute('height', gi.height + 20);
    svg.style.pointerEvents = 'none';

    const defs = document.createElementNS(svgNS, 'defs');
    for (const cls of ['a-green', 'a-yellow', 'a-none', 'a-goal']) {
      const m = document.createElementNS(svgNS, 'marker');
      m.setAttribute('id', 'mk-' + cls);
      m.setAttribute('viewBox', '0 0 10 10');
      m.setAttribute('refX', '8'); m.setAttribute('refY', '5');
      m.setAttribute('markerWidth', '7'); m.setAttribute('markerHeight', '7');
      m.setAttribute('orient', 'auto-start-reverse');
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', 'M0,0 L10,5 L0,10 z');
      p.setAttribute('fill',
        cls === 'a-green' ? '#2e7d32' :
        cls === 'a-yellow' ? '#b88600' :
        cls === 'a-none' ? '#c62828' : '#999');
      m.appendChild(p); defs.appendChild(m);
    }
    svg.appendChild(defs);

    const lineStyle = window.bbcsLineStyle || 'polyline';

    dagreGraph.edges().forEach(e => {
      const edge = dagreGraph.edge(e);
      if (!edge.points || edge.points.length < 2) return;
      const pts = edge.points;

      // Clamp first and last points to the actual node edges so arrows
      // visibly start/end at the container border instead of looking like
      // they emerge from the centroid. Dagre places endpoints near the
      // border but the exact point depends on internal rank offsets; for
      // visual consistency we push them to the mid-height of the facing
      // edge (right-center of source, left-center of target).
      const srcNode = dagreGraph.node(e.v);
      const tgtNode = dagreGraph.node(e.w);
      if (srcNode) { pts[0] = { x: srcNode.x + srcNode.width / 2, y: srcNode.y }; }
      if (tgtNode) { pts[pts.length - 1] = { x: tgtNode.x - tgtNode.width / 2, y: tgtNode.y }; }

      let d;
      if (lineStyle === 'straight') {
        // Ignore waypoints entirely — direct line from source to target.
        d = `M ${pts[0].x} ${pts[0].y} L ${pts[pts.length - 1].x} ${pts[pts.length - 1].y}`;
      } else if (lineStyle === 'smooth') {
        // Cubic bezier per segment with horizontal tangent control points.
        d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const dx = b.x - a.x;
          const c1x = a.x + dx * 0.5, c1y = a.y;
          const c2x = a.x + dx * 0.5, c2y = b.y;
          d += ` C ${c1x} ${c1y} ${c2x} ${c2y} ${b.x} ${b.y}`;
        }
      } else if (lineStyle === 'orthogonal') {
        // Right-angle routing: for each segment, go horizontally half-way,
        // then vertically to the target y, then horizontally the rest.
        d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const midX = (a.x + b.x) / 2;
          d += ` L ${midX} ${a.y} L ${midX} ${b.y} L ${b.x} ${b.y}`;
        }
      } else {
        // Polyline — straight segments between dagre waypoints. Default.
        d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 1; i < pts.length; i++) d += ` L ${pts[i].x} ${pts[i].y}`;
      }

      // Arrow color = source node status
      let cls = 'a-none';
      if (mode === 'student' && student) {
        const info = computeNodeForStudent(e.v, payload, student);
        if (info.isComplete) cls = 'a-green';
        else if (info.completion === 'scheduled' && !info.opted) cls = 'a-none';
        else if (info.completion === 'scheduled') cls = 'a-yellow';
        else if (info.opted) cls = 'a-green';
        else cls = 'a-none';
      } else {
        const scope = goalScopeStudents(payload, _lastGoalCode || e.w);
        const boardEvent = payload.byCode[e.v];
        const mcgEvent = MCG_GRAPH.events[e.v];
        const perStudent = statusModule.computeEventStatus(boardEvent, scope, payload.classMeta);
        const agg = statusModule.aggregateEvent(boardEvent, mcgEvent, perStudent, scope);
        cls = arrowClassForBand(bandForPct(agg.pctComplete, agg.applicable));
      }
      const path = document.createElementNS(svgNS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', cls);
      path.setAttribute('marker-end', `url(#mk-${cls})`);
      // Bridge tooltip — surfaces off-board prereqs traversed on this edge
      if (edge.bridge && edge.bridge.length) {
        const titleEl = document.createElementNS(svgNS, 'title');
        titleEl.textContent = 'via off-board: ' + edge.bridge.join(' → ');
        path.appendChild(titleEl);
        path.style.pointerEvents = 'stroke';  // so hover works on the line
      }
      svg.appendChild(path);
    });

    canvas.insertBefore(svg, canvas.firstChild);
  }

  function renderGoalSummary(payload, goalCode, dag, layout, mode, student, scopeStudents) {
    const wrap = $('#goal-summary');
    wrap.style.display = 'flex';
    wrap.innerHTML = '';
    const mcg = MCG_GRAPH.events[goalCode] || {};
    const totalNodes = Object.keys(dag.nodesByCode).length;
    const visible = layout.tiers.reduce((n, t) => n + t.length, 0);
    const hidden = totalNodes - visible;
    const parts = [
      ['Target', `${goalCode} — ${mcg.eventName || ''}`],
      ['Applicability', (mcg.applicability || []).join(', ') || 'unrestricted'],
      ['View', mode === 'student' ? `Student — ${student.name} (${student.type})` : `Class aggregate (${(scopeStudents || payload.students).length} in scope)`],
      ['Board', payload.sheetName],
      ['Nodes shown', `${visible} of ${totalNodes}${hidden ? ` (${hidden} hidden)` : ''}`],
    ];
    for (const [k, v] of parts) {
      wrap.appendChild(el('div', null, [el('span', null, k + ': '), el('strong', null, v)]));
    }
  }

  return { renderAll, setAllExpanded };
})();

/* --------------------------------------------------------
 * issues.js — fetch and render issues.md (simple MD subset)
 * -------------------------------------------------------- */
const issues = (() => {
  async function fetchIssues() {
    try {
      const r = await fetch('./issues.md');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.text();
    } catch (e) {
      return null;
    }
  }

  function renderMarkdown(md) {
    // Minimal MD: headings + **bold** + bullet lists. Good enough for the log.
    const lines = md.split(/\r?\n/);
    const out = [];
    for (let line of lines) {
      if (/^#+\s/.test(line)) {
        const depth = line.match(/^#+/)[0].length;
        const tag = 'h' + Math.min(depth + 2, 6);
        out.push(`<${tag}>${escHtml(line.replace(/^#+\s*/, ''))}</${tag}>`);
      } else if (/^---$/.test(line)) {
        out.push('<hr>');
      } else if (/^\s*[-*]\s+/.test(line)) {
        out.push(`<li>${escHtml(line.replace(/^\s*[-*]\s+/, ''))}</li>`);
      } else if (line.trim() === '') {
        out.push('<br>');
      } else {
        out.push(`<p>${escHtml(line).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>')}</p>`);
      }
    }
    return out.join('\n');
  }

  async function showPanel() {
    openPanel('Issue Log', null);
    const md = await fetchIssues();
    const body = $('#panel-body');
    if (md == null) {
      body.innerHTML = `
        <p>Couldn't fetch <code>issues.md</code> (probably running from <code>file://</code>).</p>
        <p>Either:</p>
        <ul>
          <li>Serve this folder locally: <code>python -m http.server 8080</code></li>
          <li>Or paste the file contents below:</li>
        </ul>
        <textarea id="paste-issues" style="width:100%;height:200px;font-family:var(--mono);font-size:11px;margin-top:8px;padding:8px;"></textarea>
        <button class="btn" style="margin-top:8px" id="paste-render">Render pasted issues</button>
        <div id="paste-output"></div>
      `;
      $('#paste-render').addEventListener('click', () => {
        const v = $('#paste-issues').value;
        $('#paste-output').innerHTML = '<hr>' + renderMarkdown(v);
      });
    } else {
      body.innerHTML = renderMarkdown(md);
    }
  }

  return { showPanel };
})();

/* --------------------------------------------------------

function openPanel(title, contentHtml) {
  $('#panel-title').textContent = title;
  if (contentHtml != null) $('#panel-body').innerHTML = contentHtml;
  $('#panel').classList.add('open');
  $('#panel-backdrop').classList.add('open');
}
function closePanel() {
  $('#panel').classList.remove('open');
  $('#panel-backdrop').classList.remove('open');
}

/* --------------------------------------------------------
 * cache status helpers (footer)
 * -------------------------------------------------------- */
function updateCacheFooter() {
  const info = api.cacheInfo();
  const el = $('#foot-cache');
  if (!info.length) {
    el.textContent = 'cache: empty';
    el.style.color = 'var(--ink-faint)';
    return;
  }
  const totalKB = info.reduce((s, i) => s + i.sizeKB, 0);
  const mostRecent = info
    .filter(i => i.cachedAt)
    .sort((a, b) => b.cachedAt.localeCompare(a.cachedAt))[0];
  const when = mostRecent ? new Date(mostRecent.cachedAt).toLocaleString() : '?';
  const tip = info.map(i => `${i.name} · ${i.sizeKB} KB · ${i.cachedAt ? new Date(i.cachedAt).toLocaleString() : '?'}`).join('\n');
  el.textContent = `cache: ${info.length} sheet${info.length > 1 ? 's' : ''} · ${totalKB} KB · newest ${when}`;
  el.title = tip;
  el.style.color = 'var(--ink-soft)';
}

/* --------------------------------------------------------
 * App state — single source of truth for the UI controls.
 * renderCurrent() reads this and calls render.renderAll.
 * -------------------------------------------------------- */
const state = {
  payload: null,
  goalCode: null,
  mode: 'class',     // 'class' | 'student'
  studentCol: null,
};

function renderCurrent() {
  if (!state.payload) return;
  render.renderAll(state.payload, {
    mode: state.mode,
    goalCode: state.goalCode,
    studentCol: state.studentCol,
  });
}

// Populate #goal-picker based on which goal events exist on the loaded board.
// Goals not on this sheet still appear but are disabled / flagged.
function repopulateGoalPicker() {
  const picker = $('#goal-picker');
  picker.innerHTML = '';
  if (!state.payload) {
    picker.appendChild(el('option', { value: '' }, '— load a board first —'));
    picker.disabled = true;
    return;
  }
  const seen = new Set();
  for (const code of MCG_GRAPH.goalEvents) {
    const mcg = MCG_GRAPH.events[code] || {};
    const onBoard = !!state.payload.byCode[code];
    const label = `${code} — ${mcg.eventName || '?'}${onBoard ? '' : '  (not on this board)'}`;
    const opt = el('option', { value: code }, label);
    if (!onBoard) opt.disabled = true;
    picker.appendChild(opt);
    seen.add(code);
  }
  picker.disabled = false;

  // Default selection: first board-visible goal, or keep existing if still valid.
  if (!state.goalCode || !state.payload.byCode[state.goalCode]) {
    const firstOnBoard = MCG_GRAPH.goalEvents.find(c => state.payload.byCode[c]);
    state.goalCode = firstOnBoard || null;
  }
  if (state.goalCode) picker.value = state.goalCode;
}

// Populate #student-picker with the roster.
function repopulateStudentPicker() {
  const picker = $('#student-picker');
  picker.innerHTML = '';
  if (!state.payload) {
    picker.appendChild(el('option', { value: '' }, '— no board loaded —'));
    picker.disabled = true;
    return;
  }
  picker.appendChild(el('option', { value: '' }, '— pick a student —'));
  // Sort by type then name for scannability
  const sorted = state.payload.students.slice().sort((a, b) => {
    if (a.type !== b.type) return a.type.localeCompare(b.type);
    return a.name.localeCompare(b.name);
  });
  for (const s of sorted) {
    picker.appendChild(el('option', { value: s.col }, `${s.name} · ${s.type} · ${s.dataGroup}`));
  }
  picker.disabled = (state.mode !== 'student');
  if (state.studentCol) picker.value = String(state.studentCol);
}

/* --------------------------------------------------------
 * boot — wire up header controls + initial load
 * -------------------------------------------------------- */
async function boot() {
  $('#app-version').textContent = `v${APP_VERSION} · MCG ${MCG_VERSION}`;
  $('#foot-version').textContent = APP_VERSION;
  $('#foot-mcg').textContent = MCG_VERSION;
  $('#foot-endpoint').textContent = CONFIG.GAS_ENDPOINT ? '◉ endpoint set' : '⚠ CONFIG.GAS_ENDPOINT not set';

  // Cache canary (v0.3.3): write a timestamp on boot, read back the
  // previous one. If the previous canary survived across reloads,
  // localStorage persists for this origin. If it doesn't, the user is
  // probably on a browser or mode that wipes storage (incognito, "clear
  // on exit", file:// with strict settings) and the sheet cache won't
  // persist either — call that out up front.
  try {
    const prev = localStorage.getItem('bbcs::canary');
    const now = Date.now();
    localStorage.setItem('bbcs::canary', String(now));
    const readback = localStorage.getItem('bbcs::canary');
    if (readback !== String(now)) {
      console.error('[bbcs] localStorage write/read mismatch — cache will NOT work');
      banner('localStorage is not persisting — sheet cache will not survive reloads. Check browser privacy settings or try serving via http://localhost.', true);
    } else if (!prev) {
      console.log('[bbcs] cache canary: first boot (or cache was cleared). Future reloads should hit cache.');
    } else {
      const ageMin = Math.round((now - parseInt(prev, 10)) / 60000);
      console.log(`[bbcs] cache canary: previous boot was ${ageMin} min ago — localStorage persists ✓`);
    }
  } catch (e) {
    console.error('[bbcs] localStorage unavailable:', e);
    banner('localStorage not available — sheet data will re-fetch every time. ' + (e.message || e), true);
  }

  updateCacheFooter();

  $('#btn-legend').addEventListener('click', legendPanel);
  $('#btn-issues').addEventListener('click', () => issues.showPanel());
  $('#panel-close').addEventListener('click', closePanel);
  $('#panel-backdrop').addEventListener('click', closePanel);

  $('#btn-load').addEventListener('click', () => loadCurrentSheet({ force: false }));
  $('#btn-refresh').addEventListener('click', () => loadCurrentSheet({ force: true }));
  $('#btn-refresh-list').addEventListener('click', async () => {
    // Manual GAS hit to pull fresh sheet-list. Updates the picker but doesn't load a sheet.
    const btn = $('#btn-refresh-list');
    btn.disabled = true; btn.textContent = '⟳ …';
    try {
      const list = await api.sheetsAvail();
      const picker = $('#sheet-picker');
      const current = picker.value;
      picker.innerHTML = '';
      const sorted = list.sheets.slice().sort((a, b) => {
        const ap = /\d\d[AB]\s.*Big Board/i.test(a.name) ? 0 : 1;
        const bp = /\d\d[AB]\s.*Big Board/i.test(b.name) ? 0 : 1;
        if (ap !== bp) return ap - bp;
        return a.name.localeCompare(b.name);
      });
      for (const s of sorted) {
        picker.appendChild(el('option', { value: s.name }, `${s.name}  (${s.rows}r × ${s.cols}c)`));
      }
      picker.disabled = false;
      if (current && sorted.find(s => s.name === current)) picker.value = current;
      banner(`Tab list refreshed — ${list.sheets.length} tabs.`);
    } catch (e) {
      banner('Could not list sheets: ' + e.message, true);
    } finally {
      btn.disabled = false; btn.textContent = '⟳ Tabs';
    }
  });

  $('#btn-clear-cache').addEventListener('click', () => {
    const info = api.cacheInfo();
    if (!info.length) { banner('Cache is already empty.'); return; }
    const totalKB = info.reduce((s, i) => s + i.sizeKB, 0);
    if (!confirm(`Clear cached data for ${info.length} sheet${info.length > 1 ? 's' : ''} (${totalKB} KB)?\n\nNext load will re-fetch from Google Sheets.`)) return;
    const n = api.clearAll();
    updateCacheFooter();
    banner(`Cleared cache (${n} sheet${n !== 1 ? 's' : ''}). Next Load will hit the sheet fresh.`);
  });

  // View toggle
  $$('#view-toggle .view-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      if (mode === state.mode) return;
      state.mode = mode;
      $$('#view-toggle .view-opt').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      $('#student-picker').disabled = (mode !== 'student');
      // Expand-all / Collapse-all are only meaningful in class view
      $('#expand-group').style.display = (mode === 'class') ? 'flex' : 'none';
      renderCurrent();
    });
  });

  // Expand / Collapse all (class-view only)
  $('#btn-expand-all').addEventListener('click', () => render.setAllExpanded(true));
  $('#btn-collapse-all').addEventListener('click', () => render.setAllExpanded(false));

  // Line style selector — polyline / smooth / straight.
  // Persisted across reloads in localStorage.
  const savedStyle = (() => { try { return localStorage.getItem('bbcs::lineStyle'); } catch (_) { return null; } })();
  if (savedStyle) {
    window.bbcsLineStyle = savedStyle;
    $('#line-style').value = savedStyle;
  } else {
    window.bbcsLineStyle = 'polyline';
  }
  $('#line-style').addEventListener('change', (e) => {
    window.bbcsLineStyle = e.target.value;
    try { localStorage.setItem('bbcs::lineStyle', e.target.value); } catch (_) {}
    renderCurrent();
  });

  // Goal + student picker wiring
  $('#goal-picker').addEventListener('change', (e) => {
    state.goalCode = e.target.value || null;
    renderCurrent();
  });
  $('#student-picker').addEventListener('change', (e) => {
    const col = parseInt(e.target.value, 10);
    state.studentCol = Number.isFinite(col) ? col : null;
    renderCurrent();
  });

  if (!CONFIG.GAS_ENDPOINT) {
    banner('CONFIG.GAS_ENDPOINT is empty. Edit index.html (line ~190) and paste your GAS /exec URL.', true);
    return;
  }

  // v0.4: cache-first boot. DO NOT hit sheets_avail on page load — that's
  // a 1-3s GAS round trip the user stares at every time. Instead:
  //   1. If we have cached sheets + a cached sheet-list, use those.
  //   2. If no cached sheet-list but cached payloads exist, build the
  //      picker from cache entries.
  //   3. If nothing cached, leave the picker empty and require the user
  //      to click "Load sheet list" (which calls GAS).
  // Auto-load the most recent cached sheet on boot so the DAG shows up
  // with zero clicks.
  await bootFromCache();
}

async function bootFromCache() {
  const cachedList = api.getSheetList();      // v0.4 local storage of last sheets_avail result
  const cachedSheets = api.cacheInfo();       // per-sheet payload cache

  const picker = $('#sheet-picker');
  picker.innerHTML = '';

  if (cachedList && cachedList.length) {
    // Use cached sheet list for the dropdown
    const sorted = cachedList.slice().sort((a, b) => {
      const ap = /\d\d[AB]\s.*Big Board/i.test(a.name) ? 0 : 1;
      const bp = /\d\d[AB]\s.*Big Board/i.test(b.name) ? 0 : 1;
      if (ap !== bp) return ap - bp;
      return a.name.localeCompare(b.name);
    });
    for (const s of sorted) {
      picker.appendChild(el('option', { value: s.name }, `${s.name}  (${s.rows}r × ${s.cols}c)`));
    }
    picker.disabled = false;
  } else if (cachedSheets.length) {
    // Fallback: at least list sheets we've cached payloads for
    for (const s of cachedSheets) {
      picker.appendChild(el('option', { value: s.name }, `${s.name}  (cached)`));
    }
    picker.disabled = false;
  } else {
    picker.appendChild(el('option', { value: '' }, '— click Load sheet list —'));
    picker.disabled = true;
  }
  $('#btn-load').disabled = false;
  $('#btn-refresh').disabled = false;

  // Auto-load a sensible default sheet if we have any cached payloads.
  if (cachedSheets.length) {
    // Prefer 26A FTC Big Board, else most-recently-cached
    const preferred = cachedSheets.find(s => /^26A FTC Big Board/i.test(s.name));
    const target = preferred
      ? preferred.name
      : cachedSheets.slice().sort((a, b) => (b.cachedAt || '').localeCompare(a.cachedAt || ''))[0].name;
    picker.value = target;
    await loadCurrentSheet({ force: false, source: 'auto' });
  } else {
    banner('No cached data yet. Pick a board and press Load (or Refresh sheet list to hit GAS).');
  }
}

async function loadCurrentSheet({ force, source }) {
  const name = $('#sheet-picker').value;
  if (!name) return;
  if (source !== 'auto') hideBanner();
  $('#btn-load').disabled = true;
  $('#btn-load').textContent = 'Loading…';
  try {
    const preInfo = api.cacheInfo().find(i => i.name === name);
    const wasCached = !!preInfo && !force;
    const raw = await api.fetchSheet(name, { force });
    const payload = parse.indexPayload(raw);
    state.payload = payload;
    // Reset student selection if roster changed
    if (state.studentCol && !payload.students.find(s => s.col === state.studentCol)) {
      state.studentCol = null;
    }
    $('#view-bar').style.display = 'flex';
    $('#expand-group').style.display = (state.mode === 'class') ? 'flex' : 'none';
    repopulateGoalPicker();
    repopulateStudentPicker();
    renderCurrent();
    const source = wasCached ? `cache (${new Date(preInfo.cachedAt).toLocaleTimeString()})` : 'live fetch';
    banner(`Loaded "${name}" from ${source} — ${payload.students.length} students, ${payload.events.length} events`);
    updateCacheFooter();
  } catch (e) {
    banner('Fetch failed: ' + e.message, true);
  } finally {
    $('#btn-load').disabled = false;
    $('#btn-load').textContent = 'Load';
  }
}

window.addEventListener('DOMContentLoaded', boot);
</script>
